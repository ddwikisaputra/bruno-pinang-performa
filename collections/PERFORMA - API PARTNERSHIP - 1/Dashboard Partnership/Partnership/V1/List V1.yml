  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/v/1/partnerships/list"
  body:
    type: form-urlencoded
    data:
      - name: type
        value: partner
        description: Tipe Data (partner / community) { DEFAULT "partner" }
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "5"
        description: Limit Data {Default 5}
      - name: textSearch
        value: oms
        description: Text Search { Default NULL }
        disabled: true
      - name: userId
        value: "001371"
        description: ID User Login
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

