info:
  name: Logout Partnership V1
  type: http
  seq: 12

http:
  method: POST
  url: "{{url}}/v/1/partnerships/logout"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "1"
        description: User ID Login { MANDATORY }
      - name: partnershipCode
        value: OMS1
        description: Kode Partnership { MANDATORY }
      - name: ticketNumber
        value: T01TMS0yMDI0MTIwOTE1NTE1NA==
        description: Login Tiket { MANDATORY }
  auth:
    type: bearer
    token: "{{tokenPartnership}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

