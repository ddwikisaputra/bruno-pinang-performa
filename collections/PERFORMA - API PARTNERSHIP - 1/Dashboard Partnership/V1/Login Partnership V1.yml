info:
  name: Login Partnership V1
  type: http
  seq: 11

http:
  method: POST
  url: "{{base-url-staging}}/v/1/partnerships/login"
  body:
    type: form-urlencoded
    data:
      - name: email
        value: majoo@gmail.com
        description: Email Partnership { MANDATORY }
      - name: password
        value: bWFqb28yMDIz
        description: Password Partnership (encode base64) { MANDATORY }

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        bru.setGlobalEnvVar("tokenPartnership", jsonData.data.accessToken)
        bru.setEnvVar("tokenPartnership", jsonData.data.accessToken)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

