info:
  name: Approved Purchase Order V1
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/v/1/partnerships/po-approved"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "15"
        description: User ID Login { MANDATORY }
      - name: id
        value: "142"
        description: ID PO { MANDATORY }
      - name: partnershipCode
        value: OMS1
        description: Kode Partnership (Login Session) { MANDATORY }
  auth:
    type: bearer
    token: "{{tokenPartnership}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: validasi po sedang dalam proses (status != 0)
    request:
      url: "{{url}}/v/1/partnerships/po-approved"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: "1"
            description: User ID Login { MANDATORY }
          - name: id
            value: "-1"
            description: ID PO { MANDATORY }
          - name: partnershipCode
            value: OMS1
            description: Kode Partnership (Login Session) { MANDATORY }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Wed, 24 Nov 2021 18:18:31 GMT
        - name: Content-Length
          value: "657"
      body:
        type: json
        data: |-
          {
              "desc": "PO Status != 0 (sedang dalam proses pengajuan)",
              "message": "Maaf, Pengajuan anda sedang dalam proses. Silahkan tunggu sampai proses pengajuan selesai.",
              "status": 500
          }
  - name: error parameter validation
