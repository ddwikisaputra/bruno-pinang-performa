info:
  name: List Purchase Order V1
  type: http
  seq: 10

http:
  method: POST
  url: "{{url}}/v/1/partnerships/po-list"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "1"
        description: User ID Login { MANDATORY }
      - name: textSearch
        value: Dwiki
        description: Text Pencarian Data { OPTIONAL }
        disabled: true
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0} { MANDATORY }
      - name: recordCount
        value: "10"
        description: Limit Data {Default 10} { MANDATORY }
      - name: partnershipCode
        value: OMS1
        description: Kode Partnership (Login Session) { MANDATORY } [PUSAT = PST2021]
      - name: transactionalType
        value: "1"
        description: Tipe Transaksional ( 1 => Pre | 2 => Post ) { Default NULL } { OPTIONAL }
  auth:
    type: bearer
    token: "{{tokenPartnership}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

