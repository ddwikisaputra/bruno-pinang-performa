info:
  name: List Monitoring Purchase Order V1
  type: http
  seq: 8

http:
  method: POST
  url: "{{url}}/v/1/partnerships/po-monitoring-list"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "1"
        description: User ID Login { MANDATORY }
      - name: textSearch
        value: PO/124/MER/001
        description: Text Pencarian Data { OPTIONAL }
        disabled: true
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0} { MANDATORY }
      - name: recordCount
        value: "5"
        description: Limit Data {Default 10} { MANDATORY }
      - name: partnershipCode
        value: OMS1
        description: Kode Partnership (Login Session) { MANDATORY }
  auth:
    type: bearer
    token: "{{tokenPartnership}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

