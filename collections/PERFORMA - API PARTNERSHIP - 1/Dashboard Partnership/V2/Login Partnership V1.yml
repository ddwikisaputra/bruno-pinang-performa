    request:
      url: "{{base-url-local}}/v/1/partnerships/login"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: email
            value: oms@gmail.com
            description: Email Partnership { MANDATORY }
          - name: password
            value: MA==
            description: Password Partnership (encode base64) { MANDATORY }
            disabled: true
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
