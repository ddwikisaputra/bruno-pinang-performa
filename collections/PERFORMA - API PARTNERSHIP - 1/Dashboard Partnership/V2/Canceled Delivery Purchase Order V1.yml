info:
  name: Canceled Delivery Purchase Order V1
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/v/1/partnerships/po-delivery-canceled"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "15"
        description: User ID Login { MANDATORY }
      - name: id
        value: "40"
        description: ID PO { MANDATORY }
      - name: partnershipCode
        value: OMS1
        description: Kode Partnership (Login Session) { MANDATORY }
  auth:
    type: bearer
    token: "{{tokenPartnership}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

