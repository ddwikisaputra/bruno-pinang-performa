info:
  name: Confirmation Received Purchase Order V1
  type: http
  seq: 6

http:
  method: POST
  url: localhost:7007/v/1/partnerships/po-confirmation-received
  body:
    type: form-urlencoded
    data:
      - name: referenceId
        value: "202312"
        description: Kode Referensi { MANDATORY }
      - name: from
        value: RAYAAPPS
        description: Konfirmasi Dari { MANDATORY } [Huruf KAPITAL]
      - name: partnershipCode
        value: OMS1
        description: Kode Partnership (Login Session) { MANDATORY }
      - name: userId
        value: "1"
        description: User ID Login { MANDATORY }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

