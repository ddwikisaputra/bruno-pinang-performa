  type: http
  seq: 6

http:
  method: POST
  url: "{{url}}/v/1/partnerships/list-partnership-user-registration"
  body:
    type: form-urlencoded
    data:
      - name: type
        value: partner
        description: Tipe Data (partner / community) { DEFAULT "partner" }
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "5"
        description: Limit Data {Default 5}
      - name: textSearch
        value: oms
        description: Text Search { Default NULL }
        disabled: true
      - name: userId
        value: "999941"
        description: ID User Login
  auth:
    type: basic
    username: "{{userBasicPartnership}}"
    password: "{{passBasicPartnership}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

