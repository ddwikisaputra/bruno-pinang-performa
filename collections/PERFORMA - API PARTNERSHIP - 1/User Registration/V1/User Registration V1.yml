  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/v/1/partnerships/user-registration"
  body:
    type: multipart-form
    data:
      - name: name
        type: text
        value: Dwiki Saputra
        description: Nama User {MANDATORY}
      - name: email
        type: text
        value: dwiki.saputra@bankraya.co.id
        description: Email User [Format:abc@gmail.com] {MADNATORY}
      - name: position
        type: text
        value: Pemilik
        description: Jabatan Usesr {MANDATORY}
      - name: partnershipCode
        type: text
        value: SAT23
        description: Code Partnership {MANDATORY}
      - name: mobileNumber
        type: text
        value: "+6285153315771"
        description: No Telepon Calon User [Format:+628xxxxxx] { MANDATORY }
      - name: password
        type: text
        value: MDAwMDAwMDA=
        description: Password User (encode base64) { MANDATORY }
  auth:
    type: basic
    username: "{{userBasicPartnership}}"
    password: "{{passBasicPartnership}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

