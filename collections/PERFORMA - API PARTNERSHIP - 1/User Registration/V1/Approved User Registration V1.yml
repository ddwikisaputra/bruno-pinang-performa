info:
  name: Approved User Registration V1
  type: http
  seq: 1

http:
  method: POST
  url: "{{base-url-local}}/v/1/partnerships/approved-user-registration"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: User ID Login / PN { MANDATORY }
      - name: id
        value: "1"
        description: ID User Registration { MANDATORY }
  auth:
    type: bearer
    token: "{{tokenPartnership}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

