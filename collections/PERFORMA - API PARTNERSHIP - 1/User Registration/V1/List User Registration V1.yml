info:
  name: List User Registration V1
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/v/1/partnerships/list-user-registration"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: User ID Login { MANDATORY }
      - name: branchCode
        value: "9999"
        description: Kode Branch { MANDATORY }
      - name: startIndex
        value: "0"
        description: "Offset Data { Default 0 } "
      - name: recordCount
        value: "10"
        description: "Limit Data { Default 5 } "
      - name: textSearch
        value: dwiki
        description: Text Search { Default NULL }
        disabled: true
      - name: filterDate
        value: 2012-03-21
        description: "Filter Tanggal Pengajuan User [ ex : 2022-03-01 ] { Default NULL }"
        disabled: true
      - name: filterStatus
        value: "0"
        description: Filter Status Pengajuan User [ 0 = Menunggu Approval | 1 =  Disetujui | -1 = Ditolak] { Default NULL }
  auth:
    type: bearer
    token: "{{tokenPartnership}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

