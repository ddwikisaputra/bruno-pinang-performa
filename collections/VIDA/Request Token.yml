info:
  name: Request Token
  type: http
  seq: 8

http:
  method: POST
  url: "{{base-url-sandbox}}/auth/realms/vida/protocol/openid-connect/token"
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: "{{grant-type-sandbox}}"
      - name: scope
        value: "{{scope-sandbox}}"
      - name: client_id
        value: "{{client-id-sandbox}}"
      - name: client_secret
        value: "{{client-secret-sandbox}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        bru.setEnvVar("vida-token", jsonData.access_token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

