info:
  name: Sign Inline
  type: http
  seq: 6

http:
  method: POST
  url: "{{base-url-service-sandbox}}/signer/v2/services/esign?raType=int&docType=nontemplate"
  params:
    - name: raType
      value: int
      type: query
    - name: docType
      value: nontemplate
      type: query
  body:
    type: json
    data: |-
      {
        "partnerTrxId": "PERFORMA-1",	// SEQUENCE SPH-MERCHANT-URUTAN
        "user": {
          "vidaEkycEventId": "8def95f6-16b7-4a6a-a84a-f07be91bf56b" // registered_tte_account
        },
        "requestInfo": {
          "userAgent": "Mozilla/5.0 (X11;Linux x86_64) AppleWebKit / 537.36", // hardcode
          "srcIp": "127.0.0.1", // hardcode
          "consentTimestamp": "1702362951" // sesuai dengan timestamp now
        },
        "device": {
      		"os": "R", // hardcode
      		"model": "KB2001", // hardcode
      		"uniqueId": "AF7KI0bly3aPIsYJ4+O+2QE", // hardcode
      		"networkProvider": "IND idea" // hardcode
        },
        "signingInfo": [
          {
              "pdfFile": "{{sphPDFBase64}}", // ada di gcs express_loan_document
              "pageNo": "1", // hardcode
              "xPoint": "0", // hardcode
              "yPoint": "0", // hardcode
              "height": "0", // hardcode
              "width": "0", // hardcode
              "clientFilename": "dokumen_pinjaman_20240820144439.pdf", // Dokumen Pinjaman ID Prakarsa
              "qrEnable": true, // hardcode
              "appearance": {
                  "type": "non_visual" // hardcode
              }
          }
        ]
      }
  auth:
    type: bearer
    token: "{{vida-token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

