info:
  name: SACADetail (Verify)
  type: http
  seq: 3

http:
  method: POST
  url: "{{url-gcp}}/api/bem/v1/cbs/inquirySACADetail"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
      	"branch" : "7957",  // -> default
      	"accountNumber" : "20601121736506", // -> mandatory
      	"requestBy" : "SAHABAT",  // -> default (PROD KONFIRMASI)
      	"userId" : "9997891",  // -> default
      	"bankCode": "002", // -> mandatory 002 (bri) 494 (raya)
      	"productCode":"002" // -> default
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

