info:
  name: Request User Access Token
  type: http
  seq: 4

http:
  method: POST
  url: "{{base-url-dev}}/v/1/request-user-access-token"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2dDZDh5ZEpyVktGOWlZeG91bmxrd1FXZEd3PT0=
      description: "API KEY PARTNERSHIP_CODE -> GCM -> BASE64 "
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: UmF5YVBpUGVyVG9wgBcInhmZ5UUWTBbCYYpg3vcpZd2bCaU0B/ISS0WCC+9zruNNqK5JuA==
        description: Nomor Identitas [MANDATORY] -> KTP -> BASE64 -> GCM
      - name: pin
        value: UmF5YVBpUGVyVG9wgCkmmRq3/UX27SN0PF1SrTRf6VNSajhf
        description: PIN [MANDATORY] -> PIN ->  BASE64 -> GCM
      - name: nomorIdentitas
        value: "{{nomorIdentitasSunarto}}"
        disabled: true
      - name: pin
        value: "{{pinSunarto}}"
        disabled: true

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        bru.setGlobalEnvVar("tokenMerchant", jsonData.token)
        bru.setEnvVar("tokenMerchant", jsonData.token)
        bru.setGlobalEnvVar("apiKeyMerchant", req.getHeaders().get("Api-Key"))
        bru.setEnvVar("apiKeyMerchant", req.getHeaders().get("Api-Key"))

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "503 : Service Unavailable"
    request:
      url: "{{base-url-local}}/v/1/request-user-access-token"
      method: POST
      headers:
        - name: Api-Key
          value: "{{apiKeyDev}}"
          description: API KEY [MANDATORY] PARTNERSUPCODE -> GCM -> BASE64
      body:
        type: form-urlencoded
        data:
          - name: pin
            value: "{{pinDwiki}}"
            description: PIN [MANDATORY] -> PIN ->  BASE64 -> GCM
          - name: nomorIdentitas
            value: "{{nomorIdentitasDwiki}}"
            description: Nomor Identitas [MANDATORY] -> KTP -> BASE64 -> GCM
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Thu, 26 Sep 2024 09:09:59 GMT
        - name: Content-Length
          value: "122"
      body:
        type: json
        data: |-
          {
              "message": "Jam operasional Pinang Performa dari jam 06:00 - 16:00 WIB setiap hari. Kembali lagi nanti, ya!",
              "status": 503
          }
  - name: "200 : Success"
    request:
      url: "{{base-url-local}}/v/1/request-user-access-token"
      method: POST
      headers:
        - name: Api-Key
          value: "{{apiKeyDev}}"
          description: API KEY [MANDATORY]
      body:
        type: form-urlencoded
