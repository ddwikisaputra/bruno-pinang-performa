info:
  name: Count Status Monitoring Cashloan
  type: http
  seq: 1

http:
  method: POST
  url: "{{base-url-local}}/v/1/partnership/cl/count-status-monitoring"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Error - Parameter Token / API Key Empty
    request:
      url: "{{base-url-local}}/v/1/partnership/cl/count-status-monitoring"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Cache-Control
          value: none
        - name: Content-Security-Policy
          value: script-src 'self' pinang-performa.bankraya.co.id
        - name: Content-Type
          value: application/json
        - name: Permissions-Policy
          value: geolocation=()
        - name: Referrer-Policy
          value: no-referrer
        - name: Strict-Transport-Security
          value: max-age=16070400; includeSubDomains
        - name: X-Content-Type-Options
          value: nosniff
        - name: X-Frame-Options
          value: SAMEORIGIN
        - name: X-Permitted-Cross-Domain-Policies
          value: none
        - name: Date
          value: Thu, 05 Feb 2026 07:32:18 GMT
        - name: Content-Length
          value: "51"
      body:
        type: json
        data: |-
          {
              "message": "parameter token is empty",
              "status": 401
          }
  - name: Error - Unauthorized / Expired
    request:
      url: "{{base-url-local}}/v/1/partnership/cl/count-status-monitoring"
      method: POST
