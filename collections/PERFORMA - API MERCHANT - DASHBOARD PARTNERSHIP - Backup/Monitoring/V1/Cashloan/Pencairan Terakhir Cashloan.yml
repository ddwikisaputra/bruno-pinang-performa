info:
  name: Pencairan Terakhir Cashloan
  type: http
  seq: 1

http:
  method: POST
  url: "{{base-url-local}}/v/1/partnership/cl/pencairan-terakhir"
  body:
    type: form-urlencoded
    data:
      - name: recordCount
        value: "2"
      - name: startIndex
        value: "2"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Error - Parameter Validation (Total Mandatory Tidak Sesuai)
    request:
      url: "{{base-url-local}}/v/1/partnership/cl/pencairan-terakhir"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: recordCount
            value: "2"
            disabled: true
          - name: startIndex
            value: "0"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Cache-Control
          value: none
        - name: Content-Security-Policy
          value: script-src 'self' pinang-performa.bankraya.co.id
        - name: Content-Type
