info:
  name: Monitoring Total Cashloan
  type: http
  seq: 1

http:
  method: POST
  url: /v/1/partnership/cl/monitoring-total
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
