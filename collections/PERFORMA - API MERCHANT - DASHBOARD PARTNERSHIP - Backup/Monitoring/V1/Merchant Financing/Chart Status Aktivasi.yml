  url: "{{base-url-local}}/v/1/partnership/mf/chart-status-aktivasi"
  body:
    type: form-urlencoded
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

