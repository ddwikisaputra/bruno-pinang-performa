info:
  name: Cek Saldo Raya
  type: http
  seq: 1

http:
  method: POST
  url: "{{base-url-local}}/v/1/profile/cek-saldo-raya"
  headers:
    - name: Api-Key
      value: "{{apiKeyMerchant}}"
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: RVgtTUoxLVVtRjVZVkJwVUdWeVZHOXcvbHg2bkdUNGxVWnFLV2FQSE80NzNwZGZGSmppYUtFNWpkQ2FuMG5kRnhYL1l1UkJoM044Zkh2N2RXT0Fab2M9
        description: Kode Prakarsa [MANDATORY][BASE64 STRING]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 503 - Service Unavailable
    request:
      url: "{{base-url-local}}/v/1/profile/cek-saldo-raya"
      method: POST
      headers:
        - name: Api-Key
          value: "{{apiKeyMerchant}}"
          disabled: true
      body:
