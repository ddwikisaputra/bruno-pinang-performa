info:
  name: Slik Callback
  type: http
  seq: 1

http:
  method: POST
  url: "{{base-url-dev}}/v/1/internal/screening/slik-callback/490"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: MER-490
      - name: statusCode
        value: "1"
      - name: statusDescription
        value: Good
      - name: data
        value: '{"pdfFile":"http://172.16.31.95:4343/api/digiagri/slik/pdf/490"}'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

