          - name: jangkaWaktu
            value: MTQ=
            description: Jangka Waktu [MANDATORY][BASE64 INT]
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Tue, 03 Sep 2024 11:04:08 GMT
