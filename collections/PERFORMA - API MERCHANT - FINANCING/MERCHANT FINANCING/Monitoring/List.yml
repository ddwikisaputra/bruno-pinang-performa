info:
  name: List
  type: http
  seq: 2

http:
  method: POST
  url: "{{base-url-local}}/v/1/monitoring/list"
  headers:
    - name: Api-Key
      value: "{{apiKeyMerchant}}"
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: RVgtTUoxLVVtRjVZVkJwVUdWeVZHOXcvbHg2bkdUNGxVWnFLV2FQSE80NzNwZGZGSmppYUtFNWpkQ2FuMG5kRnhYL1l1UkJoM044Zkh2N2RXT0Fab2M9
        description: Kode Prakarsa [MANDATORY][BASE64 STRING]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY][BASE64 STRING]
      - name: filterStatus
        value: "5"
        description: Filter Status [MANDATORY][INT][-1 = All Kecuali Lunas | 1  = Aktif | 2 = Lunas | 3 = H- . . Jatuh Tempo | 4 = Jatuh Tempo | 5 = Telat . . Hari | Default = -1]
      - name: filterText
        value: INV/MJ1/2024/2
        description: Filter Text [OPTIONAL][STRING]
        disabled: true
      - name: startIndex
        value: "0"
        description: "[Default = 0][OPTIONAL][INT]"
      - name: recordCount
        value: "10"
        description: Record Count [Default = 10, IF > 10 THEN ALL DATA][OPTIONAL][INT]
      - name: filterDate
        value: "1"
        description: Filter Date [0 = non aktif | 1 = aktif] [OPTIONAL][INT]
        disabled: true
      - name: startDate
        value: 2024-08-20
        description: Start Date [YYYY-MM-DD] [OPTIONAL][STRING]
        disabled: true
      - name: endDate
        value: 2024-08-23
        description: End Date [YYYY-MM-DD] [OPTIONAL][STRING]
        disabled: true
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

