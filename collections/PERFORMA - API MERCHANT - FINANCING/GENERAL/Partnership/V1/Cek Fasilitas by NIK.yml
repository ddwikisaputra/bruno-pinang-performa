  type: http
  seq: 6

http:
  method: POST
  url: "{{base-url-local}}/v/1/partnership/cek-fasilitas"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d25UZ0FnR0w4a2RiMExaL0s3TEQwajY5WUxBRUorYWc9
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzI3NTA5NjkwNzAwMDAwNw==
        description: Nomor Identitas User [MANDATORY] [BASE64 STRING]
      - name: kodePartnership
        value: UFVNLTYxNQ==
        description: Kode Partnership [MANDATORY][BASE64 STRING]
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

