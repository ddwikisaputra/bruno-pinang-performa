info:
  name: Daftar Distributor
  type: http
  seq: 5

http:
  method: POST
  url: "{{base-url-local}}/v/1/partnership/daftar-distributor"
  headers:
    - name: Api-Key
      value: "{{apiKeyDev}}"
  body:
    type: multipart-form
    data:
      - name: kodePartnership
        type: text
        value: ""
        description: MANDATORY | Bae64
      - name: kodeDistributor
        type: text
        value: ""
        description: MANDATORY | Base64
      - name: namaRekening
        type: text
        value: ""
        description: MANDATORY | Base64
      - name: nomorRekening
        type: text
        value: ""
        description: MANDATORY | Base64 | Numeric | 15 Digit
      - name: namaBank
        type: text
        value: ""
        description: MANDATORY | Base64 | Value(BRI, RAYA)
      - name: namaDistributor
        type: text
        value: ""
        description: MANDATORY | Base64
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

