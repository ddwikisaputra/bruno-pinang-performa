info:
  name: Cek Whitelist
  type: http
  seq: 2

http:
  method: POST
  url: "{{base-url-prod}}/v/1/aktivasi/cek-whitelist"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2pDa0VnR3o1a2ZkRHdnNjVJL3R4cDNqOUZPSXJoQT09
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzIwMTE1MTQxMDAwMDAwMQ==
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: kodePartnership
        value: QURJLTg0
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 503 - Service Unavailable
    request:
      url: "{{base-url-mock}}/v/1/aktivasi/cek-whitelist"
      method: POST
      headers:
        - name: Api-Key
          value: "{{apiKeyMerchant}}"
        - name: x-mock-response-code
          value: 503-service-unavailable
          description: enable when use mock api
      body:
        type: form-urlencoded
        data:
          - name: nomorIdentitas
            value: MzE3MTA1MTIxMTk1MDAwMQ==
            description: Nomor Identitas User [MANDATORY] [Base64]
          - name: kodePartnership
            value: TUox
            description: Kode Partnership [MANDATORY] [Base64]
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Tue, 24 Sep 2024 03:40:35 GMT
        - name: Content-Length
          value: "202"
      body:
        type: json
        data: |-
          {
              "message": "Jam operasional Pinang Performa dari jam XX.XX - XX.XX WIB setiap hari. Kembali lagi nanti, ya!",
              "status": 503
          }
