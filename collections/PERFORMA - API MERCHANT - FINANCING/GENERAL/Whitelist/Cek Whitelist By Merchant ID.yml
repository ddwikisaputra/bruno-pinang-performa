info:
  name: Cek Whitelist By Merchant ID
  type: http
  seq: 3

http:
  method: POST
  url: "{{base-url-staging}}/v/1/aktivasi/cek-whitelist-by-merchant-id"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2p5QUNnR0QvbERZbWNFeHNicWNZWEpNN0taNmxzeFk9
  body:
    type: form-urlencoded
    data:
      - name: merchantID
        value: QUJD
        description: MerchantID [MANDATORY] [Base64]
      - name: kodePartnership
        value: Qk1PLTQyMA==
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

