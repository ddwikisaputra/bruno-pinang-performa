info:
  name: Ubah
  type: http
  seq: 7

http:
  method: POST
  url: "{{base-url-local}}/v/1/pin/ubah"
  headers:
    - name: Api-Key
      value: "{{apiKeyDev}}"
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzE3MTA1MTIxMTk1MDAwMQ==
        description: "3173022310780004"
      - name: pin
        value: MTIwMzkz
        description: MTIzNDU2 = 123456, 123457 = MTIzNDU3
      - name: kodePartnership
        value: TUox
        description: BLA-501
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

