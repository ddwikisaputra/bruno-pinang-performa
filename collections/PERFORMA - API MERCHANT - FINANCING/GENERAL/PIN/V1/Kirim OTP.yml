info:
  name: Kirim OTP
  type: http
  seq: 2

http:
  method: POST
  url: "{{base-url-local}}/v/1/pin/kirim-otp"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2p5RU1nR0g5bFYrVEF2L3hDU1FIM25JVTl0M2Naam89
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzE3MzAyMjMxMDc4MDAwNA==
      - name: kodePartnership
        value: QkxBLTUwMQ==
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 503 - Service Unavailable
    request:
      url: "{{base-url-dev}}/v/1/pin/kirim-otp"
      method: POST
      headers:
        - name: Api-Key
          value: "{{apiKeyDev}}"
      body:
        type: form-urlencoded
        data:
          - name: nomorIdentitas
            value: MzE3MTA1MTIxMTk1MDAwMQ==
          - name: kodePartnership
            value: TUox
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Date
          value: Wed, 31 Jul 2024 10:26:17 GMT
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Content-Length
          value: "69"
        - name: Connection
          value: keep-alive
        - name: Strict-Transport-Security
          value: max-age=15724800; includeSubDomains
      body:
        type: json
        data: |-
          {
              "message": "Jam operasional Pinang Performa dari jam XX.XX - XX.XX WIB setiap hari. Kembali lagi nanti, ya!",
              "status": 503
          }
