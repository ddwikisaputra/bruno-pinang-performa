info:
  name: Validasi Invoice
  type: http
  seq: 7

http:
  method: POST
  url: "{{base-url-local}}/v/1/pencairan/validasi-invoice"
  headers:
    - name: Api-Key
      value: "{{apiKeyMerchant}}"
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2p5a2JnR1g4blNvdSs1WW9CQVFpME9ueEpBOEF5STA9
      disabled: true
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: RVgtQkRWLTExOS1VbUY1WVZCcFVHVnlWRzl3L2w5Nm0yVDBsVU5xS1crS0hPNDgyNWRmRkpqZ2FLbzVpZE9kbkVqWkU3WENUVXV6UVhEZXoxUUJCUk9zTjZVPQ==
        description: Kode Prakarsa [MANDATORY][BASE64 STRING]
      - name: kodePartnership
        value: QkRWLTExOQ==
        description: Kode Partnership [MANDATORY][BASE64 STRING]
      - name: kodeTransaksi
        value: SU5WLTIwMjYtMDEtMDktMTY1ODIyOTAw
        description: Kode Transaksi [MANDATORY][BASE64 STRING]
      - name: nominalPencairan
        value: MzAwMDAwMA==
        description: Nominal Pencairan [MANDATORY][BASE64 DECIMAL]
      - name: tenor
        value: NA==
        description: Tenor [Mandatory] [hari]
      - name: blobTransaksi
        value: "{{base64File}}"
        description: Blob File [Mandatory] [base64]
      - name: mimeTypeTransaksi
        value: application/pdf
        description: Mime Type File [Mandatory] [application/pdf]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

