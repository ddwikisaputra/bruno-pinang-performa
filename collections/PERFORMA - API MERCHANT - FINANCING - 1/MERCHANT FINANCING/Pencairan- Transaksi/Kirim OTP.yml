info:
  name: Kirim OTP
  type: http
  seq: 6

http:
  method: POST
  url: "{{base-url-local}}/v/1/pencairan/kirim-otp"
  headers:
    - name: Api-Key
      value: "{{apiKeyMerchant}}"
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2p5a2JnR1g4blNvdSs1WW9CQVFpME9ueEpBOEF5STA9
      disabled: true
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: RVgtTUoxLVVtRjVZVkJwVUdWeVZHOXcvbHg2bkdUNGxVWnFLV2FQSE80NzNwZGZGSmppYWFvNGl0Q2Zta3JjRUZ2dmVJbXV6V2xnQ0haYUpxMWFFRXc9
        description: Kode Prakarsa [MANDATORY][BASE64 STRING]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY][BASE64 STRING]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

