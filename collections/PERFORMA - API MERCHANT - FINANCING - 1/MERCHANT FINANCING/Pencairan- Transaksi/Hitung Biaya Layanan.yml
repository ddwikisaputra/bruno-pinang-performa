        - name: Content-Length
          value: "103"
      body:
        type: json
        data: |-
          {
              "data": {
                  "biayaAdmin": 50000, 
                  // total biaya admin from table loan_type_subparent_administration_fee column admin_fee if is_custom == 0
                  // total biaya admin from table loan_type_child_administration_fee column admin_fee if is_custom == 1

                  "biayaBunga": 3209 // total biaya bunga ((nominalPencairan * percentage / 360 * jangkaWaktu) / 100)
                  // percentage from table loan_type_subparent_interest_rate column interest_rate if is_custom == 0
                  // percentage from table loan_type_child_interest_rate column interest_rate if is_custom == 1
              },
              "message": "Hitung biaya layanan berhasil.", // success message
              "status": 200
          }

docs: |-
  AUTH
  ----
  Bearer Token => User Token (PIN)

  HEADER
  ------
  Api-Key => [MANDATORY] FORMAT (APIKEY -> BASE64)

  PARAMETER
  ---------
  kodePrakarsa => Kode Prakarsa [MANDATORY] [BASE64]
  kodePartnership => Kode Partnership [MANDATORY] [BASE64]
  nominalPencairan => NOMINAL PENCAIRAN  [MANDATORY] [BASE64 INT]
  jangkaWaktu => JANGKA WAKTU  [MANDATORY] [BASE64 INT]
