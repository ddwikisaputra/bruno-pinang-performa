info:
  name: Hitung Biaya Layanan
  type: http
  seq: 5

http:
  method: POST
  url: "{{base-url-local}}/v/1/pencairan/hitung-biaya-layanan"
  headers:
    - name: Api-Key
      value: "{{apiKeyMerchant}}"
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: RVgtTUoxLVVtRjVZVkJwVUdWeVZHOXcvbHg2bkdUNGxVWnFLV2FQSE80NzNwZGZGSmprYWFrN2lkR2NuRTdkRjB0WXIzTi9NQVV1eTZ1RWluM2JSRXc9
        description: Kode Prakarsa [MANDATORY][BASE64 STRING]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY][BASE64 STRING]
      - name: nominalPencairan
        value: MTUwMDAwMA==
        description: Nominal Pencairan [MANDATORY][BASE64 INT]
      - name: jangkaWaktu
        value: Nw==
        description: Jangka Waktu [MANDATORY][BASE64 INT]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

