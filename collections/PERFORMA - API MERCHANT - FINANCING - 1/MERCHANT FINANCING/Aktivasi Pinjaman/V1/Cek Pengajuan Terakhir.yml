info:
  name: Cek Pengajuan Terakhir
  type: http
  seq: 1

http:
  method: POST
  url: "{{base-url-local}}/v/1/aktivasi/cek-pengajuan-terakhir"
  headers:
    - name: Api-Key
      value: "{{apiKeyMerchant}}"
      disabled: true
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzE3MTA1MTIxMTk1MDAwMQ==
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
