      value: "{{apiKeyMerchant}}"
    - name: ""
      value: ""
      disabled: true
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: RVgtTUoxLVVtRjVZVkJwVUdWeVZHOXcvbHg2bkdUNGxVWnFLV2FQSE80NzNwZGZGSmppYWFvNGl0Q2Zta3JjRUZ2dmVJbXV6V2xnQ0haYUpxMWFFRXc9
        description: Kode Prakarsa [MANDATORY] [Base64] (express_prakarsa.references.id)
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
      - name: otpKey
        value: UkFZQTk4Mjg1NDc4MjM=
        description: OTP Key [MANDATORY] [Base64]
      - name: otp
        value: NDUwNzA=
        description: OTP [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

