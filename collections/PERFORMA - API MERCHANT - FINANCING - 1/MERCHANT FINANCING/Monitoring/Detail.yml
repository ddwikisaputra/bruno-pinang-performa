info:
  name: Detail
  type: http
  seq: 3

http:
  method: POST
  url: "{{base-url-local}}/v/1/monitoring/detail"
  headers:
    - name: Api-Key
      value: "{{apiKeyMerchant}}"
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: RVgtTUoxLVVtRjVZVkJwVUdWeVZHOXcvbHg2bkdUNGxVWnFLV2FQSE80NzNwZGZGSmppYWFvNGl0Q2Zta3JjRUZ2dmVJbXV6V2xnQ0haYUpxMWFFRXc9
        description: Kode Prakarsa [MANDATORY][BASE64 STRING]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY][BASE64 STRING]
      - name: kodePencairan
        value: VFJYMjAyNTEzOA==
        description: Filter Status [MANDATORY][INT][-1 = All Kecuali Lunas | 1  = Aktif | 2 = Lunas | 3 = H- . . Jatuh Tempo | 4 = Jatuh Tempo | 5 = Telat . . Hari | Default = -1]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

