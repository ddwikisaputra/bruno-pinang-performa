docs: |-
  AUTH
  ----
  Bearer Token => User Token (PIN)

  HEADER
  ------
  Api-Key => [MANDATORY] FORMAT (APIKEY -> BASE64)

  PARAMETER
  ---------
  kodePrakarsa => Kode Prakarsa [MANDATORY] [BASE64]
  kodePartnership => Kode Partnership [MANDATORY] [BASE64]
  kodePencairan => Kode Pencairan [MANDATORY] [BASE64]
