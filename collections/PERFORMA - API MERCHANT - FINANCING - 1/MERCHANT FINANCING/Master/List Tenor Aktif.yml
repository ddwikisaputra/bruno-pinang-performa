  url: "{{base-url-local}}/v/1/master/list-tenor-aktif"
  headers:
    - name: Api-Key
      value: "{{apiKeyMerchant}}"
      description: API KEY [MANDATORY] PARTNERSUPCODE -> GCM -> BASE64
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: RVgtTUoxLVVtRjVZVkJwVUdWeVZHOXcvbHg2bkdUNGxVWnFLV2FQSE80NzNwZGZGSmppYUtFNWpkQ2FuMG5kRnhYL1l1UkJoM044Zkh2N2RXT0Fab2M9
        description: Kode Prakarsa [MANDATORY] [[Base64]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

