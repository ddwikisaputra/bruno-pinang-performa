          value: "{{apiKeyDev}}"
      body:
        type: form-urlencoded
        data:
          - name: nomorIdentitas
            value: MzE3MTA1MTIxMTk1MDAwMQ==
          - name: kodePartnership
            value: TUox
          - name: otpKey
            value: UkFZQTQ0ODEzNzc4NTM=
          - name: otp
            value: NDg2MDg=
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Tue, 30 Jul 2024 13:28:59 GMT
        - name: Content-Length
          value: "50"
      body:
