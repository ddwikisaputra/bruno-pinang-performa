          - name: otpKey
            value: UkFZQTE1NTI0ODQ4MDU=
          - name: otp
            value: NjQyMjY=
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Date
          value: Wed, 31 Jul 2024 10:28:24 GMT
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Content-Length
          value: "69"
        - name: Connection
          value: keep-alive
        - name: Strict-Transport-Security
          value: max-age=15724800; includeSubDomains
      body:
        type: json
        data: |-
          {
              "message": "token has invalid claims: token is expired",
              "status": 401
          }
  - name: Error - Unauthorized / Expired
    request:
