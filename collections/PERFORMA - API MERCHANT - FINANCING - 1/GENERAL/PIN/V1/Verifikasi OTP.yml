info:
  name: Verifikasi OTP
  type: http
  seq: 3

http:
  method: POST
  url: "{{base-url-local}}/v/1/pin/verifikasi-otp"
  headers:
    - name: Api-Key
      value: "{{apiKeyDev}}"
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzE3MTA1MTIxMTk1MDAwMQ==
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
      - name: otpKey
        value: UkFZQTE4NjUwNDEwNDM=
        description: OTP Key [MANDATORY] [Base64]
      - name: otp
        value: NjI2NjA=
        description: OTP [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Error - Service Unavailable
    request:
      url: "{{base-url-dev}}/v/1/pin/verifikasi-otp"
      method: POST
      headers:
        - name: Api-Key
          value: "{{apiKeyDev}}"
      body:
        type: form-urlencoded
        data:
          - name: nomorIdentitas
            value: MzE3MTA1MTIxMTk1MDAwMQ==
          - name: kodePartnership
            value: TUox
          - name: otpKey
            value: UkFZQTE1NTI0ODQ4MDU=
          - name: otp
            value: NjQyMjY=
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Date
          value: Wed, 31 Jul 2024 10:28:24 GMT
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Content-Length
          value: "69"
        - name: Connection
          value: keep-alive
        - name: Strict-Transport-Security
          value: max-age=15724800; includeSubDomains
      body:
        type: json
        data: |-
          {
              "message": "Jam operasional Pinang Performa dari jam XX.XX - XX.XX WIB setiap hari. Kembali lagi nanti, ya!",
              "status": 503
          }
  - name: Error - Token Expired
    request:
      url: "{{base-url-dev}}/v/1/pin/verifikasi-otp"
      method: POST
      headers:
        - name: Api-Key
          value: "{{apiKeyDev}}"
      body:
