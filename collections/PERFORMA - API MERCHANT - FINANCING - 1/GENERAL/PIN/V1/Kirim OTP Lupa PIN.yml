info:
  name: Kirim OTP Lupa PIN
  type: http
  seq: 5

http:
  method: POST
  url: "{{base-url-local}}/v/1/pin/kirim-otp-lupa"
  headers:
    - name: Api-Key
      value: "{{apiKeyDev}}"
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzE3MTA1MTIxMTk1MDAwMQ==
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 503 - Service Unavailable
    request:
      url: "{{base-url-local}}/v/1/pin/kirim-otp-lupa"
      method: POST
      headers:
        - name: Api-Key
          value: "{{apiKeyDev}}"
      body:
        type: form-urlencoded
        data:
          - name: nomorIdentitas
            value: MzE3MTA1MTIxMTk1MDAwMQ==
          - name: kodePartnership
            value: TUox
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Date
          value: Wed, 31 Jul 2024 10:26:17 GMT
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Content-Length
          value: "69"
        - name: Connection
          value: keep-alive
        - name: Strict-Transport-Security
          value: max-age=15724800; includeSubDomains
      body:
        type: json
        data: |-
          {
              "message": "Jam operasional Pinang Performa dari jam XX.XX - XX.XX WIB setiap hari. Kembali lagi nanti, ya!",
              "status": 503
          }
