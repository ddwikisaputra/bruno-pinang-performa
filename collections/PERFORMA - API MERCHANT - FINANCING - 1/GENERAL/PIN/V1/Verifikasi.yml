info:
  name: Verifikasi
  type: http
  seq: 4

http:
  method: POST
  url: "{{base-url-local}}/v/1/pin/verifikasi"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2dDZDh5ZEpyVktGOWlZeG91bmxrd1FXZEd3PT0=
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzE3MTA1MTIxMTk1MDAwMQ==
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: pinVerifikasi
        value: MDk4NzY1
        description: PIN [MANDATORY] [Base64]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
      - name: nomorIdentitas
        value: MzIwOTEyMjAwMzk0MDAwNg==
        description: sunarto
        disabled: true
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 503 - Service Unavailable
    request:
      url: "{{base-url-local}}/v/1/pin/verifikasi"
      method: POST
      headers:
        - name: Api-Key
          value: "{{apiKeyDev}}"
      body:
        type: form-urlencoded
        data:
          - name: nomorIdentitas
            value: MzE3MTA1MTIxMTk1MDAwMQ==
          - name: pinVerifikasi
            value: MDk4NzY1
          - name: kodePartnership
            value: TUox
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Wed, 31 Jul 2024 10:29:45 GMT
        - name: Content-Length
          value: "69"
      body:
        type: json
        data: |-
          {
              "message": "Jam operasional Pinang Performa dari jam XX.XX - XX.XX WIB setiap hari. Kembali lagi nanti, ya!",
              "status": 503
          }
