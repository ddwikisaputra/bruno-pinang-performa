info:
  name: Verifikasi OTP Lupa PIN
  type: http
  seq: 6

http:
  method: POST
  url: "{{base-url-local}}/v/1/pin/verifikasi-otp-lupa"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2dDZDh5ZEpyVktGOWlZeG91bmxrd1FXZEd3PT0=
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzI3MzE4MDcxMjk2MDAwNw==
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
      - name: otpKey
        value: UkFZQTgzMDY5Mzg0MTA=
        description: OTP Key [MANDATORY] [Base64]
      - name: otp
        value: NTYyNTE=
        description: OTP [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 503 - Service Unavailable
    request:
      url: "{{base-url-dev}}/v/1/pin/verifikasi-otp-lupa"
      method: POST
      headers:
        - name: Api-Key
          value: "{{apiKeyDev}}"
      body:
        type: form-urlencoded
        data:
          - name: nomorIdentitas
            value: MzE3MTA1MTIxMTk1MDAwMQ==
          - name: kodePartnership
            value: TUox
          - name: otpKey
            value: UkFZQTE1NTI0ODQ4MDU=
          - name: otp
            value: NjQyMjY=
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Date
          value: Wed, 31 Jul 2024 10:28:24 GMT
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Content-Length
          value: "69"
        - name: Connection
          value: keep-alive
        - name: Strict-Transport-Security
