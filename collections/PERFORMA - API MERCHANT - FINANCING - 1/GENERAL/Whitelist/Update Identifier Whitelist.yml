  url: "{{base-url-local}}/v/1/aktivasi/update-identifier-whitelist"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2dDZDh5ZEpyVktGOWlZeG91bmxrd1FXZEd3PT0=
  body:
    type: form-urlencoded
    data:
      - name: merchantID
        value: QlJJTU9MQS0x
        description: Merchant ID Whitelist [MANDATORY] [Base64]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
      - name: nomorIdentitas
        value: MzE3MTA1MTIxMTk1MDAwMQ==
        description: Nomor Identitas [MANDATORY][BASE64]
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

