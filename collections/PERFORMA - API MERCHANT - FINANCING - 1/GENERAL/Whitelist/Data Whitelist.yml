info:
  name: Data Whitelist
  type: http
  seq: 4

http:
  method: POST
  url: "{{base-url-prod}}/v/1/aktivasi/data-whitelist"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2pDa0VnR3o1a2ZkRHdnNjVJL3R4cDNqOUZPSXJoQT09
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzIwMTE1MTQxMDAwMDAwMQ==
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: kodePartnership
        value: QURJLTg0
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 503 - Service Unavailable
    request:
      url: "{{base-url-local}}/v/1/aktivasi/data-whitelist"
      method: POST
      headers:
