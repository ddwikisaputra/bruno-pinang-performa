        value: NTUwMDAwMA==
        description: Jumlah Transaksi Dalam 6 Bulan Terakhir (rupiah) [MANDATORY] [Base64]
      - name: jumlahVolume6BulanBUMN
        value: Ng==
        description: Jumlah Volume Transaksi Dalam 6 Bulan Terakhir (satuan)  [MANDATORY] [Base64]
