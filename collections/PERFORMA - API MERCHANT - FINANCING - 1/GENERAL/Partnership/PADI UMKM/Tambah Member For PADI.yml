        value: NTQwMDAwMA==
        description: Jumlah Transaksi Dalam 3 Bulan Terakhir (rupiah) [MANDATORY] [Base64]
      - name: jumlahVolume3BulanBUMN
        value: Mw==
        description: Jumlah Volume Transaksi Dalam 3 Bulan Terakhir (satuan)   [MANDATORY] [Base64]
      - name: sellerCategory
        value: c2VsbGVyIGFsYXQga2VzZWhhdGFu
        description: Kategori Seller [MANDATORY] [Base64]
