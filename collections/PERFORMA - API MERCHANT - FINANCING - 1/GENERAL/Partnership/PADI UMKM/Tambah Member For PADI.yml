        value: KzYyODE3NzY1NzM3MQ==
        description: "Nomor Telepon [MANDATORY] [Base64] [Ex : +628xxx]"
      - name: email
        value: ZC5kd2lraXNhcHV0cmFAZ21haWwuY29t
        description: "Email [MANDATORY] [Base64] [Ex : abc@mail.com]"
      - name: jumlahTransaksi12BulanBUMN
        value: NTYwMDAwMA==
        description: Jumlah Transaksi Dalam 12 Bulan Terakhir  (rupiah) [MANDATORY] [Base64]
      - name: jumlahVolume12BulanBUMN
        value: MTI=
        description: Jumlah Volume Transaksi Dalam 12 Bulan Terakhir (satuan) [MANDATORY] [Base64]
