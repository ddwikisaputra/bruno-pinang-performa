            description: Kode Pencairan [MANDATORY][BASE64 STRING]
          - name: isBankInfo
            value: ""
            description: Show Info Bank [MANDATORY] [1 = SHOW | -1 = HIDE]
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Wed, 03 Apr 2024 10:28:45 GMT
