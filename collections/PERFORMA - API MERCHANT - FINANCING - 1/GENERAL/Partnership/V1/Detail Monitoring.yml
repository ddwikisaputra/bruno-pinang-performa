info:
  name: Detail Monitoring
  type: http
  seq: 12

http:
  method: POST
  url: "{{base-url-local}}/v/1/partnership/monitoring-detail"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d25UZ0FnR0w4a2RiMExaL0s3TEQwajY5WUxBRUorYWc9
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: RVgtUFVNLTYxNS1VbUY1WVZCcFVHVnlWRzl3L2w5Nm1HVDBrazFyTDIrS0hPNDcySmRmRkpqamFLODdpZENZbkVuYUZ3MDFtN0pXa1l4NGxFT3hSdUREOVQ0PQ==
        description: Kode Prakarsa [MANDATORY][BASE64 STRING]
      - name: kodePartnership
        value: UFVNLTYxNQ==
        description: Kode Partnership [MANDATORY][BASE64 STRING]
      - name: kodePencairan
        value: VFJYMjAyNTQxOQ==
        description: Kode Pencairan [MANDATORY][BASE64 STRING]
      - name: isBankInfo
        value: "-1"
        description: Show Info Bank [MANDATORY] [1 = SHOW | -1 = HIDE]
  auth:
    type: bearer
    token: "{{accessTokenPartner}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

