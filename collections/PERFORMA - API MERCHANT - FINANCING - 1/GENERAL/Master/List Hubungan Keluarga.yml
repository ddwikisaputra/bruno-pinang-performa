info:
  name: List Hubungan Keluarga
  type: http
  seq: 3

http:
  method: POST
  url: "{{base-url-local}}/v/1/master/list-hubungan-keluarga"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2dDZDh5ZEpyVktGOWlZeG91bmxrd1FXZEd3PT0=
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzE3MTA1MTIxMTk1MDAwMQ==
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

