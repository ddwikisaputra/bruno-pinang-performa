info:
  name: List Pendidikan
  type: http
  seq: 1

http:
  method: POST
  url: "{{base-url-local}}/v/1/master/list-pendidikan"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2dDZDh5ZEpyVktGOWlZeG91bmxrd1FXZEd3PT0=
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzE3MTA1MTIxMTk1MDAwMQ==
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 503 - Service Unavailable
    request:
      url: "{{base-url-local}}/v/1/master/list-pendidikan"
      method: POST
      headers:
        - name: Api-Key
          value: "{{apiKeyMerchant}}"
      body:
        type: form-urlencoded
        data:
          - name: kodePrakarsa
            value: RVgtTUoxLVVtRjVZVkJwVUdWeVZHOXcvbHg2bkdUNGxVWnFLV2FQSE80NzNwZGZGSmppYUtFNWpkQ2FuMG5kRnhYL1l1UkJoM044Zkh2N2RXT0Fab2M9
          - name: kodePartnership
            value: TUox
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Fri, 25 Oct 2024 07:22:51 GMT
        - name: Content-Length
          value: "321"
      body:
        type: json
        data: |-
          {
              "message": "Jam operasional Pinang Performa dari jam XX.XX - XX.XX WIB setiap hari. Kembali lagi nanti, ya!",
