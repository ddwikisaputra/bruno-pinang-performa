info:
  name: List Tenor Aktif
  type: http
  seq: 2

http:
  method: POST
  url: "{{base-url-local}}/v/1/master/cashloan/list-tenor-aktif"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2dDNE1nR2I1a09pOFRKNzJIS1FSYlE0RGJlOVlkVVE9
      description: API KEY [MANDATORY] PARTNERSUPCODE -> GCM -> BASE64
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: Q0wtTUNBLTI0NC1VbUY1WVZCcFVHVnlWRzl3L2x4Nm5HVDRsVVpxS1dhUEhPNDczcGRmRkpqamFLODdpOUNhbmt2YUhpbmRNZnRHWXVQck1acmZTL2hPU1dzPQ==
        description: Kode Prakarsa [MANDATORY] [[Base64]
      - name: kodePartnership
        value: TUNBLTI0NA==
        description: Kode Partnership [MANDATORY] [Base64]
      - name: nominalPencairanCashloan
        value: MTAwMDAwMDA=
        description: Nominal Pencairan [MANDATORY][BASE64 INT]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

