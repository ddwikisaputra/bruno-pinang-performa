                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<pre><b>     NAMA PEJABAT BANK               NAMA DEBITUR </b></pre>",
                      "textName": "",
                      "textType": "TEXT"
                  },
