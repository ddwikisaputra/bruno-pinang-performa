                              },
                              {
                                  "label": "<b>Biaya Transfer Antar Bank : </b><br>a. BI- Fast : Rp 1.500,-<br>b. RTOL : Rp 6.500,-<br>c. SKN : Rp 2.900,-<br>d. RTGS : Rp 30.000,-",
                                  "value": "<b>Biaya Cek Saldo di ATM Bank Lain</b><br>Rp 4.000,-"
                              },
                              {
                                  "classname": "mid table-blue",
                                  "label": "<b>MANFAAT</b>",
                                  "value": "<b>RISIKO</b>"
                              },
                              {
                                  "label": "Dengan membuka Rekening Digital Saving yang sudah menggunakan teknologi e-KYC, Nasabah dapat lebih mudah melakukan pengelolaan keuangan sesuai preferensi Nasabah melalui fitur Saku Bujet, membantu mencapai impian Nasabah melalui Saku Pintar, membantu Nasabah mengoptimalkan dana darurat dengan Saku Jaga, membantu pengelolaan keuangan bisnis Nasabah melalui Saku Bisnis, dan membantu Nasabah dan partner untuk menabung bersama guna mencapai impian bersama dengan Saku Bareng. Produk Tabungan Raya memanfaatkan kekuatan jaringan yang dimiliki Raya dalam ekosistem Grup Bank Rakyat Indonesia (BRI Group), untuk memudahkan Nasabah melakukan pengelolaan keuangan sehari-hari.",
                                  "value": "Segala akibat yang timbul karena kelalaian atau ketidak hati-hatian Pengguna yang mengakibatkan penggunaan atau penyalahgunaan Digital Saving oleh pihak lain berikut dengan atau tanpa izin dari Nasabah akan menjadi tanggung jawab sepenuhnya dari Nasabah dan membebaskan Bank dari segala tuntutan."
                              },
                              {
                                  "classname": "mid table-blue",
                                  "colspan": true,
                                  "label": "<b>PERSYARATAN DAN TATA CARA</b>",
                                  "value": ""
                              },
                              {
                                  "label": "1.  Persyaratan Nasabah: <br>&emsp;a.  Memiliki wewenang untuk mengambil tindakan hukum menandatangani perjanjian mengikat dengan Bank dan tidak dilarang untuk melakukannya berdasarkan hukum yang berlaku.<br><br>&emsp;  b.  Warga Negara Indonesia (WNI) dan/atau Warga Negara Asing (WNA).<br><br>&emsp;  c.  Memiliki Kartu Tanda Penduduk Elektronik (KTP-el) dan NPWP yang berguna untuk proses pendaftaran rekening Digital Saving. Informasi KTP-el dan NPWP wajib diunggah Nasabah melalui sistem pembukaan rekening online Aplikasi Raya melalui kamera smartphone  dengan Bank Raya. <br><br>2.  Pendaftaran dapat dilakukan melalui microsite pembukaan rekening maupun Aplikasi Raya yang dapat diunduh melalui App Store (Apple) dan Google Play Store (Android) serta memiliki nomor ponsel Indonesia yang aktif dan valid agar dapat menerima SMS yang dikirim oleh Bank.<br><br>3.  Nasabah wajib memiliki dan memberikan alamat <i>email</i> aktif milik Nasabah sendiri yang memiliki kapasitas memadai untuk menerima pesan yang dikirim oleh Bank. Bank tidak bertanggung jawab atas keabsahan, kepemilikan, aktivitas, dan kapasitas alamat <i>email</i> tersebut.<br><br>4.  Proses pembukaan rekening pada Aplikasi Raya melalui verifikasi CDD dengan teknologi Face Recognition dan pengesahan penerbitan rekening menggunakan teknologi digital signature. Verifikasi tersebut telah sesuai dengan ketentuan Bank dan hukum serta perundangan yang berlaku, dan rekening yang diterbitkan telah sepenuhnya berstatus aktif.<br><br>5.  Adapun mekanisme digital signature yang digunakan oleh Aplikasi Raya, yakni penerbitan kode QR yang dibubuhkan pada dokumen pembukaan rekening Nasabah, dimana kode QR tersebut berisi data Nasabah beserta kode unik.<br><br>6.  Nasabah dapat menerima fasilitas Kartu ATM Bank Raya yang dapat diterbitkan melalui Unit Kerja Bank Raya.",
                                  "value": "7.  Apabila Nasabah ingin melakukan penambahan rekening dengan tujuan transaksional, maka Nasabah dapat melakukan pembentukan Saku Bujet.<br><br>8.  Apabila Nasabah ingin melakukan penambahan rekening dengan tujuan menabung, maka Nasabah dapat melakukan pembentukan Saku Pintar dan Saku Jaga.<br><br>9.  Nasabah dapat melakukan pengaturan target nominal dan periode pada Saku Pintar serta dapat melakukan pencairan ke rekening utama. Saku Pintar tidak dilengkapi dengan kartu ATM.<br><br>10.  Apabila Nasabah menginginkan menabung tanpa dapat dilakukan penarikan saldo, maka Nasabah dapat melakukan pembentukan Saku Jaga. Pada Saku Jaga tidak terdapat batas waktu periode simpanan dan tidak dilengkapi dengan kartu ATM.<br><br>11.  Pembukaan Saku tanpa melalui prosedur seperti pembukaan rekening utama.<br><br>12.  Penutupan Saku cukup dengan memilih menu “Tutup Saku” dan tanpa menghubungi Agen Sapa Raya dan/atau mendatangi Unit Kerja Bank Raya.<br><br>13.  Semua transaksi yang dilakukan Nasabah pada Bank Raya menggunakan mata uang Rupiah (IDR).<br><br>14.  Seluruh instruksi transaksi perbankan pada Bank Raya bersumber pada instruksi Nasabah. Nasabah setuju untuk melepaskan Bank dari seluruh kerugian, tanggung jawab, tuntutan, dan biaya (termasuk biaya adanya gugatan hukum) yang dapat muncul terkait dengan eksekusi instruksi Nasabah. <br><br>15.  Rekening Digital Saving dan Kartu ATM hanya dapat digunakan oleh Nasabah sendiri dan tidak dapat dipindahtangankan atau dialihkan dalam bentuk apapun dan dengan cara apapun kepada pihak lain."
                              },
                              {
                                  "classname": "mid table-blue",
                                  "colspan": true,
                                  "label": "<b>SIMULASI METODE PERHITUNGAN BUNGA HARIAN</b>",
                                  "value": ""
                              },
                              {
                                  "label": "1.  Nasabah membuka rekening Tabungan pada tanggal 1 dengan saldo sebesar Rp 1.000.000,-<br>2.  Nasabah tidak melakukan transaksi atas rekening sampai pada akhir bulan terkait.<br>3.  Pada tanggal 20 bulan terkait, Nasabah A mendapatkan bunga atas rekening sebesar: Rp 6.575,-",
                                  "value": "Adapun perhitungan pendapatan suku bunga (bunga tabungan 0.5%) atas rekening Nasabah adalah:<br>  -  Pendapatan bunga kotor: Rp 5.000.000,- X 0.5% X 19hari/365 hari = Rp 1.301,-<br>  -  Pajak atas bunga: 20% dari nilai pendapatan bunga kotor: Rp 260,-<br>  -  Pendapatan bunga atas rekening menjadi: Rp 1.041,-"
                              },
                              {
                                  "classname": "mid table-blue",
                                  "colspan": true,
                                  "label": "<b>INFORMASI TAMBAHAN</b>",
                                  "value": ""
                              },
                              {
                                  "colspan": true,
                                  "label": "1.  Bunga tabungan dikreditkan setiap tanggal 20 ke rekening yang bersangkutan.<br><br>2.  Bank wajib merahasiakan keterangan mengenai Nasabah dan simpanannya.<br><br>Suku bunga dapat berubah sewaktu-waktu sesuai dengan ketentuan regulator dan kebijakan Bank Raya.<br><br>3.  Bank wajib untuk menginformasikan segala perubahan atas manfaat, biaya, risiko, syarat dan ketentuan Produk, dan Layanan ini minimal 30 (tiga puluh) hari kerja melalui surat atau melalui cara- cara lainnya sesuai dengan syarat dan ketentuan yang berlaku. <br><br>4.  Nasabah akan menerima penawaran produk lain dari pihak ketiga apabila menyetujui untuk membagikan data pribadi.<br><br>5.  Informasi lain mengenai produk dan biaya layanan dapat diakses melalui FAQ Aplikasi Raya.",
                                  "value": ""
                              },
                              {
                                  "classname": "mid table-blue",
                                  "colspan": true,
                                  "label": "<b>DISCLAIMER</b>",
                                  "value": ""
                              },
                              {
                                  "colspan": true,
                                  "label": "1.  Nasabah telah membaca, menerima penjelasan dan memahami produk tabungan sesuai ringkasan informasi produk dan layanan. <br><br>2.  Bank berhak untuk menolak pembukaan rekening Tabungan antara lain jika Nasabah tidak memenuhi persyaratan pembukaan rekening yang berlaku.<br><br>3.  Informasi yang tercakup dalam Ringkasan Informasi Produk dan Layanan ini berlaku sampai dengan adanya perubahan terbaru ringkasan informasi produk dan layanan terkait Tabungan Raya. <br><br>4.  sNasabah wajib membaca dengan teliti Ringkasan Informasi Produk dan Layanan ini sebelum menyetujui pembukaan rekening tabungan dan berhak bertanya kepada pegawai Bank atas semua hal maupun pengaduan terkait Ringkasan Informasi Produk dan Layanan.",
                                  "value": ""
                              }
                          ]
                      },
                      "text": "",
                      "textName": "TAB2",
                      "textType": "TABLE"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>SYARAT DAN KETENTUAN PEMBUKAAN REKENING DIGITAL SAVING</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Sehubungan dengan pembukaan rekening <i>Digital Saving</i> oleh PT. Bank Raya Indonesia Tbk, atas permintaan Nasabah, dengan ini Nasabah menyatakan setuju bahwa Nasabah beserta rekening tersebut tunduk kepada syarat dan ketentuan di bawah ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>A.  DEFINISI</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "<b>Aplikasi Raya</b> adalah Mobile Banking Bank Raya yang diunduh dan terpasang pada smartphone Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "<b>ATM</b> adalah Anjungan Tunai Mandiri (<i>Automatic Teller Machine</i>).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "<b>Bank</b> adalah PT. Bank Raya Indonesia Tbk, berkedudukan di Jakarta Selatan, yang terdiri dari Kantor Pusat dan <i>Community Branch</i>.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "<b>Device</b> berarti semua perangkat elektronik, <i>wireless</i>, komunikasi, transmisi atau peralatan telekomunikasi, perangkat atau media yang termasuk dan tidak terbatas pada Internet, komputer atau peralatan <i>mobile</i>, perangkat, terminal atau sistem yang mungkin dibutuhkan untuk mengakses dan menggunakan Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "<b>Kartu ATM</b> adalah kartu fisik yang dapat digunakan untuk melakukan transaksi secara <i>offline</i> dan melakukan penarikan tunai di mesin ATM.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "<b>Kebijakan Privasi</b> adalah kebijakan mengenai batasan privasi setiap orang atau hak dari seorang individu untuk menentukan sesuatu tentang dirinya dapat disebarluaskan untuk kepentingan publik atau tidak.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "<b>Layanan Nasabah (Agen Sapa Raya)</b> adalah pusat layanan Nasabah yang dapat dihubungi melalui <i>line</i> telepon 1500 494 atau WhatsApp Sapa Raya di 081210000494.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "8",
                      "table": {},
                      "text": "<b>Nasabah </b>adalah pengguna jasa Bank yang memiliki portofolio simpanan dan/atau data <i>CIF</i> yang terdaftar dalam Sistem Aplikasi Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "9",
                      "table": {},
                      "text": "<b><i>Password</i> Aplikasi Bank Raya</b> adalah kata sandi (kombinasi huruf, angka dan simbol) yang bersifat rahasia untuk melakukan verifikasi User ID Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "10",
                      "table": {},
                      "text": "<b>Rekening</b> adalah rekening <i>Digital Saving</i> yang dibuka secara mandiri oleh Nasabah, setelah mendapatkan persetujuan dari Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "11",
                      "table": {},
                      "text": "<b>Saku Utama</b> adalah rekening dasar yang digunakan sebagai rekening sumber dasar dari rekening lainnya baik rekening Saku Bujet maupun Saku lainnya. Rekening utama dapat digunakan untuk keperluan transaksi perbankan sehari-hari dan rekening tersebut dihubungkan dengan kartu ATM yang diterbitkan secara fisik.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "12",
                      "table": {},
                      "text": "<b>Saku Bisnis</b> adalah Rekening tambahan bagi pengguna Aplikasi Raya yang juga memiliki usaha/bisnis, sehingga lebih memudahkan Nasabah untuk mengatur atau memisahkan antara keuangan pribadi dengan  bisnisnya, secara langsung dalam satu Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "13",
                      "table": {},
                      "text": "<b>Saku Bujet adalah rekening tambahan yang digunakan untuk transaksi sehari-hari dan bersifat fleksibel dan dapat digunakan untuk transaksi eksternal serta dihubungkan dengan kartu ATM.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "14",
                      "table": {},
                      "text": "<b>Saku Jaga</b> adalah rekening tambahan yang ditujukan untuk Nasabah yang menginginkan dananya tersimpan dengan aman dan memiliki suku bunga lebih tinggi. Pada Saku Jaga dibagi menjadi 2 (dua) model sebagai berikut : ",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 3,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "<b>Saku Jaga Optimal</b><br>Dana Nasabah yang akan di <i>hold</i> selama jangka waktu tertentu dengan manfaat bunga optimal sesuai dengan jangka waktu yang dipilih. Saku Jaga Optimal tidak dapat dilakukan pencairan ke Saku Utama selama fitur Bunga Optimal masih aktif, namun dapat dilakukan buka kunci menjadi Saku Jaga. Apabila Saku Jaga Optimal dilakukan buka kunci sebelum jatuh tempo, maka akan dikenakan pinalti bunga berjalan tidak dibayar. Setelah jangka waktu Bunga Optimal habis, sesuai dengan jangka waktu yang dipilih, Nasabah dapat mencairkan dana ke Saku Utama ataupun melanjutkan penyimpanan pada Saku Jaga dan/atau Saku Jaga Optimal.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 3,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "<b>Saku Jaga Normal</b><br>Saku Jaga dengan manfaat bunga yang lebih rendah dibanding Saku Jaga Optimal, tidak terdapat <i>hold</i> dana dalam waktu tertentu. Manfaat bunga disesuaikan dengan tiering nominal Nasabah, tidak terdapat pinalty apabila Nasabah akan melakukan pencairan ke Saku Utama.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "15",
                      "table": {},
                      "text": "<b>Saku Pintar</b> adalah rekening tambahan yang dapat dilakukan pengaturan target nominal dan jangka waktu sesuai dengan keinginan Nasabah. Pada Saku Pintar terdapat fitur <i>auto</i> debet hanya dapat ditujukan ke Saku Utama, untuk otomasi setoran bulanan atas target nominal yang ditentukan, yang sumber dananya berasal dari Saku Utama. Saku Pintar tidak terhubung dengan kartu ATM. Apabila Nasabah melakukan penutupan Saku Pintar, sebelum target waktu dan target saldo terpenuhi akan dikenakan penalti biaya administrasi dan bunga berjalan tidak dibayarkan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "16",
                      "table": {},
                      "text": "<b>Saku Bareng</b> adalah tipe rekening/saku yang aksesnya dapat diberikan kepada Nasabah lain sehingga pemilik dan orang yang bergabung dalam Saku dapat memonitor dan menabung bareng dalam 1 rekening.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>B.  NAMA DAN JENIS PRODUK</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Produk ini bernama Digital Saving yang merupakan produk dengan jenis Simpanan yang dibuka tanpa harus datang ke <i>Community Branch</i> (<i>digital</i>) dan transaksi yang dapat digunakan dan dimanfaatkan untuk keperluan transaksi Nasabah PT. Bank Raya Indonesia Tbk.<br>Digital Saving memiliki banyak jenis saku yang dapat digunakan Nasabah untuk berbagai kebutuhan, saku tersebut diantaranya yaitu:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Saku Utama",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Saku Bisnis",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Saku Bujet",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Saku Pintar",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Saku Jaga",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "Saku Bareng",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "Saku Lain yang akan dikembangkan kemudian hari",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>C.  PENERBIT PRODUK</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Rekening <i>Digital Saving</i> diterbitkan dan dikelola oleh PT. Bank Raya Indonesia Tbk.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>D.  FITUR UTAMA</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Rekening <i>Digital Saving</i> memiliki beragam fitur yang dapat dimanfaatkan oleh seluruh Nasabah, seperti menu Transfer, Top up <i>e-Wallet</i>, Pulsa, Tarik Tunai, Setor Tunai, dan Bayar Kartu Kredit.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>E.  RISIKO</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Segala akibat yang timbul karena kelalaian atau ketidak hati-hatian Pengguna yang mengakibatkan penggunaan atau penyalahgunaan <i>Digital Saving</i> oleh pihak lain berikut dengan atau tanpa izin dari Nasabah akan menjadi tanggung jawab sepenuhnya dari Nasabah dan membebaskan Bank dari segala tuntutan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>F.  MANFAAT</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Dengan membuka Rekening <i>Digital Saving</i> yang sudah menggunakan teknologi e-KYC, Nasabah dapat lebih mudah melakukan pengelolaan keuangan sesuai preferensi Nasabah melalui fitur Saku Bujet, membantu mencapai impian Nasabah melalui Saku Pintar, membantu Nasabah mengoptimalkan dana darurat dengan Saku Jaga, membantu pengelolaan keuangan bisnis Nasabah melalui Saku Bisnis, dan membantu Nasabah dan partner untuk menabung bersama guna mencapai impian bersama dengan Saku Bareng. Produk Tabungan Raya memanfaatkan kekuatan jaringan yang dimiliki Raya dalam ekosistem Grup Bank Rakyat Indonesia (BRI Group), untuk memudahkan Nasabah melakukan pengelolaan keuangan sehari-hari.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>G.  TATA CARA, SYARAT DAN KETENTUAN</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Persyaratan Nasabah :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Memiliki wewenang untuk mengambil tindakan hukum menandatangani perjanjian mengikat dengan Bank dan tidak dilarang untuk melakukannya berdasarkan hukum yang berlaku.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Warga Negara Indonesia (WNI) dan/atau Warga Negara Asing (WNA).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": "Memiliki Kartu Tanda Penduduk Elektronik (KTP-el) dan NPWP yang berguna untuk proses pendaftaran rekening <i>Digital Saving</i>. Informasi KTP-el dan NPWP wajib diunggah Nasabah melalui sistem pembukaan rekening online Aplikasi Raya melalui kamera <i>smartphone</i>  dengan Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Pendaftaran dapat dilakukan melalui microsite pembukaan rekening maupun Aplikasi Raya yang dapat diunduh melalui <i>App Store (Apple)</i> dan <i>Google Play Store</i> (Android) serta memiliki nomor ponsel Indonesia yang aktif dan valid agar dapat menerima SMS yang dikirim oleh Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Nasabah wajib memiliki dan memberikan alamat <i>email</i> aktif milik Nasabah sendiri yang memiliki kapasitas memadai untuk menerima pesan yang dikirim oleh Bank. Bank tidak bertanggung jawab atas keabsahan, kepemilikan, aktivitas, dan kapasitas alamat <i>email</i> tersebut.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Proses pembukaan rekening pada Aplikasi Raya melalui verifikasi CDD dengan teknologi <i>Face Recognition</i> dan pengesahan penerbitan rekening menggunakan teknologi <i>digital signature</i>. Verifikasi tersebut telah sesuai dengan ketentuan Bank dan hukum serta perundangan yang berlaku, dan rekening yang diterbitkan telah sepenuhnya berstatus aktif.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Adapun mekanisme <i>digital signature</i> yang digunakan oleh Aplikasi Raya, yakni penerbitan kode QR yang dibubuhkan pada dokumen pembukaan rekening Nasabah, dimana kode QR tersebut berisi data Nasabah beserta kode unik.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "Nasabah dapat menerima fasilitas Kartu ATM Bank Raya yang dapat diterbitkan melalui Unit Kerja Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "Apabila Nasabah ingin melakukan penambahan rekening dengan tujuan transaksional, maka Nasabah dapat melakukan pembentukan Saku Bujet.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "8",
                      "table": {},
                      "text": "Apabila Nasabah ingin melakukan penambahan rekening dengan tujuan menabung, maka Nasabah dapat melakukan pembentukan Saku Pintar dan Saku Jaga.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "9",
                      "table": {},
                      "text": "Nasabah dapat melakukan pengaturan target nominal dan periode pada Saku Pintar serta dapat melakukan pencairan ke rekening utama. Saku Pintar tidak dilengkapi dengan kartu ATM.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "10",
                      "table": {},
                      "text": "Apabila Nasabah menginginkan menabung tanpa dapat dilakukan penarikan saldo, maka Nasabah dapat melakukan pembentukan Saku Jaga. Pada Saku Jaga tidak terdapat batas waktu periode simpanan dan tidak dilengkapi dengan kartu ATM.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "11",
                      "table": {},
                      "text": "Pembukaan Saku tanpa melalui prosedur seperti pembukaan rekening utama.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "12",
                      "table": {},
                      "text": "Penutupan Saku cukup dengan memilih menu “Tutup Saku” dan tanpa menghubungi Agen Sapa Raya dan/atau mendatangi Unit Kerja Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "13",
                      "table": {},
                      "text": "Semua transaksi yang dilakukan Nasabah pada Bank Raya menggunakan mata uang Rupiah (IDR).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "14",
                      "table": {},
                      "text": "Seluruh instruksi transaksi perbankan pada Bank Raya bersumber pada instruksi Nasabah. Nasabah setuju untuk melepaskan Bank dari seluruh kerugian, tanggung jawab, tuntutan, dan biaya (termasuk biaya adanya gugatan hukum) yang dapat muncul terkait dengan eksekusi instruksi Nasabah, kecuali Nasabah dapat membuktikan lain dan/atau transaksi tersebut dieksekusi karena kesalahan Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "15",
                      "table": {},
                      "text": "Rekening <i>Digital Saving</i> dan Kartu ATM hanya dapat digunakan oleh Nasabah sendiri dan tidak dapat dipindahtangankan atau dialihkan dalam bentuk apapun dan dengan cara apapun kepada pihak lain.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>H.  INFORMASI KEAMANAN</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Informasi keamanan berupa Nama Pengguna, Kata Sandi, dan PIN akan dibutuhkan untuk login, aktivasi perangkat, dan mengeksekusi setiap transaksi yang menurut Bank dibutuhkan sebagai tujuan otentikasi. Untuk tiap informasi keamanan yang akan ditentukan dan ditetapkan oleh Nasabah, Nasabah harus memastikan untuk menggunakan Kata Sandi yang kuat dan tidak memasukkan Kata Sandi yang mudah ditebak serta informasi diri seperti tanggal lahir, nama dan alamat. Penggunaan informasi tersebut akan dianggap sebagai Kelalaian Nasabah. Nasabah bertanggung jawab penuh terhadap keamanan dan kerahasiaan seluruh penggunaan Aplikasi Raya miliknya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Informasi keamanan akan menjadi rahasia di bawah tanggung jawab Nasabah, karena informasi tersebut memiliki keberlakuan setara dengan instruksi tertulis yang ditandatangani oleh Nasabah, dan akan diperlakukan sebagai otorisasi eksplisit oleh Nasabah agar Bank melaksanakan transaksi melalui Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Bank akan mengajukan proses verifikasi yang memenuhi standar Bank untuk memungkinkan Nasabah melakukan transaksi keuangan dan/atau <i>non</i>-keuangan. Proses verifikasi terhadap keabsahan data Nasabah merujuk ke data Nasabah pada saat pembukaan rekening.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Nasabah bertanggung jawab untuk memperoleh dan menggunakan perangkat lunak dan/atau peralatan yang diperlukan untuk dapat mengakses Aplikasi Raya dengan risiko yang ditanggung Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Nasabah juga bertanggung jawab atas kinerja dan keamanan (termasuk tanpa batasan mengambil semua langkah yang diperlukan untuk mencegah penggunaan atau akses yang tidak sah) dari setiap peralatan/<i>device</i> yang digunakan oleh Nasabah untuk mengakses Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "Nasabah harus memastikan bahwa peralatan yang digunakan untuk mengakses Aplikasi Raya bebas dari kegagalan elektronik, mekanik, data yang gagal atau terkorupsi, virus komputer, <i>bug</i> dan/atau perangkat lunak yang berbahaya/tidak diizinkan oleh penyedia layanan telekomunikasi, atau produsen atau vendor dari peralatan yang relevan, termasuk :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Penggunaan komputer pribadi Nasabah, perangkat <i>mobile</i> dan/atau Terminal Nasabah lainnya dengan perangkat lunak berupa anti-virus terbaru, anti-<i>malware</i> dan <i>firewall</i> yang tersedia dan perangkat lunak yang digunakan secara teratur selalu diperbarui dan dijalankan dengan anti-virus <i>signatures</i> terbaru.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Memastikan bahwa Nasabah tidak melakukan <i>jailbreak</i>, root atau memodifikasi perangkat <i>mobile</i> dan/atau Peralatan lainnya, atau mengunduh aplikasi yang tidak diizinkan karena hal ini dapat membuat perangkat lebih rentan terhadap virus dan <i>malware</i>.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "Nasabah menyetujui bahwa Bank tidak bertanggung jawab atas kegagalan elektronik maupun mekanik, atau data yang terkorupsi, virus komputer, bug dan/atau perangkat lunak yang berbahaya lainnya dari jenis apapun yang mungkin timbul dari layanan yang disediakan oleh penyedia layanan internet yang relevan atau informasi penyedia layanan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "8",
                      "table": {},
                      "text": "Nasabah bertanggung jawab untuk keamanan kartu ATM yang diterbitkan oleh Bank Raya, termasuk perlindungan dari pencurian dan penyalahgunaan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "9",
                      "table": {},
                      "text": "Kartu ATM Bank Raya diterbitkan dengan validitas yang menunjukkan bulan dan tahun. Tanggal kadaluarsa adalah hari terakhir dalam bulan dan tahun yang tercetak pada kartu. Setelah kartu ATM tersebut kadaluarsa, kartu tersebut akan dibatalkan dan Nasabah tidak lagi berhak untuk menyimpan atau menggunakannya. Kartu tersebut harus dihancurkan dengan cara mengguntingnya (termasuk chip dalam kartu tersebut) menjadi dua secara diagonal dan mengambil langkah-langkah yang diperlukan untuk mencegah detail kartu disalahgunakan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "10",
                      "table": {},
                      "text": "Dengan melaksanakan transaksi melalui Bank Raya dan/atau Aplikasi Raya, Nasabah memahami bahwa seluruh komunikasi dan instruksi dari Nasabah yang diterima oleh Bank akan diperlakukan sebagai bukti sah meskipun tidak dibuat dalam bentuk dokumen tertulis atau diterbitkan dalam bentuk dokumen yang ditandatangani, dan dengan demikian, Nasabah setuju untuk mengganti rugi dan melepaskan Bank dari segala akibat yang timbul (baik  kerugian, tanggung jawab, tuntutan dan pengeluaran termasuk biaya hukum) dari eksekusi berdasarkan instruksi nasabah, kecuali kesalahan eksekusi dari instruksi diakibatkan oleh kesalahan atau kelalaian pihak Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>I.  REKENING</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Pembukaan rekening wajib didasarkan atas permohonan Nasabah dengan memenuhi segala persyaratan yang ditentukan oleh Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Bank melarang segala bentuk penyalahgunaan rekening, termasuk sebagai sarana tindakan yang terindikasi melawan hukum. Dalam hal terdapat indikasi penyalahgunaan rekening oleh Nasabah, maka Bank berhak untuk melakukan pemblokiran rekening disertai (surat pemberitahuan), melakukan verifikasi lebih lanjut dan mendebet kembali dana untuk diselesaikan sesuai dengan ketentuan yang berlaku dan atau sesuai kebijakan Bank, dan/atau penutupan rekening.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Rekening dinyatakan efektif setelah disetujui dan diaktifkan oleh Bank sesuai dengan ketentuan yang berlaku di Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Rekening ditatakerjakan sesuai dengan syarat dan ketentuan yang berlaku pada Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Pembukaan Rekening <i>Digital Saving</i> dapat diikuti dengan pemberian fasilitas kartu ATM disertai PIN.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "Nasabah bertanggung jawab dan wajib menjaga dengan baik penggunaan kartu ATM dan kerahasiaan PIN kartu ATM serta akses password dan PIN Aplikasi Raya, agar tidak dipergunakan oleh pihak lain yang tidak berhak. Setiap penyalahgunaan terhadap Kartu ATM maupun Aplikasi Raya dan segala akibat serta kerugian yang ditimbulkan merupakan tanggung jawab dan risiko Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "Rekening Digital Saving dapat dimanfaatkan untuk pembayaran tagihan rutin secara otomatis dan fasilitas lain yang tersedia oleh Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>J.  INFORMASI DATA NASABAH/CUSTOMER INFORMATION FILE (CIF)</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Bank atas kebijakannya sendiri berhak memperoleh informasi secara lisan maupun tertulis, meminta dokumen yang dibutuhkan termasuk dokumen pendukung kepada Nasabah sesuai dengan keperluannya, melakukan identifikasi dan verifikasi atas informasi dan dokumen dimaksud dan/atau melakukan on the spot ke tempat domisili Nasabah apabila dibutuhkan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Bank atas kebijakannya sendiri berhak menolak permohonan pembukaan rekening tanpa berkewajiban untuk mengemukakan alasannya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Informasi data Nasabah berikut simpanannya tunduk kepada ketentuan yang berlaku tentang kerahasiaan bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>J.  PERINTAH TRANSAKSI</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Perintah transaksi adalah setiap permintaan Nasabah kepada Bank untuk membukukan suatu penambahan saldo (penyetoran dana) atau pengurangan saldo (penarikan dana) pada rekening Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Nasabah bertanggung jawab atas keamanan perintah transaksi/surat berharga yang diberikan oleh Bank, termasuk penyalahgunaannya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Transaksi penarikan dapat dilakukan secara tunai maupun secara pemindahbukuan melalui jaringan <i>e-channel</i> Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Ketentuan maksimum transaksi tunduk dengan ketentuan yang berlaku di Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Nasabah bertanggung jawab atas kebenaran perintah transaksi yang diberikan kepada Bank. Perintah transaksi yang telah dilaksanakan Bank tidak dapat dibatalkan atau diubah oleh Nasabah. Namun Bank atas pertimbangannya sendiri dapat memenuhi permintaan Nasabah untuk membatalkan atau mengubah perintah transaksi dengan ketentuan Nasabah menanggung dan membebaskan Bank dari setiap tuntutan atau gugatan dari pihak manapun dan dari segala biaya yang timbul sehubungan dengan tindakan pembatalan atau perubahan perintah transaksi.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>L.  KEBIJAKAN DAN KETENTUAN BANK</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Kebijakan, administrasi dan operasional Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Kebijakan mengenai layanan jasa dan/atau fasilitas-fasilitas yang dapat diberikan oleh Bank kepada Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Kebijakan dan ketentuan berkaitan dengan tarif/biaya-biaya layanan jasa perbankan, bunga termasuk cara perhitungannya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Kebijakan dan ketentuan masing-masing produk yang dilayani oleh Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Pembukaan Rekening, pengelolaan rekening dan penutupan rekening, termasuk setiap perubahan yang dilakukan atas syarat dan ketentuan dimaksud.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>M.  BUNGA DAN BIAYA-BIAYA</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Apabila tidak ditentukan lain, setiap bunga yang ditawarkan oleh Bank kepada Nasabah dapat berubah mengikuti kondisi pasar perbankan dan kebijakan intern Bank yang akan diberitahukan secara umum melalui Kantor Bank, tanpa pemberitahuan sebelumnya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Nasabah dengan ini menyatakan setuju untuk menanggung biaya-biaya berkaitan dengan fasilitas dan layanan jasa yang diberikan oleh Bank kepada Nasabah yang besarnya ditetapkan oleh Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Sehubungan dengan simpanan ini, Nasabah wajib membayar pajak atas hasil bunga simpanan sesuai dengan ketentuan perundangan yang berlaku yang pelaksanaannya dilakukan oleh Bank sebagai wajib pungut.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Nasabah wajib membayar bea materai sesuai dengan ketentuan yang berlaku.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Bunga dihitung berdasarkan saldo harian, diperhitungkan pada setiap awal bulan dan akan ditambahkan ke rekening Nasabah pada awal bulan berikutnya atau sesuai ketentuan Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "Terhadap bunga simpanan dikenakan Pajak Penghasilan (PPh) sesuai dengan peraturan yang berlaku.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "Bank berhak untuk menentukan perubahan pada besarnya biaya sehubungan dengan produk atau layanan dan akan memberitahukan terlebih dahulu kepada seluruh Nasabah termasuk Pemilik Rekening melalui media komunikasi yang dimiliki oleh Bank baik dalam bentuk pengumuman tertulis, pamflet, <i>website</i> dan media lainnya sesuai dengan ketentuan yang berlaku.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>N.  NASABAH MENINGGAL DUNIA</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Dalam hal Nasabah meninggal dunia, Bank sewaktu-waktu berhak untuk melakukan penutupan rekening secara administratif untuk sementara.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Apabila Nasabah meninggal dunia, maka sisa saldo akan dibayarkan/dialihkan kepada ahli waris Nasabah sesuai ketentuan yang berlaku pada Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Dengan penyerahan sisa saldo Nasabah yang meninggal dunia kepada ahli waris atau kuasa/wali mereka yang sah yang disebutkan dalam keterangan hak waris atau dokumen-dokumen resmi lainnya yang berlaku pada Bank, maka Bank dibebaskan sepenuhnya dari semua tanggung jawab atas hal ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Bank berhak meminta dokumen yang dapat diterima sebagai bukti sah tentang kedudukan sebagai ahli waris atau pengganti hak meliputi :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Menunjukkan asli surat kematian/kutipan akta kematian dan menyerahkan <i>copy</i> surat kematian yang dilegalisir oleh Kelurahan/Kecamatan atau kutipan akta kelahiran yang dilegalisir oleh Dinas Kependudukan dan Catatan Sipil.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Menunjukkan asli surat keterangan ahli waris/surat pernyataan waris, dan menyerahkan <i>copy</i> surat keterangan ahli waris/surat pernyataan waris yang dilegalisir oleh Kelurahan/Kecamatan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": "Asli surat kuasa khusus (apabila ahli waris lebih dari satu dan tidak semua ahli waris dapat hadir).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "d",
                      "table": {},
                      "text": "<i>Copy</i> bukti identitas diri (fotokopi KTP dan KK yang dilegalisir oleh Kelurahan/Kecamatan) para ahli waris.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "e",
                      "table": {},
                      "text": "<i>Copy</i> bukti identitas diri (fotokopi KTP yang dilegalisir oleh Kelurahan/Kecamatan) Nasabah yang meninggal",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>O.  CATATAN BANK DAN PEMBERITAHUAN</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Bank membuat dan menyediakan catatan atas setiap mutasi dan saldo rekening Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Apabila terdapat perbedaan antara catatan Bank dengan catatan yang dibuat oleh Nasabah, dengan ini Nasabah menyatakan tunduk pada catatan yang ada pada Bank dan mengakui bahwa catatan yang dibuat oleh Bank merupakan alat bukti yang sempurna yang mengikat Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Bank menurut kebijakannya sendiri dapat menentukan suatu periode jangka waktu catatan yang tersedia bagi Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Cara pemberitahuan mengenai catatan Bank tersebut kepada Nasabah tergantung pada standar pelayanan yang berlaku pada Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Setiap pemberitahuan oleh Bank dianggap telah diterima oleh Nasabah apabila telah dikirim ke alamat yang diberikan oleh Nasabah secara tertulis atau alamat terakhir sesuai catatan pada Bank dan apabila dalam waktu 7 (tujuh) hari kalender tidak ada penyangkalan secara tertulis oleh Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>P.  PEMBLOKIRAN DAN PENUTUPAN REKENING</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Salah satu rekening yang dimiliki Nasabah diduga telah disalahgunakan, meliputi tetapi tidak terbatas pada mengakomodasi dan/atau melakukan tindak kriminal dan/atau telah atau akan terjadi penipuan yang terkait dengan Rekening dan/atau layanan/fasilitas perbankan Nasabah termasuk yang menimbulkan kerugian bagi masyarakat dan pihak lain, dan/atau Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Nasabah memberikan data/informasi yang dianggap mencurigakan oleh Bank dan/atau memberikan data/informasi palsu/tidak valid/tidak lengkap, dan/atau tidak bersedia memberikan data/informasi apapun yang diminta oleh Bank sesuai dengan hukum dan perundangan yang berlaku. Nasabah terkena sanksi <i>screening</i> berdasarkan peraturan yang berlaku di Bank dan/ atau sanksi screening pada negara penerima.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Profil data Nasabah Daftar Teroris dan Terduga Teroris (DTTOT) dan Daftar Proliferasi Senjata Pemusnah Massal (DPSPM).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Terdapat permintaan tertulis dari instansi Kepolisian, Kejaksaan, Pengadilan, Pusat Pelaporan dan Analisis Transaksi Keuangan (PPATK), Kantor Pajak, atau lembaga berwenang lainnya sesuai dengan hukum dan perundangan yang berlaku atau untuk memenuhi kewajiban/hutang yang belum diselesaikan oleh Nasabah kepada Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Nasabah setiap saat dapat mengajukan permohonan pemblokiran saldo/rekening/kartu dan/atau pembukaan blokir saldo/rekening/kartu miliknya kepada Bank, sesuai ketentuan yang berlaku pada masing-masing produk.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "Dalam hal terjadi perselisihan baik mengenai pemilikan maupun kewenangan atas suatu rekening, maka Bank atas pertimbangannya sendiri dapat sewaktu-waktu memblokir rekening yang menjadi objek perselisihan sampai dengan adanya putusan pengadilan yang berkekuatan hukum tetap.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "Bank dapat melakukan pemblokiran terhadap rekening Nasabah atas perintah lembaga berwenang dan/atau pihak yang berwenang sesuai dengan ketentuan yang berlaku.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "8",
                      "table": {},
                      "text": "Dalam hal terjadi Pemblokiran atas perintah dan/atau permintaan dari pejabat instansi yang berwenang sesuai dengan ketentuan peraturan yang berlaku, Bank dapat melakukan pemblokiran terhadap Rekening yang dimaksud.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "9",
                      "table": {},
                      "text": "Nasabah dengan ini menyatakan tidak keberatan rekening <i>Digital Saving</i>-nya ditutup apabila Nasabah melakukan pelanggaran ketentuan Bank Indonesia sesuai dengan ketentuan perundang-undangan yang berlaku.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "10",
                      "table": {},
                      "text": "Penutupan rekening dapat dilakukan berdasarkan inisiasi Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>Q.  HUKUM YANG BERLAKU DAN DOMILISI</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Syarat dan Ketentuan Pembukaan rekening ini ditafsirkan berdasarkan dan tunduk pada  ketentuan hukum yang berlaku di Republik Indonesia.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Bank dan Pemilik Rekening dengan segala akibat hukumnya sepakat untuk memilih kediaman hukum pada Kantor Pengadilan Negeri yang meliputi Unit Kerja dimana Rekening dibuka dengan menggunakan Hukum Indonesia.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>R.  PENJAMINAN SIMPANAN</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Dana yang tersedia dalam rekening Nasabah dijamin dalam program penjaminan yang diselenggarakan Lembaga Penjamin Simpanan (LPS) sesuai dengan syarat dan ketentuan yang ditetapkan oleh LPS. Adapun batas maksimal saldo simpanan dan tingkat suku bunga yang dijamin LPS adalah :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Saldo simpanan <br>Saldo simpanan maksimum yang ditetapkan dan/atau akan ditetapkan dari waktu ke waktu berdasarkan ketentuan LPS.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Suku bunga  <br>Suku bunga maksimum yang ditetapkan dan/atau akan ditetapkan dari waktu ke waktu berdasarkan ketentuan LPS.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Apabila simpanan Nasabah yang meliputi nilai pokok simpanan dan bunga melebihi jumlah maksimal simpanan yang dijamin oleh LPS dan/atau apabila Nasabah menerima tingkat suku bunga yang melebihi maksimal tingkat suku bunga penjaminan yang ditetapkan oleh LPS, maka simpanan Nasabah tersebut tidak termasuk dalam program penjaminan simpanan oleh LPS.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>S.  PENYELESAIAN PENGADUAN NASABAH</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Pengaduan oleh Nasabah dapat dilakukan melalui <i>Contact Center</i> Sapa Raya 1500494 atau <i>WhatsApp</i> Sapa Raya di 081210000494 atau <i>Community Branch</i> Bank terdekat.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Pengaduan yang diterima oleh Bank Raya akan diselesaikan dalam waktu paling lambat 5 (lima) Hari kerja untuk pengaduan lisan, dan paling lambat 10 (sepuluh) hari kerja untuk pengaduan tertulis.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>T.  PERNYATAAN PEMILIK REKENING</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Dengan menyetujui Syarat dan Ketentuan ini, saya menyatakan hal-hal sebagai berikut :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Mengikatkan diri terhadap seluruh Syarat dan Ketentuan Pembukaan rekening",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Data pribadi yang diberikan sebagaimana disyaratkan dalam syarat dan ketentuan ini maupun dalam formulir Bank pemanfaatan Produk Bank lainnya adalah yang sebenar-benarnya dan Bank dibebaskan dari segala tuntutan/gugatan/ganti rugi dari pihak ketiga terkait ketidakabsahan data pribadi dimaksud.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Telah melengkapi dan menyerahkan seluruh persyaratan yang telah ditentukan oleh Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Telah membaca, memahami, dan menyetujui seluruh Syarat dan Ketentuan Pembukaan Rekening <i>Digital Saving</i>.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Bank dapat melakukan pemeriksaan terhadap kebenaran data yang saya berikan dalam Bank pemanfaatan Produk Bank, apabila dikemudian hari terdapat tuntutan dan/atau gugatan atas transaksi dan/atau rekening, maka saya akan bertanggungjawab secara penuh dan membebaskan Bank dari segala macam tuntutan dan/atau gugatan pihak ketiga baik perdata maupun pidana atas ketidakbenaran dalam pengisian data pribadi.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "Segera memperbaharui data pribadi apabila terdapat kesalahan dan/atau perubahan atas data dimaksud.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "Menerima dan menyetujui bahwa apa yang telah disampaikan di dalam Syarat dan Ketentuan Pembukaan Rekening <i>Digital Saving</i> dan dokumen tertulis lainnya terkait dengan Syarat dan ketentuan ini sepenuhnya merupakan tanggung jawab saya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "8",
                      "table": {},
                      "text": "Dana yang disetorkan oleh Pemilik Rekening bukan berasal dan/atau terkait dengan pelanggaran terhadap ketentuan hukum berlaku baik dibidang perdata maupun pidana dan/atau bidang lainnya dan/atau tidak terkait dengan Tindak Pidana Pencucian Uang (TPPU) dan/atau Tindak Pidana Pendanaan Terorisme (TPPT).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "9",
                      "table": {},
                      "text": "Bank telah memberikan penjelasan yang cukup mengenai karakteristik Produk Bank yang akan saya manfaatkan dan saya telah mengerti dan memahami segala konsekuensi pemanfaatan Produk Bank, termasuk manfaat, risiko, dan biaya-biaya yang melekat pada Produk Bank tersebut.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b><u>APLIKASI RAYA</u></b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>A.  KETENTUAN PENGGUNAAN</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Mengikatkan diri terhadap seluruh Syarat dan Ketentuan Pembukaan rekening",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Pada saat pertama kali menggunakan layanan Aplikasi Raya, Nasabah harus melakukan pembentukan <i>account</i> pada Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Nasabah wajib memastikan ketepatan dan kelengkapan perintah transaksi (termasuk memastikan bahwa semua data yang diperlukan untuk transaksi telah diisi secara lengkap dan benar). Bank Raya tidak bertanggung jawab terhadap segala akibat yang mungkin timbul yang disebabkan kelalaian, ketidaklengkapan, ketidakjelasan, atau ketidaktepatan perintah/data dari Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Nasabah memiliki kesempatan untuk memeriksa kembali dan atau membatalkan data yang telah diisi pada saat konfirmasi yang dilakukan secara otomatis oleh sistem sebelum memberikan persetujuan atas transaksi dimaksud.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Persetujuan atas pelaksanaan transaksi dilakukan apabila Nasabah telah meyakini kebenaran dan kelengkapan data yang diisi pada sistem melakukan konfirmasi.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "Segala transaksi yang telah diperintahkan kepada Bank Raya dan disetujui oleh Nasabah tidak dapat dibatalkan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "Setiap perintah yang telah disetujui dari Nasabah yang tersimpan pada pusat data Bank Raya merupakan data yang benar yang diterima sebagai bukti perintah dari Nasabah   kepada Bank Raya untuk melaksanakan transaksi yang dimaksud.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "8",
                      "table": {},
                      "text": "Bank Raya menerima dan menjalankan setiap perintah dari Nasabah sebagai perintah yang sah berdasarkan penggunaan <i>password</i> dan Bank Raya tidak mempunyai kewajiban untuk meneliti atau menyelidiki keaslian maupun keabsahan atau kewenangan pengguna <i>password</i>. Dan oleh karena itu perintah tersebut sah mengikat Nasabah dengan sebagaimana mestinya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "9",
                      "table": {},
                      "text": "Pada setiap transaksi finansial, sistem akan selalu melakukan konfirmasi terhadap data yang diinput Nasabah dan Nasabah mempunyai kesempatan untuk membatalkan data tersebut dengan mengklik tombol “Batal”. Sebagai tanda persetujuan atas data transaksi yang ditampilkan Aplikasi Raya, Nasabah harus mengklik tombol “Lanjutkan” pada menu konfirmasi transaksi finansial.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "10",
                      "table": {},
                      "text": "Setiap informasi/transaksi yang telah mendapat persetujuan dari Nasabah yang tersimpan dalam pusat data merupakan data yang benar yang diterima sebagai bukti atas instruksi dari Nasabah kepada Bank Raya untuk melakukan transaksi yang dimaksud.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "11",
                      "table": {},
                      "text": "Untuk transaksi dengan tanggal efektif hari ini, Nasabah tidak dapat membatalkan semua transaksi yang telah diotorisasi oleh Nasabah dengan <i>password</i> dan PIN serta mendapatkan persetujuan Nasabah, karena dalam waktu yang sama Bank Raya langsung memproses instruksi tersebut.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "12",
                      "table": {},
                      "text": "Bank Raya berhak untuk tidak melaksanakan perintah dari Nasabah, apabila :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Saldo rekening Nasabah di Bank Raya tidak cukup atau rekening di blokir/ditutup atau berdasarkan pertimbangan lain dari Bank Raya yang akan diberitahukan kepada Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Bank Raya mengetahui atau mempunyai alasan untuk menduga bahwa penipuan atau kejahatan telah atau akan dilakukan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "13",
                      "table": {},
                      "text": "Nasabah wajib memastikan bahwa saldo dalam rekening Nasabah mencukupi sebelum instruksi transaksi dilaksanakan oleh Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "14",
                      "table": {},
                      "text": "Nasabah wajib dan bertanggung jawab untuk memastikan ketepatan dan kelengkapan instruksi transaksi.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "15",
                      "table": {},
                      "text": "Sebagai bukti bahwa transaksi yang diperintahkan Nasabah telah berhasil dilakukan oleh Bank Raya, Nasabah akan mendapatkan bukti transaksi berupa nomor transaksi/referensi pada halaman transaksi layanan Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "16",
                      "table": {},
                      "text": "Nasabah menyetujui dan mengakui bahwa catatan, <i>tape/cartridge, print out</i> komputer, salinan atau bentuk penyimpanan informasi atau data lain sebagai bukti yang sah atas instruksi dari Nasabah, demikian juga sarana komunikasi lain yang diterima atau dikirimkan oleh Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "17",
                      "table": {},
                      "text": "Nasabah menyetujui dan mengakui untuk tidak membantah keabsahan, kebenaran atau keaslian bukti instruksi dan komunikasi yang ditransmisi secara elektronik antara kedua belah pihak, termasuk dokumen dalam bentuk catatan komputer atau bukti transaksi Bank Raya, tape/cartridge, print out komputer, salinan atau bentuk penyimpanan informasi yang lain, dan semua alat atau dokumen tersebut merupakan satu-satunya alat bukti yang sah atas transaksi-transaksi perbankan melalui Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "18",
                      "table": {},
                      "text": "Nasabah menyetujui dan mengakui dengan melakukan transaksi melalui Aplikasi Raya, Nasabah mengakui semua komunikasi dan instruksi dari Nasabah yang diterima Bank Raya akan diperlakukan sebagai alat bukti yang sah meskipun tidak dibuat dokumen tertulis ataupun dikeluarkan dokumen yang ditandatangani.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "19",
                      "table": {},
                      "text": "Atas pertimbangannya Bank, maka Bank berhak untuk mengubah limit transaksi pada sap Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "20",
                      "table": {},
                      "text": "Bank Raya berhak menghentikan layanan Aplikasi Raya untuk sementara waktu maupun untuk jangka waktu tertentu yang ditentukan oleh Bank Raya untuk keperluan pembaharuan, pemeliharaan atau untuk tujuan lain dengan alasan apapun yang dianggap baik oleh Bank Raya, dan untuk itu Bank Raya berkewajiban menginformasikan hal tersebut kepada Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "21",
                      "table": {},
                      "text": "Alamat <i>email</i> yang didaftarkan oleh Nasabah merupakan <i>email</i> yang akan digunakan oleh Bank Raya untuk mengirimkan informasi transaksi yang telah dilakukan oleh Nasabah melalui Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "22",
                      "table": {},
                      "text": "Bank Raya hanya mengirimkan informasi kepada alamat <i>email</i> yang telah dikonfirmasikan kebenarannya oleh Nasabah kepada Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "23",
                      "table": {},
                      "text": "Nasabah menyetujui untuk menerima pemberitahuan melalui sarana elektronik sesuai ketentuan hukum yang berlaku, Syarat dan Ketentuan ini, serta notifikasi lainnya mengenai penggunaan Nasabah terhadap Rekening atau produk/layanan dari Bank Raya. Sarana elektronik termasuk namun tidak terbatas pada surat elektronik, ditampilkan pada halaman situs, pada Aplikasi Raya atau melalui sarana komunikasi nirkabel. Ketentuan, perjanjian dan notifikasi di atas akan dianggap telah diterima saat diterbitkan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>B.  <i>PASSWORD</i> APLIKASI RAYA </b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "<i>Password</i> merupakan kode kombinasi alfanumerik dan simbol yang bersifat rahasia dan kewenangan penggunaannya ada pada Nasabah. PIN merupakan kode numerik yang bersifat rahasia dan kewenangan penggunaannya ada pada Nasabah. Nasabah wajib menjaga dengan baik password tersebut.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "<i>Password</i> Nasabah akan diblokir jika melakukan hal berikut :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Salah memasukkan <i>password</i> sebanyak 3 (tiga) kali berturut-turut dalam 1 (satu) hari.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Mengajukan penggantian kartu ATM Bank Raya dan atau dilaporkan kartu ATM Bank Raya hilang.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": "PIN dilaporkan telah diketahui oleh orang lain.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "d",
                      "table": {},
                      "text": "Hasil penelitian Bank Raya mengindikasikan adanya kemungkinan PIN  Nasabah telah diketahui oleh orang lain.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Apabila Nasabah bermaksud akan menggunakan layanan Aplikasi Raya kembali setelah <i>password</i> terblokir, maka Nasabah harus melakukan pembukaan blokir melalui Unit Kerja Bank Raya atau Agen Sapa Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Nasabah wajib mengamankan PIN dan <i>password</i> Aplikasi Raya dengan  cara:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Tidak memberitahukan PIN dan <i>password</i> Aplikasi Raya kepada orang lain.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Tidak mencatatkan PIN dan <i>password</i> Aplikasi Raya pada kertas atau menyimpannya secara tertulis atau sarana penyimpanan lainnya yang memungkinkan diketahui orang lain.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": "Berhati-hati menggunakan PIN dan <i>password</i> Aplikasi Raya agar tidak diketahui oleh orang lain.  ",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "d",
                      "table": {},
                      "text": "Mengganti PIN dan <i>password</i> Aplikasi Raya  secara berkala.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "e",
                      "table": {},
                      "text": "Tidak menggunakan PIN dan <i>password</i> Aplikasi Raya yang diberikan oleh orang lain atau  yang mudah diterka seperti tanggal lahir atau kombinasinya, nomor telepon dan lain-lain.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Dalam hal Nasabah mengetahui atau menduga PIN dan <i>password</i> Aplikasi Raya telah diketahui oleh orang lain yang tidak berwenang, maka Nasabah wajib segera melakukan pengamanan dengan melakukan perubahan PIN dan <i>password</i>. Apabila karena suatu sebab Nasabah tidak dapat melakukan perubahan <i>password</i> maka Nasabah wajib memberitahukan kepada Bank Raya. Segala instruksi transaksi berdasarkan penggunaan PIN dan <i>password</i> yang terjadi sebelum pejabat yang berwenang dari Bank Raya menerima secara tertulis laporan tersebut merupakan tanggung jawab sepenuhnya dari Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "Penggunaan PIN dan <i>password</i> Aplikasi Raya mempunyai kekuatan hukum yang sama dengan perintah tertulis yang ditandatangani oleh Nasabah, termasuk namun tidak terbatas untuk melakukan pendebetan rekening Nasabah baik dalam rangka pelaksanaan transaksi yang diperintahkan maupun pembayaran biaya transaksi yang telah dan/atau akan ditetapkan kemudian oleh Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "Segala penyalahgunaan PIN dan <i>password</i> Aplikasi Raya (termasuk kode transaksi) merupakan tanggung jawab Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>C.  BIAYA - BIAYA</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Bank Raya berhak untuk mendebet biaya-biaya transaksi yang dibebankan atas penggunaan fasilitas Aplikasi Raya  dan transaksi yang dilakukan melalui Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Nasabah dengan ini menyetujui bahwa terhadap penggunaan fasilitas Aplikasi Raya  akan dikenakan biaya administrasi bulanan dan/atau biaya transaksi, yang akan didebet secara otomatis dari rekening Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Bank Raya berhak untuk menentukan perubahan pada besarnya biaya sehubungan dengan produk atau layanan dan akan memberitahukan secara tertulis paling lambat 30 (tiga puluh) hari kerja sebelum berlakunya perubahan kepada seluruh Nasabah termasuk Pemilik Rekening.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>D.  PENGHENTIAN AKSES DAN LAYANAN APLIKASI RAYA</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Akses layanan Aplikasi Raya akan dihentikan oleh Bank Raya apabila :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Nasabah meminta kepada Bank Raya untuk menghentikan akses layanan Aplikasi Raya secara permanen yang antara lain disebabkan oleh keinginan Nasabah sendiri atau rekeningnya yang terhubung dengan layanan Aplikasi Raya, telah ditutup berdasarkan inisiasi Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Diterimanya laporan tertulis/lisan dari Nasabah (melalui verifikasi data) mengenai dugaan atau diketahuinya PIN dan <i>password</i> oleh pihak lain yang tidak berwenang.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": "Bank Raya melaksanakan suatu keharusan sesuai ketentuan perundang-undangan yang berlaku.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Untuk melakukan aktivasi kembali karena penghentian akses layanan tersebut diatas, Nasabah harus melakukan registrasi ulang di Unit Kerja Bank Raya atau melalui Agen Sapa Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>E.  KEADAAN MEMAKSA <i>(FORCE MAJEURE)</i></b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Sehubungan dengan pelaksanaan perintah transaksi atas Rekening, Bank tidak bertanggung jawab atas setiap keterlambatan, kegagalan, tuntutan maupun kerugian yang disebabkan karena segala sesuatu diluar kendali Bank termasuk tetapi tidak terbatas pada bencana alam, perang, perpecahan, pemogokan, huru hara, kondisi politik, kegagalan sistem pembayaran atau sistem komunikasi, kegagalan sumber daya listrik, kerusakan peralatan, kerusakan atau tidak berfungsinya software atau program",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Nasabah akan membebaskan Bank dari segala tuntutan, jika Bank tidak dapat melaksanakan instruksi dari Nasabah, baik sebagian maupun sepenuhnya yang disebabkan oleh kejadian atau sebab yang berada di luar kendali atau kemampuan Bank, meliputi tetapi tidak terbatas pada bencana alam, peperangan, kerusuhan, kondisi perangkat keras, kegagalan sistem infrastruktur elektronik atau transmisi, gangguan daya, gangguan telekomunikasi, kegagalan sistem kliring atau hal lainnya yang ditetapkan oleh Bank Indonesia atau lembaga berwenang lainnya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Setelah kejadian yang menyebabkan Bank tidak dapat melaksanakan instruksi dari Nasabah berakhir, Bank akan melanjutkan kembali instruksi tersebut dalam kurun waktu sesuai dengan ketentuan dari Bank Indonesia dan/atau Otoritas Jasa Keuangan (OJK).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>F.  INFORMASI TAMBAHAN</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Bukti perintah Nasabah melalui layanan Aplikasi Raya adalah mutasi yang tercatat dalam riwayat transaksi pada Aplikasi Raya atau rekening koran jika dicetak.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Nasabah dapat menghubungi Agen Sapa Raya atas setiap permasalahan yang berkaitan dengan transaksi dan akses layanan Aplikasi Raya .",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Nasabah tunduk pada ketentuan-ketentuan dan peraturan-peraturan yang berlaku pada Bank Raya serta syarat-syarat pembukaan rekening Digital Saving/kartu ATM Bank Raya, termasuk setiap perubahan yang akan diberitahukan terlebih dahulu oleh Bank Raya dalam bentuk dan sarana apapun.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Sanggahan dari Nasabah hanya dapat dilayani bilamana sanggahan diajukan ke Bank Raya dalam tenggang waktu selambat-lambatnya 3 (tiga) bulan terhitung sejak tanggal transaksi melalui Aplikasi Raya  dilakukan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Nasabah wajib segera melaporkan kepada Bank Raya secara tertulis apabila terjadi perubahan data Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "Nasabah dapat menghubungi Unit Kerja Bank Raya atas setiap permasalahan yang berkenaan dengan transaksi atau pemblokiran Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "Bank Raya dapat mengubah syarat dan ketentuan Aplikasi Raya ini setiap saat dengan pemberitahuan kepada Nasabah dalam bentuk dan melalui sarana apapun.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "8",
                      "table": {},
                      "text": "Nasabah wajib terlebih dahulu membaca, memahami dan menyetujui seluruh syarat dan ketentuan yang ditetapkan Bank dengan cara menyetujui/ men-checklist formulir syarat dan ketentuan penggunaan Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "9",
                      "table": {},
                      "text": "Nasabah mengikatkan diri pada seluruh syarat dan ketentuan Aplikasi Raya dan menyatakan Bank Raya telah memberikan penjelasan yang cukup mengenai karakteristik Aplikasi Raya yang akan dimanfaatkan oleh Nasabah dan Nasabah telah mengerti serta memahami segala konsekuensi pemanfaatan Aplikasi Raya termasuk risiko dan biaya-biaya yang melekat pada Aplikasi Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "10",
                      "table": {},
                      "text": "Ketentuan dan persyaratan Aplikasi Raya ini berikut perubahan atau penambahannya atau pembaharuannya dibuat ditafsirkan dan dilaksanakan berdasarkan Hukum Negara Republik Indonesia. Setiap sengketa yang timbul sebagai akibat dari pelaksanaan Aplikasi Raya ini akan diselesaikan dengan cara sebagai berikut:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Melalui musyawarah untuk mencapai mufakat dalam jangka waktu paling lambat 90 (sembilan puluh) hari kalender.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Apabila tidak tercapai mufakat, maka akan diselesaikan melalui salah satu Pengadilan Negeri di wilayah Republik Indonesia dengan tidak mengurangi hak Bank untuk menyelesaikannya atau mengajukan gugatan kepada Nasabah melalui Pengadilan lainnya baik di dalam maupun di luar wilayah Indonesia dan Nasabah dengan ini melepaskan haknya untuk mengajukan eksepsi mengenai kompetensi relatif terhadap Pengadilan yang dipilih oleh Bank.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "11",
                      "table": {},
                      "text": "Kuasa-kuasa yang diberikan Nasabah kepada Bank tidak dapat ditarik, dicabut atau berakhir menurut ketentuan Pasal 1813, 1814 dan 1816 Kitab Undang-Undang Hukum Perdata maupun oleh sebab apapun juga. Kuasa-kuasa tersebut merupakan bagian yang tidak dapat dipisahkan dari syarat dan ketentuan pembukaan rekening ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "12",
                      "table": {},
                      "text": "Ketentuan dan persyaratan masing-masing produk, yang belum diatur dalam syarat dan ketentuan pembukaan rekening ini, akan diatur tersendiri dan merupakan satu kesatuan yang tidak terpisahkan dengan syarat dan ketentuan pembukaan rekening ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "13",
                      "table": {},
                      "text": "Bank akan memberitahukan secara tertulis kepada Debitur apabila terdapat perubahan terhadap syarat dan ketentuan paling lambat 30 (tiga puluh) hari kerja sebelum berlakunya perubahan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "14",
                      "table": {},
                      "text": "Syarat dan ketentuan ini telah disesuaikan dengan ketentuan peraturan perundang-undangan termasuk ketentuan Peraturan Otoritas Jasa Keuangan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>G.  PENGELOLAAN DATA PRIBADI</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Bank berkomitmen untuk menyimpan data pribadi Nasabah dengan perlindungan terbaik selama diperlukan untuk pelayanan Aplikasi Raya .",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Pengumpulan, penyimpanan, pengolahan, penggunaan dan pembagian informasi pribadi Nasabah, seperti data identitas, data kontak, data lokasi dan foto yang Nasabah berikan ketika Nasabah membuka Akun tunduk kepada Kebijakan Privasi, yang merupakan bagian yang tidak terpisahkan dari Ketentuan Penggunaan ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": "Data identitas, data kontak, data lokasi, dan foto yang diizinkan oleh Nasabah dalam layanan Aplikasi Raya, digunakan untuk kepentingan transaksi Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": "Bank akan menyimpan data pribadi sebagaimana disebutkan di atas sepanjang hal tersebut dibutuhkan untuk mencapai tujuan dari pemrosesan data pribadi, ketika Nasabah masih menggunakan layanan atau sepanjang penyimpanan tersebut diharuskan dan/atau diperkenankan sesuai dengan kebijakan retensi data milik Bank Raya serta peraturan perundangan-undangan yang berlaku di Republik Indonesia.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": "Nasabah dapat memiliki hak tertentu berdasarkan peraturan perundang-undangan yang berlaku untuk meminta kepada Bank terhadap akses, koreksi dan/atau penghapusan terhadap data pribadi Nasabah yang berada dalam penguasaan dan kendali Bank. Sepanjang hak ini tersedia bagi Nasabah sesuai dengan ketentuan peraturan perundang-undangan yang berlaku. Nasabah dapat melaksanakan hak tersebut dengan menghubungi Bank melalui kontak yang tersedia.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": "Berdasarkan pertimbangan tertentu, Bank berhak menolak permintaan Nasabah terhadap akses, koreksi dari dan/atau penghapusan terhadap sebagian atau semua data pribadi Nasabah dimana pertimbangan tersebut dapat disampaikan kepada Nasabah melalui lisan maupun tertulis.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "7",
                      "table": {},
                      "text": "Informasi mengenai pengelolaan data pribadi Nasabah dapat diperoleh melalui kebijakan privasi umum Bank di www.bankraya.co.id, Untuk detail lebih lanjut dapat menghubungi :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Agen Sapa Raya: 1500494",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "<i>Email</i>: humas@bankraya.co.id",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>H.  PENGAKUAN DAN PERSETUJUAN</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "Nasabah dengan ini menyatakan telah membaca, memahami, dan menyetujui syarat dan ketentuan ini termasuk segala ketentuan di Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Syarat dan ketentuan ini dapat diubah atau diperbarui dari waktu ke waktu untuk memastikan kesesuaian dengan perkembangan layanan Bank di masa depan dan/atau perubahan persyaratan hukum atau peraturan. Dalam hal ini kami melakukan perubahan atau pembaruan syarat dan ketentuan, kami akan memberitahu Nasabah perihal perubahan tersebut melalui Aplikasi Raya. Nasabah mengakui bahwa dengan Nasabah terus mengakses atau menggunakan Aplikasi Raya setelah adanya perubahan terhadap syarat dan ketentuan akan dianggap sebagai persetujuan Nasabah terhadap perubahan tersebut.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>KEBIJAKAN PRIVASI</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "PT Bank Raya Indonesia Tbk (\"<b>Bank Raya</b>\") sepenuhnya menyadari bahwa data pribadi merupakan aset terpenting bagi Anda, sehingga Bank Raya sangat menghargai kerahasiaan dan perlindungan terhadap data pribadi. Anda terkait dengan penggunaan layanan produk dan/atau jasa perbankan Bank Raya.<br><br>Keamanan, kenyamanan, serta privasi Anda merupakan prioritas bagi Bank Raya. Bank Raya menerapkan kebijakan dan praktik terbaik yang bertujuan untuk menjaga dan memelihara privasi serta keamanan data pribadi Anda, sesuai peraturan Perlindungan Data Pribadi, untuk pemrosesan data terkait dengan penggunaan layanan produk dan/atau jasa perbankan Bank Raya (\"<b>Kebijakan Privasi</b>\")<br><br>Bank Raya selalu meningkatkan layanan kami kepada Anda dan senantiasa melakukan pembaruan layanan demi untuk melindungi privasi dan keamanan data pribadi Anda sebagai Nasabah kami. ",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>A. Tujuan dan Ruang Lingkup Kebijakan Privasi</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Kebijakan Privasi ini mengatur mengenai kebijakan-kebijakan dan praktik-praktik yang diterapkan oleh Bank Raya dalam memperoleh, memperbaiki, memperbarui, menyebarluaskan, menampilkan, mengumumkan, mengalihkan, mengungkapkan, menghapuskan, dan memusnahkan (untuk selanjutnya disebut \"<b>Pemrosesan</b>\") data pribadi Anda sehubungan dengan penggunaan layanan produk Anda dengan penggunaan layanan produk dan/atau jasa perbankan Bank Raya, meliputi:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1)",
                      "table": {},
                      "text": "Jasa perbankan dari Bank Raya meliputi Simpanan, Pinjaman dan Layanan Perbankan lainnya termasuk namun tidak terbatas pada Internet Banking dan Layanan Perbankan Bank Raya lainnya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "2)",
                      "table": {},
                      "text": "Situs <i>web</i>, fitur, aplikasi, media sosial, atau bentuk media komunikasi lainnya yang disediakan atau digunakan oleh Bank Raya. (seluruhnya kemudian disebut \"<b>Layanan</b>\")Selanjutnya, Kebijakan Privasi ini berlaku untuk semua pemilik data Pribadi (Subyek Data), yang terkait dengan penggunaan layanan produk dan/atau jasa perbankan Bank Raya. (seluruhnya kemudian disebut \"<b>Anda</b>\").",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>B. Tujuan Pemrosesan Data Pribadi</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Dalam melakukan Pemrosesan data pribadi Anda, Bank Raya memiliki tujuan sebagai berikut:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1)",
                      "table": {},
                      "text": "Untuk menjalankan prinsip <i>Customer Due Diligence</i> (CDD) dan memberikan personalisasi kepada Anda terhadap penggunaan Layanan yang disediakan oleh Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "2)",
                      "table": {},
                      "text": "Untuk menjalankan mandat peraturan perundang-undangan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "3)",
                      "table": {},
                      "text": "Untuk menjalankan penyelesaian masalah terkait akses terhadap Layanan (<i>troubleshoot</i>).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "4)",
                      "table": {},
                      "text": "Untuk kebutuhan pemasaran dari layanan dan produk yang ditawarkan oleh Bank Raya, hal ini termasuk seperti mengirimkan promosi, produk baru, berita, survei, pembaruan terkait layanan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "5)",
                      "table": {},
                      "text": "Untuk mengevaluasi dan memperbarui fitur Layanan Bank Raya dari waktu ke waktu.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "6)",
                      "table": {},
                      "text": "Untuk kebutuhan pemrosesan Data Pribadi guna menghasilkan data profil Anda.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "7)",
                      "table": {},
                      "text": "Untuk kepentingan <i>loyalty programme</i> kepada Anda seperti <i>gift</i>, undian, dan sebagaimananya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "8)",
                      "table": {},
                      "text": "Untuk menawarkan iklan/promosi maupun penawaran dari pihak lain yang bekerja sama dengan Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>C. Data Pribadi yang Diperoleh dan Dikumpulkan oleh Bank Raya</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Bank Raya memperoleh dan mengumpulkan informasi yang mengidentifikasi dan/atau dapat diidentifikasi secara tersendiri atau dikombinasi dengan informasi lainnya baik secara langsung maupun  tidak langsung melalui sistem elektronik dan/atau non-elektronik yang terkait dengan informasi tersebut yang dalam hal ini terbatas pada Layanan (\"<b>Data Pribadi</b>\"). Data Pribadi Anda yang dikumpulkan oleh Bank Raya dapat diberikan oleh Anda secara langsung maupun dari pihak ketiga (seperti misalnya ketika Anda mendaftar atau menggunakan Layanan, ketika Anda menghubungi layanan Sapa Raya). Bank Raya akan mengumpulkan Data Pribadi Anda dalam berbagai bentuk dengan tujuan, termasuk yang diperkenankan oleh peraturan perundang-undangan yang berlaku di Republik Indonesia. Data Pribadi Anda yang dikumpulkan dalam penyelenggaraan Layanan ini adalah:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "1)",
                      "table": {},
                      "text": "Data Pribadi yang dibutuhkan oleh Bank Raya untuk menyelenggarakan Layanan, meliputi Data Pribadi yang bersifat umum dan khusus, sebagai berikut:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>Data Umum:</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Nama lengkap.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Alamat tempat tinggal.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": "Tempat dan Tanggal lahir.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "d",
                      "table": {},
                      "text": "Jenis kelamin.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "e",
                      "table": {},
                      "text": "Kewarganegaraan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "f",
                      "table": {},
                      "text": "Nama Gadis Ibu Kandung.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "g",
                      "table": {},
                      "text": "Agama.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "h",
                      "table": {},
                      "text": "Pekerjaan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "i",
                      "table": {},
                      "text": "Pendidikan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "j",
                      "table": {},
                      "text": "Jabatan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "k",
                      "table": {},
                      "text": "Nomor Induk Kependudukan / Paspor / Kartu Induk Anak / Kartu Pelajar.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "l",
                      "table": {},
                      "text": "Nomor Handphone.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "m",
                      "table": {},
                      "text": "Alamat <i>Email</i>.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "n",
                      "table": {},
                      "text": "Nomor telepon kantor/rumah, dan/atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "o",
                      "table": {},
                      "text": "Data Pribadi yang dikombinasikan untuk mengidentifikasi seseorang.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>Data Khusus:</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Data biometrik yang memungkinkan identifikasi unik terhadap individu namun tidak terbatas pada gambar wajah, sidik jari, rekaman pembicara.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Data keuangan pribadi namun tidak terbatas seperti Penghasilan dan Nomor Wajib Pajak, dan/atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": "Data lainnya sesuai dengan ketentuan peraturan perundang-undangan yang berlaku.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Selain itu, sepanjang informasi lain, termasuk profil pribadi dan/atau tanda pengenal, yang terasosiasi atau tergabung dalam Data Pribadi, maka informasi tersebut juga merupakan Data Pribadi. Anda memiliki pilihan untuk memberikan Data Pribadi tambahan kepada Bank Raya untuk kebutuhan personalisasi akun di luar yang telah disebutkan di atas.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2)",
                      "table": {},
                      "text": "Data penelusuran atas informasi yang dikumpulkan ketika Anda menggunakan Layanan yang diberikan oleh Bank Raya. Informasi yang berkenaan dengan Data Pribadi Anda termasuk namun tidak terbatas pada:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Data pencarian, riwayat penelusuran (termasuk tanggal dan waktu yang terekam).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Keterkaitan atau preferensi Anda yang dikumpulkan dari penggunaan Layanan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": "Data identitas, data kontak, data lokasi dan foto dalam Layanan yang diizinkan oleh Anda untuk diakses melalui perangkat yang Anda miliki. Bank Raya tidak pernah memindai atau mengambil foto-foto pada album dan/atau kamera dalam perangkat Anda.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3)",
                      "table": {},
                      "text": "Data Pribadi yang dibuat dan didapatkan dari hasil penggunaan layanan milik Bank Raya, termasuk namun tidak terbatas pada:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Data olahan teknis, seperti mobile positioning, penilaian lokasi, dan profiling lanjutan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Informasi tentang Data yang diperoleh dari aktivitas pemakaian layanan perbankan yang Anda akses, seperti pembayaran tagihan maupun pemrofilan dan segmentasi Anda.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4)",
                      "table": {},
                      "text": "Data Pribadi dari Grup Usaha Bank Raya dan/atau pihak ketiga lainnya yang berpartisipasi bermitra dengan Bank Raya atau mengadakan kerja sama dengan Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>D. Penampilan, Pengumuman, Pengalihan, Penyebarluasan dan Pengungkapan Data Pribadi</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Anda bertanggung jawab untuk menjaga kerahasiaan detail Data Pribadi Anda dan harus selalu menjaga dan bertanggung jawab atas keamanan perangkat yang Anda gunakan untuk mengakses Layanan Bank Raya. Nasabah dengan ini mengakui, dan jika diwajibkan oleh peraturan Perlindungan Data Pribadi yang berlaku, secara tegas menyetujui bahwa Data Pribadi yang diperoleh dan dikumpulkan oleh Bank Raya bersama dengan informasi terkait transaksi yang relevan, dapat diungkapkan kepada lembaga pemerintah yang berwenang, ataupun pihak lain yang berwenang berdasarkan undang-undang atau perjanjian kerja sama, dalam hal :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1)",
                      "table": {},
                      "text": "Untuk kepentingan hukum yang berlaku dan/atau untuk menangani proses hukum yang sedang berjalan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2)",
                      "table": {},
                      "text": "Untuk melindungi keselamatan Bank Raya, keselamatan Anda atau keselamatan orang lain atau demi kepentingan yang sah dalam konteks.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": "Keamanan nasional.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": "Proses penegakan hukum.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": "Penyelenggara negara.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "d",
                      "table": {},
                      "text": "Kepentingan pengawasan sektor jasa keuangan, moneter, sistem pembayaran dan stabilitas sistem keuangan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "e",
                      "table": {},
                      "text": "Agregat data yang pemrosesannya ditujukan guna kepentingan statistik dan penelitian ilmiah dalam rangka penyelenggaraan negara, dan/atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "f",
                      "table": {},
                      "text": "Keadaan darurat yang telah ditetapkan oleh Pemerintah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "3)",
                      "table": {},
                      "text": "Untuk kepentingan audit internal dan/atau <i>digital forensic</i> atas tindak pidana atau pelanggaran peraturan atau kebijakan di lingkungan Bank Raya dan Perusahaan Afiliasi.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "4)",
                      "table": {},
                      "text": "Jika diperlukan sehubungan dengan proses hukum yang diajukan terhadap Bank Raya, pejabat, karyawan, afiliasi, atau vendor terkait.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "5)",
                      "table": {},
                      "text": "Untuk menetapkan, melaksanakan, melindungi, mempertahankan, dan menegakkan hak-hak hukum Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "6)",
                      "table": {},
                      "text": "Dalam rangka Pemrosesan Data Pribadi dengan perusahaan afiliasi Bank Raya, Bank Raya hanya akan memberikannya dengan itikad baik dalam bentuk ringkasan atas dasar kepentingan yang sah di mata hukum. Dalam hal Bank Raya melakukan Pemrosesan Data Pribadi yang membuka profil pribadi Anda, Bank Raya akan melakukan upaya terbaik untuk melindungi privasi atas Data Pribadi Anda, yang dilaksanakan setelah dilakukannya penandatanganan perjanjian kerahasiaan, atau persetujuan tambahan dengan cara memberikan pemberitahuan kepada Anda sebelum Data Pribadi Anda diungkapkan kepada afiliasi Bank Raya serta tunduk pada Kebijakan Privasi Anda diungkapkan kepada afiliasi Bank Raya serta tunduk pada Kebijakan Privasi dan peraturan perundang-undangan yang berlaku, sehingga tetap dapat memastikan kerahasiaan Data Pribadi Anda, atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "7)",
                      "table": {},
                      "text": "Untuk melakukan pengungkapan Data Pribadi Anda kepada pihak ketiga, dalam rangkat untuk memastikan Bank Raya dapat memberikan Layanan kepada Anda dan membantu Pemerintah Negara Indonesia beserta institusi pendukungnya untuk pelaksanaan fungsi-fungsi Negara.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pengungkapan ini dilakukan dengan mempertimbangkan aspek-aspek pengamanannya sehingga memastikan dalam proses pengungkapan tidak ada data-data yang disalahgunakan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>E. Penyimpanan Data Pribadi",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Bank Raya berkomitmen untuk menyimpan Data Pribadi Anda dengan perlindungan terbaik selama diperlukan untuk menyediakan Layanan ini. Sebagian Data Pribadi Anda dapat pula dikelola, diproses, dan disimpan oleh pihak ketiga yang bekerja sama dengan Bank Raya baik di wilayah Indonesia maupun di luar wilayah Republik Indonesia guna menjaga kinerja Layanan dengan tetap mematuhi kewajiban atas akses dan efektifitas pengawasan sesuai hukum yang berlaku.<br><br>Bank Raya akan menyimpan Data Pribadi sebagaimana disebutkan di atas sepanjang hal tersebut dibutuhkan untuk mencapai tujuan mengapa Data Pribadi tersebut dikumpulkan, ketika Anda masih menggunakan Layanan, atau sepanjang penyimpanan tersebut diharuskan atau diperkenankan sesuai dengan kebijakan retensi data milik Bank Raya serta peraturan perundang-undangan yang berlaku di Republik Indonesia.<br><br>Bank Raya dapat mentransfer Data Pribadi keluar Wilayah republik Indonesia selama hal tersebut diperlukan dalam rangka pelaksanaan Layanan Perbankan kepada Nasabah (misalnya : layanan <i>remittance</i>, penerbitan instrumen pembiayaan perdagangan luar negeri, dll).<br><br>Bank Raya akan berhenti untuk menyimpan Data Pribadi Anda, atau menghilangkan cara-cara yang dengan mana Data Pribadi Anda dapat diasosiasikan dengan Anda, segera setelah beralasan untuk berasumsi bahwa tujuan pengumpulan Data Pribadi tersebut tidak lagi terpenuhi dengan penyimpanan Data Pribadi terkait dan penyimpanan tidak lagi diperlukan untuk tujuan hukum, dan bisnis.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>F. Akses ke Data Pribadi Anda",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Bank Raya berkomitmen untuk memenuhi hak Anda untuk mengakses Data Pribadi Anda yang dikumpulkan dan diproses oleh Bank Raya. Dalam memenuhi permintaan akses ke data pribadi Anda, Bank Raya dapat menolak permintaan Anda apabila Bank Raya menemukan bahwa permintaan ke Data Pribadi Anda memenuhi salah satu atau beberapa kondisi, berikut ini :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1)",
                      "table": {},
                      "text": "Membahayakan keamanan atau kesehatan fisik atau kesehatan mental Pemilik Data Pribadi dan/atau orang lain.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2)",
                      "table": {},
                      "text": "Berdampak pada pengungkapan data Pribadi milik orang lain, dan/atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3)",
                      "table": {},
                      "text": "Bertentangan dengan kepentingan pertahanan dan keamanan nasional.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Untuk informasi lebih lanjut terkait dengan permintaan akses data pribadi Anda, Anda dapat menghubungi saluran komunikasi yang tersedia berdasarkan Kebijakan Privasi ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>G. Perbaikan dan Pembaruan Data Pribadi Anda",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Dalam hal Anda menemukan kekeliruan yang ditampilkan mengenai Data pribadi Anda dikarenakan ketidakakuratan atau diperlukan dilakukan pembaruan atas Data Pribadi Anda, maka Anda dapat meminta kepada Bank Raya untuk memperbaiki, melengkapi dan/atau memperbarui Data Pribadi Anda yang berada dalam pengelolaan Bank Raya, dengan menghubungi saluran komunikasi yang tersedia berdasarkan Kebijakan Privasi ini. Dalam hal terdapat ketidakakuratan dalam pemberian data pribadi dari Subjek Data, Bank Raya berhak menghentikan layanan dan/atau transaksi berdasarkan pengetahuan dan pertimbangan Bank. Kami menghimbau Anda untuk turut berperan aktif memastikan keakuratan dan pembaruan Data Pribadi Anda dari waktu ke waktu.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>H. Penghapusan dan Pemusnahan Data Pribadi",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Sesuai dengan peraturan perundang-undangan yang berlaku atau kebijakan retensi data milik Bank Raya atau atas permintaan/permohonan Anda, Bank Raya dapat menghapus dan/atau memusnahkan Data Pribadi Anda dari sistem (<i>right to erase</i>) agar data tersebut tidak lagi mengidentifikasi Anda, kecuali dalam hal:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1)",
                      "table": {},
                      "text": "Apabila perlu menyimpan Data Pribadi untuk memenuhi kewajiban hukum, keperluan pembuktian di kemudian hari, pajak, audit, dan akuntansi, Bank Raya akan menyampaikan Data Pribadi yang diperlukan selama Anda menggunakan layanan milik Bank Raya atau sesuai jangka waktu yang disyaratkan oleh peraturan perundang-undangan yang berlaku, dan/atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2)",
                      "table": {},
                      "text": "Data Pribadi dalam Data Pribadi masih berapa dalam periode retensi berdasarkan peraturan perundang-undangan yang berlaku.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Perihal keperluan pemusnahan Data pribadi Anda dari sistem (<i>right to erase</i>), diperlukan permohonan tertulis yang diajukan oleh Anda kepada Kantor Pusat Bank Raya agar kami dapat memusnahkan Data Pribadi dalam sistem milik Bank Raya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>I. Keamanan data Pribadi",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Kerahasiaan Data Pribadi Anda adalah hal yang terpenting bagi Bank Raya. Bank Raya berkomitmen untuk memberlakukan upaya terbaiknya untuk melindungi dan mengamankan Data Pribadi Anda dari akses pengumpulan, pengolahan, penganalisisan, penyimpanan, pengungkapan, perbaikan dan penghapusan oleh pihak-pihak yang tidak berwenang.<br><br>Dalam hal terjadi akses dan kegiatan ilegal atas kerahasiaan Informasi Pribadi Anda yang berada di luar kendali Bank Raya, Bank Raya akan segera memberitahukan kepada Anda pada kesempatan pertama sehingga Anda dapat mengurangi resiko yang timbul atas hal tersebut.<br><br>Anda bertanggung jawab untuk menjaga kerahasiaan detil Data Pribadi Anda, termasuk informasi mengenai <i>username</i>, <i>password</i>, <i>email</i> maupun OTP kepada siapapun dan untuk selalu menjaga dan bertanggung jawab atas keamanan perangkat yang Anda gunakan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>J. Pengakuan dan Persetujuan",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Kebijakan Privasi ini dapat diubah dan/atau diperbarui dari waktu ke waktu. Bank Raya menyarankan kepada Anda agar selalu membaca secara seksama dan memeriksa halaman ini dari waktu ke waktu untuk mengetahui perubahan apapun yang ditimbulkan olehnya.<br><br>Anda dapat menarik persetujuan Anda terhadap setiap atau seluruh pengumpulan, penggunaan, pengungkapan Data Pribadi Anda pada setiap waktu dengan memberikan pemberitahuan tertulis yang beralasan ke kontak yang tertera di bawah ini.<br><br>Bergantung pada keadaan dan sifat dari persetujuan yang Anda tarik, Anda harus memahami dan mengakui bahwa Bank Raya berwenang untuk memenuhi atau tidak memenuhi permintaan penarikan persetujuan tersebut, maka anda tidak lagi dapat menggunakan Layanan. Penarikan persetujuan oleh Anda dapat berakibat pada penghentian akun Anda atau hubungan kontraktual Anda dengan Bank Raya yang terkait, di mana semua hak dan kewajiban yang dimiliki masing-masing pihak masih sepenuhnya dilindungi.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>K. Pengaturan Layanan",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Anda dapat memilih untuk tidak menerima layanan pemasaran, pengiklanan, atau aktivitas lainnya yang terkait dengan pengolahan Data Pribadi di atas dengan menghubungi Bank Raya melalui detail kontak yang tersedia di bawah pemberitahuan ini atau melalui mekanisme lain yang disiapkan oleh masing-masing Layanan kami. Mohon diperhatikan, jika Anda memilih untuk tidak menerima satu Layanan, Bank Raya masih berhak untuk mengirimi Anda pesan terkait layanan Bank Raya, untuk Layanan lainnya yang Anda gunakan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>L. Bahasa",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Kebijakan Privasi ini disusun dan diterbitkan dalam Bahasa Inggris dan Bahasa Indonesia. Anda dapat menemukan bahasa yang berbeda untuk Kebijakan Privasi ini ketika Anda mengganti pengaturan bahasa di situs <i>web</i> atau aplikasi Bank Raya. Jika terjadi ketidaksesuaian antara kedua bahasa ini, versi bahasa Indonesia yang berlaku.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>M. Hubungi Kami",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Jika Anda memiliki pertanyaan tentang Kebijakan Privasi ini, silahkan hubungi Sapa Raya sebagai Kanal layanan kami yang dapat diakses melalui :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "●",
                      "table": {},
                      "text": "<b> Contact Center</b> : 1500 494",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "●",
                      "table": {},
                      "text": "<b> Whatsapp</b> : 0812 1000 0494",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "●",
                      "table": {},
                      "text": "<b> Telegram</b> : t.me/RayaDigitalSupportbot",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "●",
                      "table": {},
                      "text": "<b>Instagram </b> : @bankraya",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "●",
                      "table": {},
                      "text": "<b><i>Email</i></b> : humas@bankraya.co.id",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>N. Referensi",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Undang-undang Republik Indonesia Nomor 27 Tahun 2022 tentang Perlindungan Data Pribadi.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>KEBIJAKAN PENGAMANAN</b>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Berikut ini adalah kebijakan dan praktek yang dilakukan PT Bank Raya Indonesia Tbk (\"Bank Raya\") untuk menunjukan komitmen Bank Raya di dalam menjaga dan memelihara keamanan Anda pada saat Anda mengunjungi situs dan https://www.bankraya.co.id.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>A. Sistem Pengamanan",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Bank Raya menggunakan 2 (dua) lapis sistem pengamanan untuk melindungi akses dan transaksi Anda di https://www.bankraya.co.id yaitu :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1)",
                      "table": {},
                      "text": "Secure Socket Layer (\"SSL\") <br>SSL adalah teknologi pengamanan yang 'mengacak' jalur' antar komputer sehingga tidak dapat dibaca oleh pihak lain.<br>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2)",
                      "table": {},
                      "text": "User ID dan password untuk administrator situs https:// www.bankraya.co.id <br>Karena banyaknya variasi browser internet yang ada, sulit untuk menyediakan layanan yang  mengikuti keamanan masing-masing browser. Saat ini Bank Raya hanya menyediakan sarana https:// www.bankraya.co.id yang lebih cocok diakses dengan menggunakan Microsoft Internet Explorer versi 10 ke atas, Mozilla Firefox versi 2.0.0 ke atas atau Safari versi 4.0.3 ke atas. Bank Raya mohon maaf atas ketidaknyamanan ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>B. Proteksi Komunikasi Situs www.bankraya.co.id",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Bank Raya menggunakan teknologi enkripsi Secure Socket Layer (SSL) 256 bit untuk memproteksi komunikasi antara komputer Anda dan server Bank Raya selama Anda mengakses https://www.bankraya.co.id. Untuk memastikan proteksi komunikasi selama Anda mengakses https://www.bankraya.co.id Anda dapat melakukan hal-hal sebagai berikut:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1)",
                      "table": {},
                      "text": "Periksa sertifikat SSL secara teratur untuk memastikan bahwa Anda menerima sertifikat SSL yang sah yang telah terdaftar untuk https://www.bankraya.co.id.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2)",
                      "table": {},
                      "text": "Apabila Anda menerima pesan yang menjelaskan bahwa sertifikat tidak sah, dimohon Anda tidak melanjutkan akses https://www.bankraya.co.id.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3)",
                      "table": {},
                      "text": "Pastikan bahwa Anda telah mengetik alamat yang benar yaitu https://www.bankraya.co.id.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4)",
                      "table": {},
                      "text": "Pastikan bahwa pada browser Anda terdapat gambar gembok/kunci yang mengidentifikasikan bahwa yang Anda akses saat dienkripsi dengan menggunakan SSL. Jika Anda melakukan pertukaran data informasi pribadi.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5)",
                      "table": {},
                      "text": "Sebaiknya Anda tidak mengakses di jaringan yang tidak pasti keamanannya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>C. Situs Bank Raya",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Di dalam situs Bank Raya, Bank Raya menyediakan URL link ke situs lain yang tidak dikontrol oleh Bank Raya. Bank Raya tidak bertanggung jawab atas isi dan keamanan dari situs tersebut. Jika Anda mengakses situs tersebut, silahkan memeriksa kebijakan privasi dan pengamanan mereka. Dalam hal Anda mengakses situs melalui URL link dari situs lain, pastikan kebenaran alamat yang Anda akses yaitu https://www.bankraya.co.id. Bank Raya dapat mengubah kebijakan privasi dan informasi pengamanan ini setiap saat untuk tetap menyesuaikan dengan situasi dan teknologi terbaru. Anda selalu dapat meninjau informasi dan kebijakan privasi Bank Raya yang terbaru di https://www.bankraya.co.id",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "sign",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
