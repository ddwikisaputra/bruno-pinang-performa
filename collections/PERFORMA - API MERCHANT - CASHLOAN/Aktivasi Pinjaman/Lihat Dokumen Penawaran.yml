                      "classname": "digital-saving mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "SYARAT DAN KETENTUAN PEMBUKAAN",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "REKENING <i>DIGITAL SAVING</i>",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Rekening Digital Saving, merupakan salah satu Produk yang dikembangkan dan dimiliki oleh PT. Bank Raya Indonesia Tbk. Syarat dan ketentuan yang ditetapkan di bawah ini mengatur pemakaian jasa dan produk yang ditawarkan PT. Bank Raya Indonesia Tbk (selanjutnya disebut <b>Bank</b>) terkait pembukaan dan penggunaan rekening Digital Saving. Pemohon (selanjutnya disebut <b>Nasabah</b>) dengan ini setuju dan menyatakan telah membaca dengan seksama syarat dan ketentuan dibawah ini karena dapat berdampak kepada hak dan kewajiban Nasabah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
