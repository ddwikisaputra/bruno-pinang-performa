                      "table": {},
                      "text": "Dengan ini kami menyatakan akan mematuhi ketentuan terkait proses perkreditan yang berlaku di PT. Bank Raya Indonesia, Tbk. dan mengajukan permohonan pinjaman sebagai berikut :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " Jumlah Permohonan        : 100000000",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": " Jangka Waktu        : 12 bulan",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": " Tujuan Penggunaan        : KMK/KI Performa Merchant Cashloan",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": " Bidang Usaha        : <br><br><br><br><br>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<pre><b>           DEBITUR</b></pre>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "sign",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b><pre>        Zulyano</b></pre><br><br><br><br><br>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 10,
                      "parentTextName": "",
                      "rowNumber": 1,
                      "srlNumber": "",
                      "table": {},
                      "text": "PERJANJIAN KREDIT",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 2,
                      "srlNumber": "",
                      "table": {},
                      "text": "FASILITAS PINJAMAN PINANG PERFORMA MERCHANT CASHLOAN",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 2,
                      "srlNumber": "",
                      "table": {},
                      "text": "Nomor : ",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Yang bertanda tangan dibawah ini :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": "asdasdas, pemegang Kartu Tanda Penduduk dengan NIK XXXXXXXXXXXXXXXX, selaku PIC  PT. BANK RAYA INDONESIA, Tbk dalam hal ini bertindak dalam jabatannya berdasarkan Surat Kuasa (Jika dikuasakan) Nomor     tanggal XXXXXX, yang dibuat dihadapan Notaris di XXXXXXX, oleh karenanya sah bertindak mewakili untuk dan atas nama <b>PT. BANK RAYA INDONESIA Tbk,</b> suatu perseroan terbatas berkedudukan di Jakarta Selatan, yang didirikan berdasarkan Akta Nomor 27 tanggal 27 September 1989 yang dibuat dihadapan R. Soekarsono, S.H., Notaris di Jakarta yang telah memperoleh pengesahan dari Menteri Kehakiman Republik Indonesia dalam Surat Keputusan Nomor C2-10019.HT.01.01-TH89 tanggal 28 Oktober 1989, yang telah diumumkan dalam Berita Negara Republik Nomor 3303 Tahun 1989, Tambahan Berita Negara Republik Indonesia Nomor 96 tanggal 1 Desember 1989, Anggaran Dasar terakhir telah diubah dalam Akta Nomor 13 tanggal 08 Mei 2024 dibuat dihadapan Mochamad Nova Faisal, S.H., M.Kn., Notaris di Jakarta yang telah diterima dan dicatat di dalam Sistem Administrasi Badan Hukum Kementerian Hukum dan Hak Asasi Manusia Republik Indonesia, sebagaimana dimuat dalam surat Penerimaan Pemberitahuan Perubahan Anggaran Dasar Nomor AHU-AH.01.03-0108019 tanggal 13 Mei 2024, dan perubahan susunan pengurus yang terakhir dimuat di dalam Akta Pernyataan Keputusan Rapat Nomor 20 tanggal 27 Agustus 2024, dibuat dihadapan Mochamad Nova Faisal, S.H., M.Kn., Notaris di Jakarta yang telah diterima dan dicatat di dalam Sistem Administrasi Badan Hukum Kementerian Hukum dan Hak Asasi Manusia Republik Indonesia, sebagaimana dimuat dalam penerimaan pemberitahuan perubahan data perseroan Nomor AHU-AH.01.09-0244928 tanggal 28 Agustus 2024.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Selanjutnya disebut <b>BANK</b>.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": "Zulyano, Lahir di Jakarta , pada tanggal 1995-11-12, Pekerjaan Wirausaha Bidang  (Sub Sektor ekonomi), bertempat tinggal di Jalan Jember Utara Rukun Tetangga 010 Rukun Warga 002 Kelurahan Bojonggambir, Kecamatan Girimukti,Kota Kab. Tasikmalaya, Provinsi Jawa Barat pemegang Kartu Tanda Penduduk Nomor 3273180712960007, Warga Negara Indonesia.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Selanjutnya disebut <b>DEBITUR</b>.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Selanjutnya secara bersama-sama disebut <b>PARA PIHAK</b>.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "BANK dan DEBITUR dengan ini menerangkan :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": " Perjanjian Kredit Pinang Performa Merchant Cashloan berbasis teknologi ini (beserta segala dokumen pendukungnya dan setiap perubahannya disebut sebagai Perjanjian Kredit) dibuat dan ditandatangani oleh Perwakilan Pejabat BANK dan disetujui serta ditandatangani oleh DEBITUR sebagaimana diuraikan di atas dalam bentuk format, perantara dan autorisasi secara automasi yang disediakan oleh BANK dalam bentuk Aplikasi Pinang Performa yang dipasarkan melalui kerjasama BANK dengan PARTNER.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": " Bahwa PARTNER yang bekerjasama dengan BANK dalam penyaluran Pinang Performa Merchant Cashloan sebagaimana dimaksud dalam Perjanjian Kredit ini adalah PT   Majoo.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": " Bahwa DEBITUR telah mengajukan permohonan kepada BANK untuk memperoleh fasilitas Pinang Performa melalui Aplikasi Pinang Performa Merchant Cashloan, satu dan lain hal sesuai dengan Surat atau Form Permohonan Fasilitas Pinjaman Pinang Performa DEBITUR kepada BANK tanggal 2030-06-21 .",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "d",
                      "table": {},
                      "text": " Bahwa BANK bersedia memberikan fasilitas Pinang Performa Merchant Cashloan tersebut kepada DEBITUR.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "e",
                      "table": {},
                      "text": " Bahwa hasil keputusan BANK tersebut telah diberitahukan kepada DEBITUR dan disetujui maksud dan isinya oleh DEBITUR.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Sehubungan dengan segala hal-hal yang telah diuraikan di atas, PARA PIHAK telah saling sepakat dan setuju untuk dan dengan ini membuat Perjanjian Kredit Pinang Performa <i>Merchant Cashloan</i>, untuk selanjutnya disebut “Perjanjian Kredit”, dengan syarat-syarat dan ketentuan-ketentuan sebagai berikut:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 1",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "JUMLAH DAN PENGGUNAAN FASILITAS KREDIT",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " BANK telah menyetujui untuk memberikan kepada DEBITUR, dan DEBITUR menerima dari BANK, fasilitas kredit (loan facility) dalam bentuk fasilitas Pinang Performa Merchant Cashloan dengan maksimal pinjaman pokok sebesar Rp.100000000,- (Selanjutnya disebut Fasilitas Kredit).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": " Fasilitas Pinang Performa Merchant Cashloan dalam jumlah sebagaimana dimaksud pada ayat (1) pasal ini digunakan untuk (tujuan penggunaan) yang dibutuhkan oleh DEBITUR dalam kegiatan usahanya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 2",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "JANGKA WAKTU FASILITAS KREDIT",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "classname": "",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Fasilitas Kredit diberikan oleh BANK kepada DEBITUR untuk jangka waktu 12 bulan (“Masa Berlaku Limit”) bulan terhitung sejak Penandatangan Perjanjian Kredit ini oleh PARA PIHAK dan berakhir pada tanggal 2031-06-21 (“Jatuh Tempo Fasilitas”).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " DEBITUR dengan ini berjanji dan mengikatkan diri melunasi seluruh hutangnya baik pokok pinjaman sebagaimana dimaksud pada Pasal 1 Perjanjian Kredit ini beserta bunga, denda dan biaya-biaya lainnya, selambat-lambatnya pada tanggal berakhirnya Fasilitas Kredit sebagaimana dimaksud pada ayat (1) pasal ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 3",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "REKENING DEBITUR & PARTNER",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " Dengan diterbitkannya Perjanjian Kredit ini BANK setuju untuk memberikan Fasilitas Kredit kepada DEBITUR yang akan digunakan untuk kebutuhan transaksi usaha DEBITUR dengan PARTNER.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": " Rekening DEBITUR adalah rekening Digital Saving yang tercantum pada Aplikasi Pinang Performa Merchant Cashloan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": " Rekening PARTNER ditentukan oleh BANK bersama dengan PARTNER berdasarkan Perjanjian Kerjasama, yaitu rekening dengan uraian sebagai berikut :",
                      "textName": "p1",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Nama Bank      : GIRO",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Nomor Rekening     : 001001000371401",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "p1",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pemilik Rekening       : Majoo",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": " Dengan diterbitkannya Perjanjian Kredit ini dan berkaitan dengan ayat (1), (2) dan (3) tersebut diatas, DEBITUR dengan ini memberikan kuasa penuh kepada BANK untuk dapat melakukan pendebetan sejumlah dana sesuai dengan nilai transaksi DEBITUR pada Merchant yang disediakan oleh PARTNER ke Rekening DEBITUR sebagaimana dimaksud pada ayat (2) pasal ini untuk selanjutnya mengkreditkan sejumlah dana dimaksud kepada PARTNER sebagaimana dimaksud pada ayat (3) pasal ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": " Fasilitas Kredit tersebut akan dibayarkan kembali oleh DEBITUR kepada BANK dengan cara melakukan pembayaran dalam tenggang waktu yang telah disepakati dalam Aplikasi Pinang Performa Merchant Cashloan ketika pencairan akan dilakukan dan akan dilakukan dengan cara pendebetan secara otomatis oleh BANK dari rekening DEBITUR sebagaimana diuraikan pada ayat (2) pasal ini dan/atau yang telah didaftarkan serta dikuasakan oleh DEBITUR kepada BANK.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": " Pendebetan otomatis oleh BANK sebagaimana dimaksud pada ayat (5) pasal ini akan dilakukan oleh sistem pada tanggal jatuh tempo pinjaman DEBITUR dengan jumlah pendebetan sebesar seluruh kewajiban berupa tagihan pokok, Biaya Transaksi  dan denda sampai dengan pinjamannya lunas.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 4",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "KUASA DEBET",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " DEBITUR memahami dan memberikan kuasa penuh kepada BANK untuk membuka informasi yang berhubungan dengan DEBITUR termasuk namun tidak terbatas data diri DEBITUR yang diisikan DEBITUR dalam rekening DEBITUR atau Fasilitas Kredit, kepada pihak yang diperbolehkan atau diperintahkan berdasarkan Peraturan Perundang-undangan yang berlaku di Indonesia atau berdasarkan perintah pengadilan. BANK dan Pejabat atau perwakilannya dapat juga membuka informasi kepada dan/atau untuk kepentingan : (a) Pihak Ketiga yang bekerjasama dengan BANK dalam rangka pelaksanaan proses pengajuan Fasilitas Kredit melalui Aplikasi Pinang Performa <i>Merchant Cashloan</i>; (b) setiap pihak yang bertujuan untuk melaksanakan atau melindungi hak atau kepentingan BANK sehubungan dengan Fasilitas Kredit; (c) setiap pihak sehubungan dengan proses keadaan tidak mampu bayar (termasuk PKPU dan kepailitan) yang berhubungan dengan DEBITUR; (d) instansi pemerintah atau penegak hukum jika dibutuhkan atau diperintahkan sehubungan dengan Fasilitas Kredit; (e) pihak penyedia jasa yang ditunjuk dan/atau bekerjasama dengan BANK sehubungan dengan pemantauan, penagihan pembayaran Fasilitas Kredit dan pengelolaan data; (f) setiap pihak yang berhubungan dengan pengalihan atau pengalihan yang ditawarkan, termasuk setiap pengalihan atau pemindahan atas setiap hak atau kewajiban BANK, setiap partisipasi, pengalihan kredit atau risiko lain (keseluruhan atau sebagian) dalam bentuk apapun, dan masuk dalam hubungan kontraktual lainnya sehubungan dengan Fasilitas Kredit.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": " DEBITUR dengan ini mendaftarkan sekaligus memberikan kuasa penuh kepada BANK untuk melakukan <b>hold dana DEBITUR</b> sebesar kewajiban DEBITUR yang dilakukan 2 (dua) Hari Kerja sebelum jatuh tempo dan akan dilakukan pendebetan secara otomatis untuk kepentingan pembayaran angsuran atas Fasilitas Kredit sampai dengan Fasilitas Kredit dinyatakan lunas sesuai dengan jangka waktu yang telah ditetapkan dalam Perjanjian Kredit ini dan dalam catatan pembukuan BANK Fasilitas Kredit yang dinikmati DEBITUR telah dinyatakan lunas.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": " Kuasa pendebetan otomatis sebagaimana dimaksud pada ayat (2) pasal ini tidak dapat dicabut maupun ditarik kembali karena sebab dan alasan apapun selama seluruh Fasilitas Kredit yang diterima DEBITUR sebagaimana dimaksud pada pasaL 1 dan pasal 2 Perjanjian Kredit ini belum lunas. DEBITUR dengan ini setuju untuk mengesampingkan segala aturan yang termuat dalam Undang-Undang termasuk pasal 1813, 1814, dan 1816 Kitab Undang-Undang Hukum Perdata dan segala aturan yang menyebabkan suatu kuasa berakhir.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": " DEBITUR dengan ini memberikan kuasa penuh kepada BANK untuk dapat melakukan perubahan informasi yang telah didaftarkan bilamana terdapat perbedaan antara informasi yang didaftarkan dengan data yang telah diberikan dan/atau terdaftar pada BANK.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 5",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "BIAYA & BUNGA",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " DEBITUR memahami dan memberikan kuasa penuh kepada BANK untuk membuka informasi yang berhubungan dengan DEBITUR termasuk namun tidak terbatas data diri DEBITUR yang diisikan DEBITUR dalam rekening DEBITUR atau Fasilitas Kredit, kepada pihak yang diperbolehkan atau diperintahkan berdasarkan Peraturan Perundang-undangan yang berlaku di Indonesia atau berdasarkan perintah pengadilan. BANK dan Pejabat atau perwakilannya dapat juga membuka informasi kepada dan/atau untuk kepentingan : (a) Pihak Ketiga yang bekerjasama dengan BANK dalam rangka pelaksanaan proses pengajuan Fasilitas Kredit melalui Aplikasi Pinang Performa Merchant Cashloan; (b) setiap pihak yang bertujuan untuk melaksanakan atau melindungi hak atau kepentingan BANK sehubungan dengan Fasilitas Kredit; (c) setiap pihak sehubungan dengan proses keadaan tidak mampu bayar (termasuk PKPU dan kepailitan) yang berhubungan dengan DEBITUR; (d) instansi pemerintah atau penegak hukum jika dibutuhkan atau diperintahkan sehubungan dengan Fasilitas Kredit; (e) pihak penyedia jasa yang ditunjuk dan/atau bekerjasama dengan BANK sehubungan dengan pemantauan, penagihan pembayaran Fasilitas Kredit dan pengelolaan data; (f) setiap pihak yang berhubungan dengan pengalihan atau pengalihan yang ditawarkan, termasuk setiap pengalihan atau pemindahan atas setiap hak atau kewajiban BANK, setiap partisipasi, pengalihan kredit atau risiko lain (keseluruhan atau sebagian) dalam bentuk apapun, dan masuk dalam hubungan kontraktual lainnya sehubungan dengan Fasilitas Kredit.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": " Biaya Aktivasi Limit (IDR) : 0",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": " Biaya Layanan adalah penjumlahan dari Biaya Transaksi dan Biaya Admin yang dibebankan pada saat pencairan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": " Biaya Transaksi adalah sejumlah biaya yang setara dengan bunga yang dibebankan sesuai nominal transaksi dan tenor pembayaran dan wajib dibayarkan oleh DEBITUR pada saat Tanggal Jatuh Tempo, sesuai dengan tiering sebagai berikut :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 5,
                      "srlNumber": "",
                      "table": {
                          "rows": [
                              {
                                  "label": "<b>Nominal Pencairan Pinjaman</b>",
                                  "value": "<b>Biaya Transaksi (Bunga) efektif per tahun</b>"
                              },
                              {
                                  "label": "Kurang dari sd Rp25 juta",
                                  "value": "27.00"
                              },
                              {
                                  "label": "Lebih dari Rp25 juta sd Rp50 juta",
                                  "value": ""
                              },
                              {
                                  "label": "Lebih dari Rp50 juta sd Rp75 juta",
                                  "value": ""
                              },
                              {
                                  "label": "Lebih dari Rp75 juta sd Rp100 juta",
                                  "value": ""
                              }
                          ]
                      },
                      "text": "",
                      "textName": "TAB1",
                      "textType": "TABLE"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "d",
                      "table": {},
                      "text": " Biaya Admin adalah sejumlah biaya administrasi perbankan yang dibebankan sesuai nominal pokok pencairan, sesuai dengan tiering sebagai berikut :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 5,
                      "srlNumber": "",
                      "table": {
                          "rows": [
                              {
                                  "label": "<b>Nominal Pencairan Pinjaman</b>",
                                  "value": "<b>Biaya Admin</b>"
                              },
                              {
                                  "label": "Kurang dari sd Rp10 juta",
                                  "value": ""
                              },
                              {
                                  "label": "Lebih dari Rp10 juta sd Rp25 juta",
                                  "value": ""
                              },
                              {
                                  "label": "Lebih dari Rp25 juta sd Rp50 juta",
                                  "value": ""
                              },
                              {
                                  "label": "Lebih dari Rp50 juta sd Rp75 juta",
                                  "value": ""
                              },
                              {
                                  "label": "Lebih dari Rp75 juta sd Rp100 juta",
                                  "value": ""
                              }
                          ]
                      },
                      "text": "",
                      "textName": "TAB1.1",
                      "textType": "TABLE"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": " Dalam hal BANK dan/atau PARTNER melaksanakan kegiatan promosi, maka kewajiban DEBITUR akan tunduk pada syarat dan ketentuan promosi yang berlaku.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": " Debitur memahami dan setuju untuk dan akan membayar biaya denda keterlambatan dengan ketentuan sebagai berikut:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 3,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<b>Denda Keterlambatan</b> : 50% x Biaya Transaksi x Pokok Pinjaman x Jumlah Hari keterlambatan.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": " DEBITUR wajib untuk membayar seluruh kewajibannya atas Fasilitas Kredit yang diterima berupa angsuran Pokok Pinjaman, Biaya Layanan dan Denda (jika ada) sesuai Aplikasi Pinang Performa <i>Merchant Cashloan</i> atau paling lambat pada saat tanggal jatuh tempo Fasilitas Kredit sebagaimana dimaksud pada pasal 2 Perjanjian Kredit ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "5",
                      "table": {},
                      "text": " DEBITUR dengan ini mengakui dan menyetujui bahwa PARTNER dapat melakukan penagihan atas tunggakan Fasilitas Kredit sesuai dengan mekanisme penagihan yang diatur berdasarkan ketentuan BANK atau PARTNER.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "6",
                      "table": {},
                      "text": " Untuk setiap pembayaran yang dilakukan oleh DEBITUR kepada BANK berlaku sebagai tanda penerimaan atau kwitansi yang sah.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 6",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "HAK DAN TANGGUNG JAWAB PARA PIHAK",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " PARA PIHAK wajib melaksanakan dengan penuh tanggung jawab dan itikad yang telah disepakati sebagaimana dimaksud di dalam Perjanjian Kredit ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": " Atas dasar pemenuhan kewajiban masing-masing pihak, maka PARA PIHAK memiliki hak untuk meminta pelaksanaan tanggung jawab yang disepakati di dalam Perjanjian Kredit ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": " BANK berhak dengan ketentuan dan syarat-syarat yang dianggap baik oleh BANK untuk menjual atau mengalihkan dengan cara lain sebagian atau seluruh Fasilitas Kredit maupun hak BANK berdasarkan Perjanjian Kredit ini serta Dokumen Agunan (jika ada) kepada Pihak Ketiga yang ditunjuk oleh BANK sendiri dengan atau tanpa menyampaikan pemberitahuan tertulis sebelumnya kepada DEBITUR.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 7",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "PERNYATAAN DEBITUR",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "DEBITUR dengan tegas menyatakan:",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": " Bahwa Fasilitas Kredit yang diterima dari BANK tersebut akan dipergunakan untuk keperluan usaha DEBITUR sebagaimana dimaksud pada pasal 1 Perjanjian Kredit ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": " BANK berhak memeriksa setiap saat penggunaan Fasilitas Kredit dimaksud tanpa harus adanya pemberitahuan terlebih dahulu kepada DEBITUR dan/atau PARTNER.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": " Bilamana Fasilitas Kredit ternyata digunakan untuk keperluan lain, maka BANK berhak seketika menagih pelunasan atas seluruh Fasilitas Kredit kepada DEBITUR berdasarkan Perjanjian Kredit ini",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "d",
                      "table": {},
                      "text": " Bilamana Fasilitas Kredit tidak dibayar lunas pada waktu yang ditentukan maka BANK berhak melakukan hold dana sejumlah tunggakan yang belum dibayarkan serta melakukan pendebetan rekening DEBITUR yang telah didaftarkan, dan rekening lain untuk melunasi seluruh sisa hutangnya. Untuk dan atas nama permintaan DEBITUR dan atas kerelaan sendiri tanpa paksaan berdasarkan kuasa penuh dari DEBITUR sebagaimana dimaksud dalam poin Perjanjian Kredit ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "e",
                      "table": {},
                      "text": " Jangka Waktu Fasilitas Kredit sebagaimana dimaksud dalam Pasal 2 di atas dapat diperpanjang sebelum Jangka Waktu Fasilitas Kredit berakhir untuk memungkinkan DEBITUR mengambil pinjaman sesuai dengan tenor yang dipilih selama DEBITUR memenuhi seluruh persyaratan yang ditentukan BANK untuk memungkinkan DEBITUR mengambil pinjaman sesuai dengan tenor yang dipilih.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "f",
                      "table": {},
                      "text": " Semua dokumen termasuk tetapi tidak terbatas pada dokumen yang diserahkan oleh DEBITUR kepada BANK sehubungan dengan pemberian Fasilitas Kredit oleh BANK merupakan dokumen asli/salinan asli, tidak palsu atau cacat dan mempunyai kekuatan pembuktian yang sah, demikian pula dokumen-dokumen yang akan diserahkan sewaktu-waktu oleh  DEBITUR kepada BANK.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "g",
                      "table": {},
                      "text": " Perjanjian Kredit ini serta dokumen-dokumen lainnya sebagaimana dimaksud adalah sah dan mengikat DEBITUR sehingga pelaksanaan kewajiban atas dasar Fasilitas Kredit ini tidak melanggar atau bertentangan dengan setiap perjanjian yang telah ada sebelumnya maupun setelahnya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "h",
                      "table": {},
                      "text": " Tidak ada sengketa atau perkara material yang terjadi atau dihadapi atau persoalan hukum yang masih harus diselesaikan yang dapat mempengaruhi secara negatif kemampuan DEBITUR dalam memenuhi kewajiban pembayaran utangnya kepada BANK termasuk tetapi tidak terbatas pada mempengaruhi secara negatif terhadap aset yang dijadikan Agunan baik dari  DEBITUR.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "i",
                      "table": {},
                      "text": " Semua pembayaran yang akan dilakukan oleh DEBITUR kepada BANK terkait Fasilitas Kredit ini adalah bebas serta bersih dari pengurangan-pengurangan karena pembayaran pajak atau pungutan-pungutan/biaya-biaya lainnya yang mungkin timbul di kemudian hari.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 8",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "JAMINAN PELUNASAN",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " DEBITUR memberikan kuasa penuh kepada BANK untuk lebih menjamin ketertiban pembayaran kembali atas segala apa yang terhutang oleh DEBITUR pada BANK, baik karena hutang-hutang pokok, bunga dan biaya-biaya lain sehubungan dengan Fasilitas Kredit maka DEBITUR dengan ini memberi kuasa yang tidak dapat dicabut kembali karena sebab apapun juga kepada BANK untuk bertindak dan atas nama DEBITUR untuk melakukan pendebetan rekening DEBITUR baik yang telah terdaftar maupun rekening lainnya baik di BANK maupun di BANK lainnya serta mencairkan segala kekayaan DEBITUR dalam bentuk apapun yang diadministrasikan oleh BANK, guna keperluan pembayaran lunas hutang- hutang DEBITUR kepada BANK.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": " Kuasa-kuasa ini tidak dapat ditarik kembali dan tidak dapat berakhir oleh karena alasan apapun selama hutang antara DEBITUR dengan BANK belum selesai seluruhnya dan merupakan bagian penting yang tidak dapat dipisahkan dari Syarat dan Ketentuan Umum ini. DEBITUR dengan ini setuju untuk melepaskan segala aturan yang termuat dalam Undang-undang termasuk pasal 1813, 1814 dan 1816 Kitab Undang-undang Hukum Perdata dan segala aturan yang menyebabkan suatu kuasa berakhir.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 9",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "WANPRESTASI DAN PENYELESAIAN KREDIT",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " Salah satu dari peristiwa yang disebutkan di bawah ini merupakan suatu ''Peristiwa Cidera Janji” (wanprestasi) terhadap Perjanjian Kredit, yaitu :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": " DEBITUR tidak memenuhi kewajibannya sebagaimana yang ditetapkan dalam Perjanjian Kredit ini atau peraturan yang lazim digunakan atau kemudian akan diperlakukan oleh BANK atau;",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": " DEBITUR tidak memenuhi suatu peraturan pemerintah Republik Indonesia baik pusat maupun daerah yang mengakibatkan dicabutnya izin usaha DEBITUR; atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": " Debitur tidak membayar atau jumlah pokok kredit, Biaya Layanan, denda keterlambatan serta kewajiban-kewajiban lainnya tidak dipenuhi sebagaimana mestinya oleh DEBITUR; atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "d",
                      "table": {},
                      "text": " Atas harta kekayaan DEBITUR dilakukan sitaan penjualan (sita eksekusi) atau sitaan penjagaan Agunan (conservatior beslagh); atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "e",
                      "table": {},
                      "text": " Usaha yang dijalankan DEBITUR dihentikan dan/atau yang berkenaan dengan usaha-usaha DEBITUR tersebut dicabut oleh instansi yang berwenang; atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "f",
                      "table": {},
                      "text": " Menurut pertimbangan BANK sendiri kekayaan DEBITUR sedemikian kurangnya atau usaha DEBITUR mengalami kemunduran sehingga tidak memungkinkan untuk dapat membayar lunas utangnya kepada BANK; atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "g",
                      "table": {},
                      "text": " Pernyataan yang disampaikan di dalam Perjanjian Kredit ini ternyata tidak benar; atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "h",
                      "table": {},
                      "text": " DEBITUR tidak mempergunakan fasilitas Pinjamannya sesuai dengan tujuan penggunaan sebagaimana dimaksud di dalam Perjanjian Kredit ini; atau",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "i",
                      "table": {},
                      "text": " DEBITUR ditetapkan sebagai tersangka dan/atau terdakwa dalam kasus tindak pidana baik yang mengakibatkan dan/atau tidak mengakibatkan hilangnya dan/atau terganggunya penghasilan utama DEBITUR.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": " Dengan tidak memandang berlakunya jangka waktu Perjanjian Kredit sebagaimana dimaksud pada pasal 2 Perjanjian Kredit ini dan apabila terpenuhinya salah satu atau beberapa kondisi sebagaimana dimaksud pada ayat (1) pasal ini, BANK berhak menghentikan Perjanjian Kredit ini seketika dan melakukan hal-hal sebagai berikut :",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "a",
                      "table": {},
                      "text": " Menagih seluruh Fasilitas Kredit yang diterima DEBITUR dan DEBITUR diwajibkan tanpa menunda-nunda lagi membayar seluruh Fasilitas Kredit berupa pokok, biaya layanan, denda, dan kewajiban lainnya yang mungkin timbul dengan seketika dan sekaligus lunas; dan",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "b",
                      "table": {},
                      "text": " Melakukan penyelesaian Fasilitas Kredit melalui penjualan atau pengalihan piutang maupun melalui saluran hukum.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 2,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "c",
                      "table": {},
                      "text": " Apabila selain Fasilitas Kredit ini, DEBITUR memperoleh juga fasilitas pinjaman lainnya dari BANK, maka antara pinjaman-pinjaman tersebut berlaku cross default, yaitu apabila salah satu pinjaman macet maka mengakibatkan pinjaman lainnya macet pula, sehingga BANK mempunyai hak untuk mengeksekusi agunan-agunan yang telah diberikan pada masing-masing pinjaman.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 10",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "PERATURAN DAN KEBIASAAN BANK",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "DEBITUR berkewajiban untuk mematuhi segala peraturan-peraturan serta kebiasaan-kebiasaan BANK, baik yang sekarang ada maupun yang akan diadakan atau diberlakukan dikemudian hari oleh BANK berkenaan dengan pemberian Fasilitas Kredit tersebut dalam Perjanjian Kredit ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 11",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "HAK BANK MENGAKHIRI PERJANJIAN ",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " DEBITUR dengan ini sepakat dan setuju bahwa kewajiban atau kesanggupan BANK untuk menyediakan Fasilitas Kredit berdasarkan Perjanjian Kredit ini menjadi berakhir dan/atau batal apabila terjadi penurunan kualitas kredit, penurunan nilai barang jaminan, penurunan keadaan likuiditas DEBITUR atau karena sebab apapun juga yang dapat mengakibatkan DEBITUR tidak dapat memenuhi kewajibannya kepada BANK.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": " DEBITUR dengan ini setuju, BANK juga berhak untuk membatalkan fasilitas kredit DEBITUR yang telah disetujui berdasarkan Perjanjian Kredit ini sewaktu-waktu tanpa syarat (<i>Unconditionally cancel at any time</i>).",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 12",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "PILIHAN DOMISILI HUKUM",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Tentang Perjanjian Kredit ini dan segala akibatnya Para Pihak memilih domisili yang tetap dan umum di Kantor Kepaniteraan Pengadilan Negeri Jakarta Selatan, demikian dengan tidak mengurangi hak dari BANK untuk memohon pelaksanaan/eksekusi dari perjanjian ini atau mengajukan tuntutan terhadap DEBITUR di hadapan Pengadilan-pengadilan Negeri lainnya dalam Wilayah Republik Indonesia.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 13",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "KETENTUAN KORUPSI & ANTI SUAP",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " PARA PIHAK tidak akan melakukan, memberikan kuasa atau mengijinkan tindakan yang akan menyebabkan PARA PIHAK dan/atau afiliasinya melakukan segala perbuatan yang melanggar hukum yang diatur dalam undang-undang anti korupsi dan/atau peraturan lain yang berlaku. Kewajiban ini berlaku khususnya untuk pembayaran yang tidak sah kepada pejabat pemerintah, wakil-wakil otoritas publik, rekan-rekan PARA PIHAK, keluarga atau teman dekat PARA PIHAK ;",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": " PARA PIHAK setuju bahwa tidak akan menawarkan atau memberi atau setuju untuk memberi kepada karyawan, setiap perwakilan atau pihak ketiga yang bertindak atas nama pihak lain atau menerima atau menyetujui untuk menerima dari setiap karyawan, perwakilan atau pihak ketiga yang bertindak atas nama pihak lain, hadiah atau manfaat baik berupa uang atau lainnya yang mana penerima menurut hukum bukanlah pihak yang berhak sehubungan dengan negosiasi, hasil atau pelaksanaan Perjanjian Kredit ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": " PARA PIHAK wajib segera memberitahukan satu sama lain, jika terjadi kecurigaan adanya tindakan korupsi berkaitan dengan hasil negoisasi atau pelaksanaan Perjanjian Kredit.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "pasal",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Pasal - 14",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "KETENTUAN-KETENTUAN LAIN",
                      "textName": "",
                      "textType": "HEADER"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "1",
                      "table": {},
                      "text": " Kelalaian atau keterlambatan BANK untuk menggunakan hak atau kekuasaannya sesuai dengan Perjanjian Kredit tidak berarti sebagai waiver (pelepasan hak) kecuali hal tersebut dinyatakan secara tertulis oleh BANK.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "2",
                      "table": {},
                      "text": " Segala sesuatu yang belum cukup diatur dalam Perjanjian Kredit ini yang oleh BANK diatur dalam surat menyurat maupun dibuatkan dengan dokumen/akta akta lain, merupakan bagian yang tidak dapat dipisahkan dari Perjanjian Kredit ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "3",
                      "table": {},
                      "text": " Adanya keadaan-keadaan diluar kekuasaan DEBITUR tidak mengurangi kewajiban DEBITUR untuk membayar seluruh Fasilitas Kredit yang diterima DEBITUR kepada BANK. DEBITUR dengan ini melepaskan Pasal 1245 dan 1245 Kitab Undang-Undang Hukum Perdata sepanjang hal tersebut melepaskan DEBITUR dari membayar biaya, rugi dan bunga karena terjadinya sesuatu hal yang tidak diduga.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "4",
                      "table": {},
                      "text": " Semua syarat-syarat dan ketentuan hutang piutang serta ikatan pemberian jaminan dan tanggungan sebagaimana dinyatakan dan ditetapkan dalam perjanjian yang telah ada, tidak satupun yang dikecualikan, tetap berlaku sebagaimana adanya, semuanya disesuaikan dengan Perjanjian Kredit ini.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Demikian, Perjanjian Kredit ini dibuat dalam kondisi dengan penuh kesadaran dan tanpa didasarkan atas unsur paksaan, kekhilafan, penipuan, dan penyalahgunaan keadaan, serta berlaku sejak ditandatanganinya.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "mid",
                      "indentLevel": 1,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<hr class=dashed>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "Demikian perjanjian kredit ini disetujui dan ditandatangani hari ini tanggal 2030-06-21.",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
                      "table": {},
                      "text": "<pre><b>PT. BANK RAYA INDONESIA, Tbk           DEBITUR</b></pre>",
                      "textName": "",
                      "textType": "TEXT"
                  },
                  {
                      "classname": "sign",
                      "indentLevel": 0,
                      "parentTextName": "",
                      "rowNumber": 4,
                      "srlNumber": "",
