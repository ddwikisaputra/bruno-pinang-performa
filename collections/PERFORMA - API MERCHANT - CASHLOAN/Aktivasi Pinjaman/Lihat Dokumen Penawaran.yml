                              },
                              {
                                  "label": "<b>Biaya Administrasi per bulan : Gratis</b>",
                                  "value": "<b>Biaya Tarik Tunai di ATM BRI</b><br>Gratis<br><br><b>Biaya Tarik Tunai di ATM Link & Bersama </b><br>Rp 7.500,-<br><br><b>Biaya Tarik Tunai di Mitra Bank</b><br>Rp 5.000,- (Agen Brilink dan Indomaret)<br><br><b>Biaya Setor Tunai di Mitra Bank </b><br>Rp 5.000,- (Agen Brilink)<br><br><b>Biaya Setor dan Tarik Tunai di Community Branch Raya</b><br>Gratis<br>"
