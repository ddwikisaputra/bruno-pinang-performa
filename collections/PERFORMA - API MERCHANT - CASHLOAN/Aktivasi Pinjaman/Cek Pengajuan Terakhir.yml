info:
  name: Cek Pengajuan Terakhir
  type: http
  seq: 2

http:
  method: POST
  url: "{{base-url-local}}/v/1/aktivasi/cashloan/cek-pengajuan-terakhir"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2dDZDh5ZEpyVktGOWlZeG91bmxrd1FXZEd3PT0=
      description: MAJOO CASHLOAN
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzE3MTA1MTIxMTk1MDAwMQ==
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: kodePartnership
        value: TUNBLTI0NA==
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

