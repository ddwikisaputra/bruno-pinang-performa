  type: http
  seq: 12

http:
  method: POST
  url: "{{base-url-dev}}/v/1/aktivasi/cashloan/link-buka-saving"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2dDZDh5ZEpyVktGOWlZeG91bmxrd1FXZEd3PT0=
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: Q0wtTUoxLVVtRjVZVkJwVUdWeVZHOXcvbDk2bm1YMWxFeHFLMmFOSE80NzJKZGZGSmpqYUs0NGl0Q1luMG5kRnh1Qm1wRVZkZHlTZGlMNlZHdlhKYms9
        description: Kode Cashloan Prakarsa [MANDATORY] [Base64]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

