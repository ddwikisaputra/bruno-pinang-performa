info:
  name: Tolak Penawaran
  type: http
  seq: 6

http:
  method: POST
  url: "{{base-url-local}}/v/1/aktivasi/cashloan/tolak-penawaran"
  headers:
    - name: Api-Key
      value: "{{apiKeyMerchant}}"
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: Q0wtTUoxLVVtRjVZVkJwVUdWeVZHOXcvbDk2bm1YMWxFTnFLbWFNSE80NzJKZGZGSmprYWFrN2lkR2NuRTdkRjlMRk4zd3FmalBpMTVwOXJyeEFjVEk9
        description: Kode Prakarsa [MANDATORY][BASE64 STRING]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY][BASE64 STRING]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

