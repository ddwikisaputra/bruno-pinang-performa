info:
  name: Pengajuan
  type: http
  seq: 3

http:
  method: POST
  url: "{{base-url-local}}/v/1/aktivasi/cashloan/pengajuan"
  headers:
    - name: Api-Key
      value: "{{apiKeyMerchant}}"
  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzI3NjAxMTEwMjAwMDAxMg==
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: nama
        value: UmFpaGFu
        description: Nama [MANDATORY] [Base64]
      - name: tanggalLahir
        value: MTk5Ni0xMC0xNQ==
        description: Tanggal Lahir [MANDATORY] [Base64] [YYYY-MM-DD]
      - name: tempatLahir
        value: Tmdhd2k=
        description: Tempat Lahir [MANDATORY] [Base64]
      - name: jenisKelamin
        value: TGFraS1MYWtp
        description: Jenis Kelamin[MANDATORY] [Base64] ["Perempuan", "Laki-Laki"]
      - name: namaIbuKandung
        value: RnVhZA==
        description: Nama Ibu Kandung [MANDATORY] [Base64]
      - name: statusPernikahan
        value: Kawin
        description: Status Pernikahan [MANDATORY] ["Kawin", "Belum Kawin", "Cerai Hidup", "Cerai Mati"]
      - name: nomorIdentitasPasangan
        value: MzE3MTA1MTIxMTk1MDAwMg==
        description: Nomor Identitas Pasangan [OPTIONAL] [MANDATORY ==> Jika statusPernikahan = "Kawin" ] [Base64]
      - name: namaPasangan
        value: VGVzdGluZw==
        description: Nama Pasangan [OPTIONAL] [MANDATORY ==> Jika statusPernikahan = "Kawin" ] [Base64]
      - name: tanggalLahirPasangan
        value: MjAwMC0xMS0xNw==
        description: Tanggal Lahir Pasangan [OPTIONAL] [MANDATORY ==> Jika statusPernikahan = "Kawin" ] [Base64] [YYYY-MM-DD]
      - name: tempatLahirPasangan
        value: SmFrYXJ0YQ==
        description: Tempat Lahir Pasangan [OPTIONAL] [MANDATORY ==> Jika statusPernikahan = "Kawin" ] [Base64]
      - name: kodePartnership
        value: TUNBLTI0NA==
        description: Kode Partnership [MANDATORY] [Base64]
      - name: kodeTipePinjaman
        value: CHILD-MCA-730
        description: Kode Loan Type [MANDATORY]
      - name: tanggalJoinPartner
        value: 2024-03-20
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

