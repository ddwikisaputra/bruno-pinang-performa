  body:
    type: form-urlencoded
    data:
      - name: nomorIdentitas
        value: MzE3MTA1MTIxMTk1MDAwMQ==
        description: Nomor Identitas User [MANDATORY] [BASE64 STRING]
      - name: kodePartnership
        value: U1JDLTQyOA==
        description: Kode Partnership [MANDATORY][BASE64 STRING]
