info:
  name: Cek OCR
  type: http
  seq: 2

http:
  method: POST
  url: "{{base-url-local}}/v/1/ekyc/cashloan/cek-ocr"
  headers:
    - name: Api-Key
      value: VW1GNVlWQnBVR1Z5Vkc5d2dDNE1nR2I1a09pOFRKNzJIS1FSYlE0RGJlOVlkVVE9
  body:
    type: form-urlencoded
    data:
      - name: kodePrakarsa
        value: Q0wtTUoxLVVtRjVZVkJwVUdWeVZHOXcvbDk2bTJUMGxVTnFLVytLSE80NTJaZGZGSmpqYUswN2lkQ2Fua0xkRXJScUk1NHJoZlpEd21JSjAzSEpWems9
        description: Nomor Identitas User [MANDATORY] [Base64]
      - name: kodePartnership
        value: TUox
        description: Kode Partnership [MANDATORY] [Base64]
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

