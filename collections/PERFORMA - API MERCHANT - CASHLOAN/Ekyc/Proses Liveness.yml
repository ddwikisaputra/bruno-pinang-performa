info:
  name: Proses Liveness
  type: http
  seq: 4

http:
  method: POST
  url: "{{base-url-staging}}/v/1/ekyc/cashloan/proses-liveness"
  headers:
    - name: Api-Key
      value: "{{apiKeyMerchant}}"
    - name: X-Transaction-Tag
      value: "{{hmacLivenessJsonParamDwiki}}"
      disabled: true
  body:
    type: form-urlencoded
    data:
      - name: params
        value: ""
        description: "[MANDATORY] [JSON TO AES]"
        disabled: true
      - name: ""
        value: JSON EXAMPLE
        description: |-
          {
          "kodePrakarsa": "", --> base64
          "kodePartnership": "", -> base64
          "selfieBase64": "", -> base64
          "selfieMimeType": "image/jpeg"
          }
        disabled: true
  auth:
    type: bearer
    token: "{{tokenMerchant}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

