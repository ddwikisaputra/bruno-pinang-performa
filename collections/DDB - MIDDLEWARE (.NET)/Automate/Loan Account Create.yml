info:
  name: Loan Account Create
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/api/digiagri/loan/account/create"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "000426"
        description: AO
      - name: kodeCabang
        value: "0010"
        description: Kode Cabang AO
      - name: noCIF
        value: "438"
        description: CIF Number
      - name: nominal
        value: "100000000"
        description: Loan Amount
      - name: nama
        value: Ibrahim Senoaji
        description: Nama Nasabah
      - name: produk
        value: "40002"
        description: 40002 untuk Angsuran Tetap, 40003 untuk Transaksional
      - name: sukuBunga
        value: "0.18"
        description: sesuai perhitungan FE dalam desimal
      - name: jangkaWaktu
        value: "12"
        description: jangka waktu dalam bulan
      - name: penjadwalanAngsuran
        value: N
        description: N untuk 40002, Y untuk Transaksional
      - name: nomorFasilitas
        value: 0010/0000000438/PK2/001
        description: Nomor Fasilitas
      - name: frekuensiBayarBunga
        value: "1"
        description: sesuai pola angsuran
      - name: tanggalPencairan
        value: 20/10/2021
        description: tanggal akad
      - name: tanggalJatuhTempo
        value: 20/10/2022
        description: Contact Logs -> Due Date (dd/MM/yyyy)
