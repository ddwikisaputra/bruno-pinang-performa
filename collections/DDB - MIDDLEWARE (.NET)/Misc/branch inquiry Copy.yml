info:
  name: branch inquiry Copy
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/digiagri/branch/inquiry/{{branchCode}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
