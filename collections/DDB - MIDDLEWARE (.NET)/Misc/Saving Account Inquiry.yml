info:
  name: Saving Account Inquiry
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/digiagri/saving/account/inquiry"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "000426"
      - name: noCIF
        value: "0000118830"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: gagal
    request:
      url: "{{base_url}}/api/digiagri/saving/account/inquiry"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: "000426"
          - name: noCIF
            value: "438"
    response:
      body:
        type: text
        data: |-
          {
              "statusCode": "99",
              "statusDescription": "Inquiry Gagal!"
          }
