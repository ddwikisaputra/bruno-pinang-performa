info:
  name: Token OTP
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url_otp_dev}}/token"
  body:
    type: form-urlencoded
    data:
      - name: username
        value: "{{username_otp_dev}}"
      - name: password
        value: "{{password_otp_dev}}"
      - name: grant_type
        value: "{{grantttype_otp_dev}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        bru.setGlobalEnvVar("tokenOTP", jsonData.access_token);
        bru.setEnvVar("tokenOTP", jsonData.access_token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success - new url
    request:
      url: "{{base_url_dev_new}}/token"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: username
            value: "{{username_top_dev_new}}"
          - name: password
            value: "{{password_otp_dev_new}}"
          - name: grant_type
            value: "{{grantttype_otp_dev}}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Date
          value: Tue, 30 Sep 2025 04:34:50 GMT
        - name: Content-Type
          value: application/json
        - name: Content-Length
          value: "289"
