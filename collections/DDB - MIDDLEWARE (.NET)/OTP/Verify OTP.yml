info:
  name: Verify OTP
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url_dev}}/api/verotp"
  body:
    type: form-urlencoded
    data:
      - name: client
        value: "{{client_otp_dev}}"
      - name: serverId
        value: "{{serverId}}"
      - name: otp
        value: "70652"
      - name: remark
        value: PINANG PERFORMA
  auth:
    type: bearer
    token: "{{tokenOTP}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
