  url: "{{base_url}}/api/digiagri/dukcapil/huma"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "000426"
      - name: noKTP
        value: "3275042305890013"
      - name: namaLengkap
        value: R. IBRAHIM SENOAJI
