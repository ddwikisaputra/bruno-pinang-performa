info:
  name: dukcapil verify element fix
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url_dev}}/api/digiagri/dukcapilverifyelementwithresult"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: OTk5OTQx
        description: User ID Aplikasi (Base64)
      - name: noKTP
        value: MzIwNjEyMDUwNjg1MDAwMg==
        description: Nomor KTP (Base64)
      - name: namaLengkap
        value: RHdpa2kgU2FwdXRyYQ==
        description: Nama Lengkap sesuai KTP (Base64)
      - name: tempatLahir
        value: SmFrYXJ0YQ==
        description: Tempat Lahir sesuai KTP (Base64)
      - name: tanggalLahir
        value: MTItMTEtMTk5NQ==
        description: Tanggal Lahir sesuai KTP (dd-MM-yyyy) (Base64)
      - name: namaLengkapIbuKandung
        value: UnVtaXlhdGk=
        description: Nama Gadis Ibu Kandung (Base64)
      - name: type
        value: RGViaXR1cg==
