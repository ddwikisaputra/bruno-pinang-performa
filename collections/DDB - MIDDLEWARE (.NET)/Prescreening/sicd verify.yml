info:
  name: sicd verify
  type: http
  seq: 5

http:
  method: GET
  url: "{{base_url_dev}}/api/digiagri/sicdverify?userId=999941&NIK=3171051211950001&flavor=STAGING"
  params:
    - name: userId
      value: "999941"
      type: query
    - name: NIK
      value: "3171051211950001"
      type: query
    - name: flavor
      value: STAGING
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

