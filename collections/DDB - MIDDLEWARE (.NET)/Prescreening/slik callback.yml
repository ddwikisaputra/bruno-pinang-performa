info:
  name: slik callback
  type: http
  seq: 12

http:
  method: POST
  url: "{{callback_url}}"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "999915"
        description: user id request
      - name: statusCode
        value: "1"
        description: 1 / 2
      - name: statusDescription
        value: Good
        description: Good / Tolak
      - name: data
        value: '{"pdfFile":"http://digiagri.briagro.co.id:4343/api/digiagri/slik/partner/pdf/848"}'
        description: Endpoint for access data
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
