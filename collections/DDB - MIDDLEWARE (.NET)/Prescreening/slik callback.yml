    request:
      url: "{{callback_url}}"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: "999915"
            description: user id request
          - name: statusCode
            value: "1"
            description: 1 / 2
          - name: statusDescription
            value: Good
            description: Good / Tolak
          - name: data
            value: '{"pdfFile":"http://digiagri.briagro.co.id:4343/api/digiagri/slik/partner/pdf/848"}'
            description: Endpoint for access data
    response:
      body:
        type: text
        data: |+
          {
              "status":200,
              "desc":"Data Tersimpan",
              "message":"Data pre screening berhasil disimpan"
          }

