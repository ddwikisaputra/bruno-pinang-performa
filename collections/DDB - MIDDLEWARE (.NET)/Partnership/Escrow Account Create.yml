info:
  name: Escrow Account Create
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/digiagri/escrow/account/create"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "000426"
      - name: kodeCabang
        value: "0010"
      - name: noCIF
        value: "0000000438"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: CIF tidak ditemukan
    request:
      url: "{{base_url}}/api/digiagri/escrow/account/create"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: "000426"
          - name: kodeCabang
            value: "0010"
          - name: noCIF
            value: "0000000438"
    response:
      body:
        type: text
        data: |-
          {
              "statusCode": "99",
              "statusDescription": "CIF Tidak Ditemukan"
          }
  - name: Sudah memiliki Rek Escrow
    request:
      url: "{{base_url}}/api/digiagri/escrow/account/create"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: "000426"
          - name: kodeCabang
            value: "0010"
          - name: noCIF
            value: "0000000438"
    response:
      body:
        type: text
        data: |-
          {
              "statusCode": "1",
              "statusDescription": "CIF memiliki rekening escrow",
              "nomorRekening": "001001000309991"
          }
  - name: success
    request:
      url: "{{base_url}}/api/digiagri/escrow/account/create"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: "000426"
          - name: kodeCabang
            value: "0010"
          - name: noCIF
            value: "0000000438"
    response:
      body:
        type: text
        data: "{\r

          \    \"statusCode\": \"1\",\r

          \    \"statusDescription\": \"Success\",\r

          \    \"nomorRekening\": \"001001004381301\"\r

          }"
