info:
  name: Add Pinjaman V1
  type: http
  seq: 16

http:
  method: POST
  url: "{{base_url}}/v/1/crs/add-pinjaman"
  body:
    type: form-urlencoded
    data:
      - name: prakarsaId
        value: "30946"
        description: ID Prakarsa
      - name: userId
        value: "999951"
        description: Personal Number BRI Agro (UserID Login) { MANDATORY }
      - name: loanType
        value: Pinang Mikro
        description: Jenis Kredit { MANDATORY } [ Hardcode 'Pinang Mikro' ]
      - name: facilityType
        value: KMK
        description: Jenis Failitas { OPTIONAL } [ 'KMK' | 'KI' ]
      - name: installmentPattern
        value: "3"
        description: Pola Angsuran { OPTIONAL } ['Bulanan' => 1, '3 Bulanan' => 3, '4 Bulanan' => 4, '6 Bulanan' => 4,' 9 Bulanan' => 9, '12 Bulanan' => 12 ]
      - name: loanTerm
        value: "12"
        description: Jangka Waktu Pinjaman { Optional } [ Dalam Bulan seperti Pola Angsuran ]
      - name: loanAmount
        value: "15000000"
        description: Nominal Pinjaman { OPTIONAL }
      - name: rate
        value: "15"
        description: Suku Bunga {OPTIONAL}
      - name: installmentAmount
        value: "1437500"
        description: Angsuran per Bulan/Musim  { OPTIONAL }
      - name: totalLoanRepayment
        value: "17250000"
        description: Total Pengembalian Pinjaman  { OPTIONAL }
      - name: insuranceType
        value: Askrindo
        description: Asuransi Pinjaman { OPTIONAL } [ 'Askrindo', 'KBRU - Sinarmas Insurtech' ]
      - name: insuranceAmount
        value: "500000"
        description: Total Asuransi (dalam rupiah) { OPTIONAL }
      - name: provisionFee
        value: "105000.90"
        description: Biaya Provisi { OPTIONAL }
      - name: administrationFee
        value: "980000"
        description: Biaya Administrasi { OPTIONAL }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

