info:
  name: Add Pinjaman V2
  type: http
  seq: 15

http:
  method: POST
  url: "{{base_url}}/v/2/crs/add-pinjaman"
  body:
    type: form-urlencoded
    data:
      - name: prakarsaId
        value: "1191"
        description: ID Prakarsa
      - name: userId
        value: "{{userId}}"
        description: "[Encode]Personal Number BRI Agro (UserID Login) { MANDATORY }"
      - name: loanType
        value: Pinang Performa Pro
        description: Jenis Kredit { MANDATORY } [Pinang Performa | Pinang Performa Pro ]
      - name: facilityType
        value: Performa Brilink
        description: Jenis Failitas { OPTIONAL } [ KMK Angsuran Tetap, KI Angsuran Tetap, Performa Brilink ]
      - name: installmentPattern
        value: "3"
        description: Pola Angsuran { OPTIONAL } ['Bulanan' => 1, '3 Bulanan' => 3, '4 Bulanan' => 4, '6 Bulanan' => 4,' 9 Bulanan' => 9, '12 Bulanan' => 12 ]
      - name: loanTerm
        value: "6"
        description: Jangka Waktu Pinjaman { Optional } [ Dalam Bulan seperti Pola Angsuran ]
      - name: loanAmount
        value: "30000000"
        description: Nominal Pinjaman { OPTIONAL }
      - name: rate
        value: "1.24"
        description: Suku Bunga {OPTIONAL}
      - name: installmentAmount
        value: "5833333"
        description: Angsuran per Bulan/Musim  { OPTIONAL }
      - name: totalLoanRepayment
        value: "35000000"
        description: Total Pengembalian Pinjaman  { OPTIONAL }
      - name: insuranceType
        value: Askrindo
        description: Asuransi Pinjaman { OPTIONAL } [ 'Askrindo', 'KBRU - Sinarmas Insurtech' ]
      - name: insuranceAmount
        value: "500000"
        description: Total Asuransi (dalam rupiah) { OPTIONAL }
      - name: provisionFee
        value: "105000"
        description: Biaya Provisi { OPTIONAL }
      - name: administrationFee
        value: "98000"
        description: Biaya Administrasi { OPTIONAL }
      - name: flagFacilityType
        value: KMK Performa Pro Baru
        description: Jenis Failitas { MANDATORY } [ KMK Angsuran Tetap, KI Angsuran Tetap, Performa Brilink, KMK Performa Pro Baru, KMK Takeover / Suplesi, KI Takeover / Suplesi ]
      - name: remainingLastLoanAmount
        value: "0"
        description: Sisa OS Takeover / Suplesi { OPTIONAL }
      - name: insuranceDebitur
        value: "12345"
        description: Asuransi Debitur (dalam rupiah) {OPTIONAL}
      - name: insuranceBank
        value: "54321"
        description: Asuransi Bank (dalam rupiah) {OPTIONAL}
      - name: brilinkStatus
        value: "0"
        description: BriLink Status (-1, 0, 1) {MANDATORY}
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

