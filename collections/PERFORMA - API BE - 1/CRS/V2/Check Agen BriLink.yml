info:
  name: Check Agen BriLink
  type: http
  seq: 18

http:
  method: POST
  url: "{{base_url_dev}}/v/2/crs/check-brilink-agent"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
      - name: prakarsaId
        value: "31290"
      - name: loanType
        value: Pinang Performa Proj
      - name: isUpdate
        value: "2"
        description: MANDATORY (1 | 0)
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

