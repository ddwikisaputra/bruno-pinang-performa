info:
  name: Check Facility Readiness V1
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/v/1/automation/check-facility-readiness"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "0000118826"
        description: Personal Number BRI Agro (UserID Login) { MANDATORY }
      - name: facilityNumber
        value: 0010/0000118826/PK3/003
        description: Nomor Fasilitas { MANDATORY }
  auth:
    type: bearer
    token: "{{tokenJWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

