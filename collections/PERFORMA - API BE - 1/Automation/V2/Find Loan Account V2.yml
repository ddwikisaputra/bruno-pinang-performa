info:
  name: Find Loan Account V2
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/v/2/automation/find-loan-account"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: UmF5YVBpUGVyVG9w/V18nmX6nMisgijrD99BpD4bLL8U3g==
        description: "[Encode]Personal Number BRI Agro (UserID Login) { MANDATORY }"
      - name: prakarsaId
        value: "31328"
        description: ID PRAKARSA {MANDATORY}
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

