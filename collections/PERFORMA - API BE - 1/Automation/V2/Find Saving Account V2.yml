info:
  name: Find Saving Account V2
  type: http
  seq: 5

http:
  method: POST
  url: "{{base_url}}/v/2/automation/find-saving-account"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: "[Encode]Personal Number BRI Agro (UserID Login) { MANDATORY }"
      - name: prakarsaId
        value: "944"
        description: ID PRAKARSA {MANDATORY}
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

