info:
  name: Find BAST V2
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/v/2/document/find-bast"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: "[Encode]Personal Number BRI Agro (UserID Login) { MANDATORY }"
      - name: prakarsaId
        value: "31365"
        description: Prakarsa ID { MANDATORY }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: access forbidden (403)
