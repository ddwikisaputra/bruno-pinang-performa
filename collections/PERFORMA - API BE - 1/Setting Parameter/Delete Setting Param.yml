info:
  name: Delete Setting Param
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url_local}}/v/1/master/delete-setting-param"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
      - name: id
        value: "128"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

