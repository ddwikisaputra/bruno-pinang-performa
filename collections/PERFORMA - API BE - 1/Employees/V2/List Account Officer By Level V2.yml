  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/v/2/employees/list-account-officer"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: UmF5YVBpUGVyVG9w/V18nmX6nMisgijrD99BpD4bLL8U3g==
        description: "[ENCODE] Personal Number BRI Agro (UserID Login)"
      - name: userLevel
        value: "50"
        description: Access Level ID (UserID Login) [ 10 = SF, 20 = Supervisor, 30 = Head, 50 = rbo, 90 = Kantor Pusat ]
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "10"
        description: Limit Data {Default 5}
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

