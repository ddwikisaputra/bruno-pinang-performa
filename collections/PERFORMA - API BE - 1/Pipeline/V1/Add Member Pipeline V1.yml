info:
  name: Add Member Pipeline V1
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/v/1/pipeline/add-member-pipeline"
  body:
    type: form-urlencoded
    data:
      - name: partnershipMemberId
        value: "4"
        description: Member ID {MANDAROTY}
      - name: pipelineId
        value: "13"
        description: "ID Pipeline {MADNATORY} "
      - name: estimationLoan
        value: "1200000"
        description: Estimasi Pinjaman {MANDAROTY}
      - name: userId
        value: "999941"
        description: Personal Number BRI Agro (UserID Login)
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

