info:
  name: List Member Pipeline V1
  type: http
  seq: 9

http:
  method: POST
  url: "{{base_url}}/v/1/pipeline/list-member"
  body:
    type: form-urlencoded
    data:
      - name: id
        value: "365"
        description: ID Pipeline
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "100"
        description: Limit Data {Default 5}
      - name: textSearch
        value: mut
        description: Text Pencarian Data { OPTIONAL }
        disabled: true
      - name: filterAmount[]
        value: "1"
        description: Filter < 25 JT
        disabled: true
      - name: filterAmount[]
        value: "2"
        description: Filter >= 25 JT & < 70JT
        disabled: true
      - name: filterAmount[]
        value: "3"
        description: Filter >= 70 JT & <= 100JT
        disabled: true
      - name: userId
        value: "999941"
        description: Personal Number BRI Agro (UserID Login)
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

