info:
  name: Kirim Link Pasangan V2
  type: http
  seq: 10

http:
  method: POST
  url: "{{base_url_local}}/v/2/digitalsign/kirim-link"
  body:
    type: form-urlencoded
    data:
      - name: kodeProses
        value: UmF5YVBpUGVyVG9w/lx5mm1m4sp5FKVpfKk7vmTd7xtw
        description: Prakarsa ID (Encode AES) {MANDATORY}
  auth:
    type: bearer
    token: "{{tokenJWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unauthorized
    request:
      url: "{{base_url}}/v/2/digitalsign/lihat-url-liveness"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: kodeProses
            value: UmF5YVBpUGVyVG9w/lx+n2wXjR0uqNEIGTXN2gBk4OJN
            description: Prakarsa ID (Encode Base64) {MANDATORY}
          - name: typeLiveness
            value: ""
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Thu, 20 Jul 2023 05:48:32 GMT
        - name: Content-Length
          value: "73"
      body:
        type: json
        data: |-
          {
              "code": 401,
              "message": "Token is expired"
          }
  - name: error database connection
    request:
