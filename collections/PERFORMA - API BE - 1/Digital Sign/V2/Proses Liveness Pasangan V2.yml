info:
  name: Proses Liveness Pasangan V2
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url_dev}}/v/2/digitalsign/proses-liveness-pasangan"
  body:
    type: form-urlencoded
    data:
      - name: kodeProses
        value: UmF5YVBpUGVyVG9w/lx5nmBcgN3n/SIGOwbFwMMGVaBq
        description: Prakarsa ID (Encode AES) { MANDATORY }
      - name: status
        value: "2"
        description: Status Liveness [ 1 = lolos | 2 = tidak lolos ] { MANDATORY }
      - name: selfieBlob
        value: "{{selfieBase64JPG}}"
        description: Blob File (base64) { MANDATORY }
      - name: selfieMimetype
        value: image/jpeg
        description: MimeType File [ image/jpeg | image/png ] { MANDATORY }
      - name: transactionIdLivenessPrivy
        value: LN-A19-NxM-f78e3aec-49ef-43f4-9e57-3236c1167bdd
        description: Transaction ID From Privy
  auth:
    type: bearer
    token: "{{tokenJWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
