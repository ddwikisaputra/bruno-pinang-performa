info:
  name: Cek Whitelist V2
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url_local}}/v/2/digitalsign/cek-whitelist"
  headers:
    - name: X-Forwarded-For
      value: 127.0.0.2
    - name: X-Real-IP
      value: 127.0.0.99
    - name: X-Forwarded-For
      value: 127.0.0.5
  body:
    type: form-urlencoded
    data:
      - name: id
        value: UmF5YVBpUGVyVG9w/lx6nGT4lUZqKWaPHO473n2U6FWtyCIygSantUHgOoc=
        description: Nomor KTP Debitur (Encode AES) {MANDATORY}
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: too many request
    request:
      url: "{{base_url_local}}/v/2/digitalsign/cek-whitelist"
      method: POST
      headers:
        - name: X-Forwarded-For
          value: 127.0.0.2
        - name: X-Real-IP
          value: 127.0.0.99
        - name: X-Forwarded-For
          value: 127.0.0.5
      body:
        type: form-urlencoded
        data:
          - name: id
            value: UmF5YVBpUGVyVG9w/lx6nGT4lUZqKWaPHO473n2U6FWtyCIygSantUHgOoc=
            description: Nomor KTP Debitur (Encode AES) {MANDATORY}
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Wed, 22 Jan 2025 09:21:12 GMT
        - name: Content-Length
          value: "56"
      body:
        type: json
        data: |-
          {
              "message": "Too many requests, please try again later."
          }
  - name: unauthorized
    request:
      url: "{{base_url}}/v/2/digitalsign/cek-whitelist"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: id
            value: MzI3NjA5MTcxMTAwMDAwMQ==
            description: Nomor KTP Debitur (Encode Base64) {MANDATORY}
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Fri, 25 Jun 2021 08:48:50 GMT
        - name: Content-Length
          value: "82"
      body:
        type: json
        data: |-
          {
              "code": 401,
              "message": "Token is expired"
          }
  - name: error database connection
    request:
      url: "{{base_url}}/v/2/digitalsign/cek-whitelist"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: id
            value: UmF5YVBpUGVyVG9w/lt9n2T5lUZqKWeNHO473cTUuP7WgNfndvWN4lk9bHI=
            description: Nomor KTP Debitur (Encode Base64) {MANDATORY}
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Fri, 25 Jun 2021 08:48:50 GMT
        - name: Content-Length
          value: "82"
      body:
        type: json
        data: |-
          {
              "desc": "Unable to open tcp connection with host 'localhost': dial tcp localhost: connect: connection refused",
              "message": "Server sedang dalam perbaikan. Silahkan coba beberapa saat lagi.",
              "status": 500
          }
