info:
  name: Proses Biometric Pasangan V2
  type: http
  seq: 9

http:
  method: POST
  url: "{{base_url_dev}}/v/2/digitalsign/proses-biometric-pasangan"
  body:
    type: form-urlencoded
    data:
      - name: kodeProses
        value: UmF5YVBpUGVyVG9w/lx5nmBcgN3n/SIGOwbFwMMGVaBq
        description: Prakarsa ID (Encode AES) { MANDATORY }
      - name: selfieBlob
        value: 
        description: Blob File (base64) { MANDATORY }
      - name: selfieMimetype
        value: image/jpeg
        description: MimeType File [ image/jpeg | image/png ] { MANDATORY }
  auth:
    type: bearer
    token: "{{tokenJWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

