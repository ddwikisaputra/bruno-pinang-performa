info:
  name: Tolak OL V2
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url_dev}}/v/2/digitalsign/tolak-ol"
  body:
    type: form-urlencoded
    data:
      - name: kodeProses
        value: UmF5YVBpUGVyVG9w/lx5nmBcgN3n/SIGOwbFwMMGVaBq
        description: Prakarsa ID (Encode AES) {MANDATORY}
  auth:
    type: bearer
    token: "{{tokenJWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

