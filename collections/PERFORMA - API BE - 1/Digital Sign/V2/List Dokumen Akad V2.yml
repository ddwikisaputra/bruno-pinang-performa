info:
  name: List Dokumen Akad V2
  type: http
  seq: 14

http:
  method: POST
  url: "{{base_url_dev}}/v/2/digitalsign/list-dokumen-akad"
  body:
    type: form-urlencoded
    data:
      - name: kodeProses
        value: UmF5YVBpUGVyVG9w/lx5nmBcgN3n/SIGOwbFwMMGVaBq
        description: Prakarsa ID (Encode AES) {MANDATORY}
      - name: docType
        value: "1"
        description: "[0 = sebelum ttd (origin file) | 1 = sesudah ttd (doc token ttd) | 2 = sesudah ematerai (doc token ematerai)"
  auth:
    type: bearer
    token: "{{tokenJWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unautorized
    request:
      url: "{{base_url}}/v/2/digitalsign/list-dokumen-akad"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: kodeProses
            value: MzEzMjg=
            description: prakarsaId base64
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Server
          value: nginx
        - name: Date
          value: Sat, 22 May 2021 06:53:21 GMT
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Transfer-Encoding
          value: chunked
        - name: Connection
          value: keep-alive
        - name: Vary
          value: Accept-Encoding
        - name: Content-Encoding
          value: gzip
      body:
        type: json
        data: |-
          {
              "code": 401,
              "message": "signature is invalid || Token is expired"
          }
  - name: error database connection
    request:
