info:
  name: Proses Tandatangan (Lanjut) V2
  type: http
  seq: 11

http:
  method: POST
  url: "{{base_url_dev}}/v/2/digitalsign/proses-tandatangan"
  body:
    type: form-urlencoded
    data:
      - name: kodeProses
        value: UmF5YVBpUGVyVG9w/lx5nmBcgN3n/SIGOwbFwMMGVaBq
        description: PrakarsaId (Encode AES) {MANDATORY}
      - name: continueType
        value: Pasangan
        description: ("PASANGAN"/"DEBITUR") {MANDATORY}
  auth:
    type: bearer
    token: "{{tokenJWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unauthorized
    request:
      url: "{{base_url}}/v/2/digitalsign/proses-tandatangan"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: kodeProses
            value: MzEzMjg=
            description: PrakarsaId (Encode Base64) {MANDATORY}
          - name: continueType
            value: DEBITUR
            description: ("PASANGAN"/"DEBITUR") {MANDATORY}
    response:
      body:
        type: text
        data: "{\r

          \    \"code\": 401,\r

          \    \"message\": \"signature is invalid || Token is expired\"\r

          }"
  - name: error database connection
    request:
      url: "{{base_url}}/v/2/digitalsign/proses-tandatangan"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: kodeProses
            value: MzEzMjg=
