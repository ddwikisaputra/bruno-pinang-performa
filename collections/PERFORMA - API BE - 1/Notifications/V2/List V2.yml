info:
  name: List V2
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url_prod}}/v/2/notifications/list"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: "[ENCODE] Personal Number BRI Agro (UserID Login)"
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "10"
        description: Limit Data {Default 5}
      - name: status
        value: "2"
        description: Filter Stats [0 = status 0 (waiting push) , 1 (success push) & -1 (error push) | 1 = status 2 (success read) | 2 = all status 0,1,2,-1]
      - name: category
        value: all
        description: Category ["all", prakarsa", "akad", "pencairan", "all"]
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

