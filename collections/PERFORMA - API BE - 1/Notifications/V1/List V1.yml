  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/v/1/notifications/list"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "999941"
        description: Personal Number BRI Agro (UserID Login)
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "20"
        description: Limit Data {Default 5}
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

