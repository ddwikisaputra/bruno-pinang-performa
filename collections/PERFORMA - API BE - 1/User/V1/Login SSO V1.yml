info:
  name: Login SSO V1
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url_dev}}/v/1/user/login-sso"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "001317"
        description: Personal Number BRI Agro (UserID untuk i-SDM)
      - name: password
        value: YnJpRHdpa2kyMDIx
        description: Password untuk i-SDM (encode base64)
      - name: ipAddress
        value: 127.0.0.1
        description: IP device dari Apps

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        bru.setGlobalEnvVar("token", jsonData.data.accessToken)
        bru.setEnvVar("token", jsonData.data.accessToken)
        bru.setGlobalEnvVar("userId", jsonData.data.userId)
        bru.setEnvVar('userId', jsonData.data.userId)
        bru.setGlobalEnvVar("loginTicket", jsonData.data.loginTicket)
        bru.setEnvVar('loginTicket', jsonData.data.loginTicket)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

