info:
  name: Login SSO V2
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url_prod}}/v/2/user/login-sso"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: UmF5YVBpUGVyVG9w/V18nmX6nMisgijrD99BpD4bLL8U3g==
        description: Personal Number BRI Agro (UserID untuk i-SDM) -> (aes)
      - name: password
        value: UmF5YVBpUGVyVG9wlAMH3QaFwAQ6KjTDYZpClwRBubIbM/UCwHALgs9qZbk=
        description: Password untuk i-SDM (base64 -> aes) 0
      - name: ipAddress
        value: 127.0.0.1
        description: IP device dari Apps
      - name: from
        value: apps
        description: Login dari ['apps' | 'website']
      - name: appsVersion
        value: v.1.2.1
        description: "Apps Version for from apps [ex: v.1.1.0]"
      - name: webVersion
        value: v.1.3.1
        description: "Website Version for from apps [ex: v.1.1.0]"
        disabled: true

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        bru.setGlobalEnvVar("token", jsonData.data.accessToken)
        bru.setEnvVar("token", jsonData.data.accessToken)
        bru.setGlobalEnvVar("userId", jsonData.data.userId)
        bru.setEnvVar('userId', jsonData.data.userId)
        bru.setGlobalEnvVar("loginTicket", jsonData.data.loginTicket)
        bru.setEnvVar('loginTicket', jsonData.data.loginTicket)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
