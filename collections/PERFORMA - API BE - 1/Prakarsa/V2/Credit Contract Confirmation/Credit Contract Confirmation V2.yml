info:
  name: Credit Contract Confirmation V2
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url_local}}/v/2/prakarsa/credit-contract-confirmation/31356"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: Personal Number BRI Agro (UserID Login)
      - name: savingAccountNumber
        value: "001001009391319"
        description: Nomor Rekening Simpanan Digital Nasabah
      - name: savingAccountName
        value: JAHUDA KURNIA PUTRA
        description: Nama Rekening Simpanan Digital Nasabah
      - name: savingAccountType
        value: TABUNGAN RAYA
        description: Tipe Rekening Simpanan Nasabah
      - name: documentType[]
        value: skpp
        description: Tipe Dokumen [skpp, sph, skma, bast, tbla, skpk, skdr, dgs]  { OPTIONAL }
      - name: documentBlob[]
        value: "{{skppBase64}}"
        description: String Base64 { OPTIONAL }
      - name: documentMimetype[]
        value: application/pdf
        description: MimeType File (application/pdf) { OPTIONAL }
      - name: isDebitur[]
        value: "1"
        description: Flag TTD Debitur [0 = Disable | 1 = Enable] { OPTIONAL }
      - name: isPasangan[]
        value: "0"
        description: Flag TTD Pasangan 0 = Disable | 1 = Enable { OPTIONAL }
      - name: isCBL[]
        value: "0"
        description: Flag TTD CBL 0 = Disable | 1 = Enable { OPTIONAL }
      - name: isEmaterai[]
        value: "0"
        description: Flag Dok Materai  [0 = Tidak Materai | 1 = Materai] { OPTIONAL }
      - name: countEmaterai[]
        value: "0"
        description: Total Materai { OPTIONAL }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

