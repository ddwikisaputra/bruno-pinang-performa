info:
  name: Returned V2
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url_local}}/v/2/prakarsa/returned/946"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: Personal Number BRI Agro (UserID Login)
      - name: reasonType
        value: "2"
        description: Alasan [ 1=Pre-Screening, 2=CRS ]
      - name: reason
        value: Data Belum Sesuai
        description: Penjelasan DIkembalikan
      - name: returnType
        value: RBO
        description: Owner Pengembalian [ CBL | RBO ]
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unautorized
    request:
      url: "{{base_url}}/v/2/prakarsa/returned/31328"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: "000230"
            description: Personal Number BRI Agro (UserID Login)
          - name: reasonType
            value: "2"
            description: Alasan [ 1=Pre-Screening, 2=CRS ]
          - name: reason
            value: Kurang Tepat
            description: Penjelasan DIkembalikan
          - name: returnType
            value: RBO
            description: Owner Pengembalian [ CBL | RBO ]
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: |-
          {
              "code": 401,
              "desc": "Tidak Memliki Akses",
              "message": "Invalid Token || Token Is Expired"
          }
  - name: access forbidden (403)
