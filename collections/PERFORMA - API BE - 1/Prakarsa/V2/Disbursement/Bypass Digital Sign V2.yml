info:
  name: Bypass Digital Sign V2
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/v/2/prakarsa/bypass-digital-sign"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: User Id AES {MANDATORY}
      - name: prakarsaId
        value: "31328"
        description: ID Prakarsa {MANDATORY}
      - name: typeBypass
        value: "1"
        description: Flag Bypass [0 = tidak bypass | 1 bypass] {MANDATORY}
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unautorized
    request:
      url: "{{base_url}}/v/2/prakarsa/bypass-digital-sign"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: id
            value: "820"
            description: ID Prakarsa
          - name: from
            value: pre-screening
            description: Pembatalan dari [ 'pre-screening' | 'analisa-pinjaman' ]
          - name: reason
            value: Batal Proses Pre-Screening
            description: Penjelasan Dibatalkan
          - name: userId
            value: "999961"
            description: Personal Number BRI Agro (UserID Login)
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Thu, 24 Jun 2021 07:03:46 GMT
        - name: Content-Length
          value: "82"
      body:
        type: json
        data: |-
          {
              "code": 401,
              "desc": "Expired",
              "message": "Invalid Token || Token Is Expired"
          }
