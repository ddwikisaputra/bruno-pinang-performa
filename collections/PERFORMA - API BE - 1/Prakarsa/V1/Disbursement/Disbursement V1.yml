info:
  name: Disbursement V1
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/v/1/prakarsa/disbursement/700"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "999961"
        description: Personal Number BRI Agro (UserID Login)
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unautorized
    request:
      url: "{{base_url}}/v/1/prakarsa/disbursement/99"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: "000230"
            description: Personal Number BRI Agro (UserID Login)
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Fri, 25 Jun 2021 08:48:50 GMT
        - name: Content-Length
          value: "82"
      body:
        type: json
        data: |-
          {
              "code": 401,
              "desc": "Tidak Memliki Akses",
              "message": "Invalid Token || Token Is Expired"
          }
  - name: access forbidden (403)
    request:
      url: "{{base_url}}/v/1/prakarsa/disbursement/30946"
