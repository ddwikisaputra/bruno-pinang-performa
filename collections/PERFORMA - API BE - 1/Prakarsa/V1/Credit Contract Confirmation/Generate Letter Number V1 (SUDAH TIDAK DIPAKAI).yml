info:
  name: Generate Letter Number V1 (SUDAH TIDAK DIPAKAI)
  type: http
  seq: 5

http:
  method: POST
  url: "{{base_url}}/v/1/prakarsa/generate-letter-number"
  body:
    type: form-urlencoded
    data:
      - name: prakarsaId
        value: "15"
        description: ID Prakarsa
      - name: type
        value: SKPP
        description: Tipe Surat (SPH | SKMA | SPPK | BAST| SKPP)
      - name: branchCode
        value: SLO
        description: Kode Korespondensi Cabang
      - name: month
        value: XI
        description: Bulan
      - name: year
        value: "2020"
        description: Tahun
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{base_url}}/v/1/prakarsa/generate-letter-number"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: prakarsaId
            value: "41"
            description: ID Prakarsa
          - name: type
            value: BAST
            description: Tipe Surat (SPH | SKMA | SPPK | BAST)
          - name: branchCode
            value: SLO
            description: Kode Korespondensi Cabang
          - name: month
            value: XI
            description: Bulan
          - name: year
            value: "2020"
            description: Tahun
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Wed, 21 Jul 2021 18:46:43 GMT
        - name: Content-Length
          value: "136"
      body:
