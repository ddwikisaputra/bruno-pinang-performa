info:
  name: List By User Level V1
  type: http
  seq: 12

http:
  method: POST
  url: "{{base_url}}/v/1/prakarsa/list-by-user-level"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: Personal Number BRI Agro (UserID Login)
      - name: userLevel
        value: "90"
        description: Access Level ID (UserID Login) [ 10 = SF, 20 = Supervisor, 30 = Head, 90 = Kantor Pusat ]
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "10"
        description: Limit Data {Default 5}
      - name: textSearch
        value: dwiki
        description: Text Pencarian Data { OPTIONAL }
        disabled: true
      - name: statusType
        value: "7"
        description: Filter by Status { OPTIONAL } [ 0 => All, 1 => Proses Input Pre-Screening, 2 => Menunggu Hasil Pre-Screening, 3 => Pre-Screening Disetujui, 4 => Proses Input CRS, 5 => Menunggu Putusan, 6 => Prakarsa Disetujui, Minta Persetujuan Nasabah, 7 => Proses Akad Kredit, 8 => Proses Pencairan, 9 => Pencairan Berhasil, -1 => Pre-Screening Error, -2 => Pre-Screening Ditolak, -3 => Prakarsa Ditolak, -4 => Prakarsa Disetujui, Tetapi Ditolak Nasabah, -5 => Prakarsa Dibatalkan Pre-Screening, -6 = Prakarsa Dibatalkan Analisa Pinjaman ]
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

