        value: partner
        description: Tipe Data (partner / community) { DEFAULT "partner" }
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "100"
        description: Limit Data {Default 5}
      - name: textSearch
        value: Majoo
        description: Text Search { Default NULL }
      - name: branchCode
        value: ""
        description: Branch Code BRI Agro (BranchCode Login) | Main Branch = 0010[FOR LOANTYPE]
      - name: isLoanType
        value: "1"
        description: "Preload Data Loan Type | [ 1 = FOR LOANTYPE] | OPTIONAL "
      - name: filterLoanTypeStatus
        value: "0"
        description: Filtering Loan Type Status | 0 = Include Enabled & Disabled | 1 = Only Enabled | 2 = Only Disabled | 3 = Only Deleted | 4 - all status | Default = 0 | OPTIONAL
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

