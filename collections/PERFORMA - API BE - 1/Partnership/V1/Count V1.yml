info:
  name: Count V1
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/v/1/partnerships/count"
  body:
    type: form-urlencoded
    data:
      - name: type
        value: partner
        description: Tipe Data (partner / community) { DEFAULT "partner" }
      - name: userId
        value: "999941"
        description: Personal Number BRI Agro (UserID Login)
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

