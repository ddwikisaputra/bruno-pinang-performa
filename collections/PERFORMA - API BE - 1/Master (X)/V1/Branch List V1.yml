  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/v/1/master/branch-list"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "999941"
        description: Personal Number BRI Agro (UserID Login)
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "1000"
        description: Limit Data {Default 5}
      - name: textSearch
        value: cahya
        description: Text Pencarian Data { OPTIONAL }
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

