info:
  name: Cities V1
  type: http
  seq: 6

http:
  method: GET
  url: "{{base_url}}/v/1/master/cities/03"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{base_url}}/v/1/master/cities/{{provinceId}}"
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "data": [
                  {
                      "cityCode": "0396",
                      "city": "Wil. Kab. Administrasi Kepulauan Seribu"
                  },
                  {
                      "cityCode": "0393",
                      "city": "Wil. Kota Jakarta Barat"
                  },
                  {
                      "cityCode": "0391",
                      "city": "Wil. Kota Jakarta Pusat"
                  },
                  {
                      "cityCode": "0394",
                      "city": "Wil. Kota Jakarta Selatan"
                  },
                  {
                      "cityCode": "0395",
                      "city": "Wil. Kota Jakarta Timur"
                  },
                  {
                      "cityCode": "0392",
                      "city": "Wil. Kota Jakarta Utara"
                  }
              ],
              "desc": "Data Valid",
              "message": "Data ditemukan",
              "status": 200
          }
  - name: unautorized
    request:
      url: "{{base_url}}/v/1/master/cities/{{provinceId}}"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: |-
          {
              "code": 401,
              "desc": "Expired",
              "message": "Invalid Token || Token Is Expired"
          }
  - name: general error
    request:
      url: "{{base_url}}/v/1/master/cities/{{provinceId}}"
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "data" : null,
              "status": 500,
              "message": "Server sedang maintenance, silahkan coba beberapa saat lagi",
              "desc": "Could not connect ....."
          }
  - name: validation param
    request:
      url: "{{base_url}}/v/1/master/cities/{{provinceId}}"
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "data" : null,
              "status": 500,
              "message": "Maaf, parameter provinsi belum dipilih",
              "desc": "Parameter provinceId belum terisi"
          }
  - name: not found
