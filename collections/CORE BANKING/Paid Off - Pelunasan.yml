info:
  name: Paid Off / Pelunasan
  type: http
  seq: 34

http:
  method: POST
  url: "{{URL}}/transaction/paid-off"
  body:
    type: json
    data: "{\r

      \    \"RekeningDebet\":\"001001014313314\", // rek saving / giro\r

      \    \"RekeningKredit\" :\"001001119484109\", // rek loan\r

      \    \"Penalty\" : \"0\", // konfirmasi ke GL apa (bukan denda karna telat tp sesuai perjanjian kredit)\r

      \    \"Remark\" : \"PELUNASAN PINJAMAN 001001119484109\"\r

      }"
  auth:
    type: basic
    username: pinang-mikro
    password: "0"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

