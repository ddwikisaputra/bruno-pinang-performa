info:
  name: Create Transactional Loan
  type: http
  seq: 22

http:
  method: POST
  url: "{{base_url}}/api/pinang/loan/create"
  body:
    type: form-urlencoded
    data:
      - name: kodeCabang
        value: "0020"
      - name: namaSesuaiId
        value: Dwiki Saputra
      - name: jangkaWaktu
        value: "7"
      - name: nominal
        value: "300000"
      - name: nomorCIF
        value: "0000149436"
      - name: nomorFasilitas
        value: 0020/0000149436/PK3/008
      - name: penalti
        value: "0.5"
      - name: sukuBunga
        value: "0.25"
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

