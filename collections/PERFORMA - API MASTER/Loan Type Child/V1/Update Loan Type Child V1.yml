info:
  name: Update Loan Type Child V1
  type: http
  seq: 6

http:
  method: POST
  url: "{{url-dev}}/v/1/master/loan-type-child-update"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "001308"
        description: UserId Login | MANDATORY
      - name: id
        value: "308"
        description: Loan Type Child Id | MANDATORY
      - name: loanTypeParentId
        value: "398"
        description: Loan Type Parent Id | MANDATORY
      - name: loanTypeSubparentId
        value: "114"
        description: Loan Type Subparent Id by Parent Id | MANDATORY
      - name: transactionType
        value: "2"
        description: Type Transsaksi | 1 = SUPPLIER | 2 = MERCHANT | 3 = KMK MURNI | MANDATORY
      - name: loanTypeName
        value: UPDATE TESTING DWIKI
        description: Loan Type Name | MANDATORY
      - name: isCustom
        value: "1"
        description: Konfiguration Loan Type Manual | 1 = YES | 0 = NO | MANDATORY
      - name: insurance
        value: "1"
        description: insurance id [check on list insurance by product type] | MANDATORY IF ISCUSTOM = 1
      - name: provisionFee
        value: "10.12"
        description: "percentage value (decimal number) [ex : 0.12] | MANDATORY IF ISCUSTOM = 1"
      - name: interestRate[]
        value: "12.1"
        description: Persentasi Suku Bunga | MANDATORY IF ISCUSTOM = 1
      - name: plafondStart[]
        value: "500000"
        description: Plafond Awal untuk range rate suku bunga | MANDATORY IF ISCUSTOM = 1
      - name: plafondEnd[]
        value: "1000000"
        description: Plafond Akhir untuk range rate suku bunga | MANDATORY IF ISCUSTOM = 1
      - name: loanTermStart[]
        value: "1"
        description: Tenor Awal | MANDATORY IF ISCUSTOM = 1
      - name: loanTermEnd[]
        value: "7"
        description: Tenor Akhir | MANDATORY IF ISCUSTOM = 1
      - name: installmentPattern[]
        value: 7 hari
        description: "Pola Angsuran ( ex : 3 bulan | 4 bulan | 6 bulan | 7 hari | 14 hari | 30 hari) | MANDATORY IF ISCUSTOM = 1"
      - name: installmentPatternType[]
        value: "1"
        description: Pola Angsuran Type( 1 = Angsuran Tetap | 2 = Sekali Lunas) | MANDATORY IF ISCUSTOM = 1
      - name: nominalStart[]
        value: "500000"
        description: Nominal Pinjaman Awal untuk range admin fee | MANDATORY IF ISCUSTOM = 1
      - name: nominalEnd[]
        value: "1000000"
        description: Nominal Pinjaman Akhir untuk range admin fee | MANDATORY IF ISCUSTOM = 1
      - name: adminFee[]
        value: "50000"
        description: Biaya Admin | MANDATORY IF ISCUSTOM = 1
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

