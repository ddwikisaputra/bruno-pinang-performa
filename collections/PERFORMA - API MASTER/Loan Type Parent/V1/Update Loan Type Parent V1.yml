info:
  name: Update Loan Type Parent V1
  type: http
  seq: 8

http:
  method: POST
  url: "{{url-local}}/v/1/master/loan-type-parent-update"
  body:
    type: form-urlencoded
    data:
      - name: id
        value: 233A
        description: Loan Type Parent Id | MANDATORY
      - name: userId
        value: "999999"
        description: UserId Login | MANDATORY
      - name: loanTypeName
        value: TEACIS
        description: Loan Type Name | MANDATORY
      - name: insurance
        value: "11"
        description: insurance id [check on list insurance] | MANDATORY
      - name: productType
        value: "40002"
        description: Core Banking Code (40002 = Angsuran Tetap | 40003 = KMK Transaksional) | MANDATORY
      - name: provisionFee
        value: "10.12"
        description: "percentage value (decimal number) [ex : 0.2] | MANDATORY"
      - name: plafondStart[]
        value: "60"
        description: Plafond Awal untuk range rate suku bunga | MANDATORY
      - name: plafondEnd[]
        value: "70"
        description: Plafond Akhir untuk range rate suku bunga | MANDATORY
      - name: loanTermStart[]
        value: "6"
        description: Tenor Awal | MANDATORY
      - name: loanTermEnd[]
        value: "7"
        description: Tenor Akhir | MANDATORY
      - name: interestRate[]
        value: "10.11"
        description: Persentasi Suku Bunga | MANDATORY
      - name: installmentPattern[]
        value: 6 bulan
        description: "Pola Angsuran (ex : 3 bulan | 4 bulan | 6 bulan | 7 hari | 14 hari | 30 hari) | MANDATORY"
      - name: installmentPatternType[]
        value: "2"
        description: Pola Angsuran Type( 1 = Angsuran Tetap | 2 = Sekali Lunas) | MANDATORY
      - name: nominalStart[]
        value: "650000"
        description: Nominal Pinjaman Awal untuk range admin fee | MANDATORY
      - name: nominalEnd[]
        value: "1500000"
        description: Nominal Pinjaman Akhir untuk range admin fee | MANDATORY
      - name: adminFee[]
        value: "550000"
        description: Biaya Admin | MANDATORY
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

