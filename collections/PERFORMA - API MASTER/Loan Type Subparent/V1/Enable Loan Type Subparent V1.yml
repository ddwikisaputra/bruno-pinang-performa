info:
  name: Enable Loan Type Subparent V1
  type: http
  seq: 5

http:
  method: POST
  url: "{{url-local}}/v/1/master/loan-type-subparent-enable"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "001308"
        description: UserId Login | MANDATORY
      - name: id
        value: "114"
        description: Loan Type Parent Id | MANDATORY
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

