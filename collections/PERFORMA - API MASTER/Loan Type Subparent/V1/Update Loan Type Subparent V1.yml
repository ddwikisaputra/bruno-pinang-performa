info:
  name: Update Loan Type Subparent V1
  type: http
  seq: 8

http:
  method: POST
  url: "{{url-local}}/v/1/master/loan-type-subparent-update"
  body:
    type: form-urlencoded
    data:
      - name: id
        value: "109"
        description: Loan Type Subparent Id | MANDATORY
      - name: userId
        value: "999999"
        description: UserId Login | MANDATORY
      - name: loanTypeParentId
        value: "391"
        description: Loan Type Name | MANDATORY
      - name: loanTypeName
        value: Update Testing Dwiki
        description: Loan Type Name | MANDATORY
      - name: insurance
        value: "11"
        description: insurance id [check on list insurance] | MANDATORY
      - name: provisionFee
        value: "10.12"
        description: "percentage value (decimal number) [ex : 0.12] | MANDATORY"
      - name: interestRate[]
        value: "12.1"
        description: Persentasi Suku Bunga | MANDATORY
      - name: plafondStart[]
        value: "500000"
        description: Plafond Awal untuk range rate suku bunga | MANDATORY
      - name: plafondEnd[]
        value: "1000000"
        description: Plafond Akhir untuk range rate suku bunga | MANDATORY
      - name: loanTermStart[]
        value: "1"
        description: Tenor Awal | MANDATORY
      - name: loanTermEnd[]
        value: "7"
        description: Tenor Akhir | MANDATORY
      - name: installmentPattern[]
        value: 7 hari
        description: "Pola Angsuran (ex : 3 bulan | 4 bulan | 6 bulan | 7 hari | 14 hari | 30 hari) | MANDATORY"
      - name: installmentPatternType[]
        value: "1"
        description: Pola Angsuran Type( 1 = Angsuran Tetap | 2 = Sekali Lunas) | MANDATORY
      - name: adminFee[]
        value: "50000"
        description: Biaya Admin | MANDATORY
      - name: nominalEnd[]
        value: "1000000"
        description: Nominal Pinjaman Awal untuk range admin fee | MANDATORY
      - name: nominalStart[]
        value: "500000"
        description: Nominal Pinjaman Akhir untuk range admin fee | MANDATORY
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

