info:
  name: List Loan Type Subparent V1
  type: http
  seq: 7

http:
  method: POST
  url: "{{url-prod}}/v/1/master/loan-type-subparent-list"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "001317"
        description: UserId Login | MANDATORY
      - name: loanTypeParentId
        value: "0"
        description: Loan Type Parent ID | DEFAULT = 0 | 0 = All List | OPTIONAL
        disabled: true
      - name: filterStatus
        value: "0"
        description: Filtering Status | 0 = Include Enabled & Disabled | 1 = Only Enabled | 2 = Only Disabled | 3 = Only Deleted | 4 - all status | Default = 0 | OPTIONAL
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

