    type: form-urlencoded
    data:
      - name: userId
        value: "001317"
        description: User ID Login/ PN { MANDATORY }
      - name: textSearch
        value: dw
        description: Text Pencarian Data { OPTIONAL }
        disabled: true
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0} { MANDATORY }
      - name: recordCount
        value: "5"
        description: Limit Data {Default 5} { MANDATORY }
      - name: documentType
        value: "2"
        description: Tipe Dokumen [ 1=> Ketentuan | 2 => Produk , 0 = All] {Default ALL} { OPTIONAL }
        disabled: true
      - name: isShow
        value: "1"
        description: Filter Status Show [ 0 => FALSE | 1 => TRUE ] {Default 0} { OPTIONAL }
        disabled: true
      - name: isCount
        value: "1"
        description: Menampilkan Count Semua Data [ 0 => Tidak Tampil | 1 => Tampil  ] {Default 0} { OPTIONAL }
  auth:
    type: bearer
    token: UmF5YVBpUGVyVG9wtk843jG/7RB5In2KHO843o1PCIi6N/9g1KDYjEHKFfrcgR+Er9FaSjiWfvpaYJ3wHKHqKfZA3sulxsHQ7T9P45sD+L32owynMK34Vzs1FExeNhzfaFhvSDwdMqm5zWJE5ch+60VTtVXgCB40OQ==

