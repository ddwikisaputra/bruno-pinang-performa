info:
  name: Add Sales Kit Document V1
  type: http
  seq: 1

http:
  method: POST
  url: "{{url-dev}}/v/1/master/saleskit-document-add"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "001308"
        description: User ID Login/ PN { MANDATORY }
      - name: name
        value: Teting Dwiki
        description: Nama Dokumen { MANDATORY }
      - name: documentType
        value: "2"
        description: Tipe Dokument {Default 1} [ 1=> Ketentuan | 2 => produk  ] { MANDATORY }
      - name: uploadedBy
        value: Admin
        description: Diupload Oleh { MANDATORY }
      - name: documentBlob
        value: 
        description: Blob File (base64) { MANDATORY }
      - name: documentMimeType
        value: application/pdf
        description: MimeType File (application/pdf) { MANDATORY }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

