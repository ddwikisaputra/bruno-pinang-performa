info:
  name: Add Insurance V1
  type: http
  seq: 1

http:
  method: POST
  url: "{{url-dev}}/v/1/master/insurance-add"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "001308"
        description: UserId Login | MANDATORY
      - name: insuranceName
        value: Test Insurance Dwiki
        description: Insurance Name | MANDATORY
      - name: productType
        value: "40003"
        description: Core Banking Code (40002 = Angsuran Tetap | 40003 = KMK Transaksional) | MANDATORY
      - name: percentage
        value: "2.4"
        description: Nominal Insurance Percentage | MANDATORY
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

