info:
  name: Villages V1
  type: http
  seq: 5

http:
  method: GET
  url: "{{url}}/v/1/master/villages/317105"
  body:
    type: multipart-form
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

