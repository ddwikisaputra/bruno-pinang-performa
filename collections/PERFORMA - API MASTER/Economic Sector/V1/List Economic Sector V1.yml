info:
  name: List Economic Sector V1
  type: http
  seq: 2

http:
  method: POST
  url: "{{url-staging}}/v/1/master/economic-sector"
  body:
    type: form-urlencoded
    data:
      - name: filterStatus
        value: all
        description: Filter Status [OPTIONAL] [enable | disable | all == Default all]
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unautorized
    request:
      url: "{{url-local}}/v/1/master/economic-sector"
      method: POST
      headers:
        - name: Content-Type
          value: application/x-www-form-urlencoded
      body:
        type: form-urlencoded
        data:
          - name: filterStatus
            value: all
            description: "[OPTIONAL] => string (all|enable|disable)"
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: |-
          {
              "code": 401,
              "desc": "Expired",
              "message": "Invalid Token || Token Is Expired"
          }
  - name: error database connection
    request:
      url: "{{url-local}}/v/1/master/economic-sector"
      method: POST
      headers:
        - name: Content-Type
          value: application/x-www-form-urlencoded
      body:
        type: form-urlencoded
        data:
