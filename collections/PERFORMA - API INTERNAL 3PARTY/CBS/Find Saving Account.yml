info:
  name: Find Saving Account
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/v/1/3party/cbs/find-saving-account"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: OTk5OTQx
        description: User Id [ENCODE BASE64] [MANDATORY]
      - name: cif
        value: 0000118830==
        description: CIF Number [MANDATORY]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

