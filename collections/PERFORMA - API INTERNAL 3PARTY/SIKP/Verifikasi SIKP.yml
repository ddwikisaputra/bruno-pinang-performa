info:
  name: Verifikasi SIKP
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/v/1/3party/sikp/verification"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: OTk5OTQx
        description: User Id [ENCODE BASE64] [MANDATORY]
      - name: ktpNumber
        value: MzMyMzE2MjIxMTk2MDAwMQ==
        description: KTP Number [ENCODE BASE64] [MANDATORY]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Data Ditemukan (terdaftar di SIKP sebagai debitur Bank Lain)
    request:
      url: "{{url}}/v/1/3party/sikp/verification"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: OTk5OTQx
          - name: ktpNumber
            value: MzIwOTM2NTQwNzgzMDAwMQ==
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Tue, 17 Jan 2023 13:01:00 GMT
        - name: Content-Length
          value: "238"
      body:
        type: json
        data: |-
          {
              "data": {
                  "statusCode": 1,
                  "statusDescription": "NIK telah terdaftar di SIKP sebagai debitur Bank Lain.",
                  "bankCode": "008",
                  "uploadDate": "2022-11-03 17:31:38",
                  "isWarning": 1
              },
              "desc": "Success Process.",
              "message": "Data Ditemukan.",
              "status": 200
          }
