info:
  name: SICD Verification
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/v/1/3party/sicd/verification"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: OTk5OTQx
        description: Base64 UserId [MANDATORY]
      - name: ktpNumber
        value: MzE3MTA1MTIxMTk1MDAwMQ==
        description: Base64 Ktp Number[MANDATORY]
      - name: sicdType
        value: performa
        description: performa | bnpl
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

