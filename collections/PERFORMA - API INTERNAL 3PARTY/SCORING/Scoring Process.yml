info:
  name: Scoring Process
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/v/1/3party/scoring/process"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: OTk5OTAw
        description: Base64 UserId [MANDATORY]
      - name: uid
        value: 3201134811970003-1
        description: unique id [MANDATORY]
      - name: name
        value: Deya Indarsih
        description: Nama [MANDATORY]
      - name: ktpNumber
        value: MzIwMTEzNDgxMTk3MDAwMw==
        description: Base64 Ktp Number[MANDATORY]
      - name: phone
        value: "+6281319968865"
        description: "No Telepon (ex : +628xxxx) [MANDATORY]"
      - name: loanNumber
        value: MER-PRE-1
        description: Prakarsa ID (ORI = for pta | EXP = for merchant financing | MER-PRE = for prewihtelist) [MANDATORY]
      - name: scoringType
        value: bigdata
        description: Tipe Scoring (performa-pro | performa-bulanan | performa-musiman) [MANDATORY] -> DEFAULT aiforesee
      - name: netIncome
        value: "41.8292"
        description: angsuran_pendapatan_bersih [MANDATORY for performa-pro | performa-bulanan | performa-musiman]
      - name: liquidationPlafond
        value: "215.7371"
        description: nilai_likuidasi_terhadap_plafon [MANDATORY for performa-pro]
      - name: longTimeBusiness
        value: "5.0000"
        description: lama_usaha [MANDATORY for performa-pro]
      - name: longStay
        value: "4.0000"
        description: lama_menetap [MANDATORY for performa-pro]
      - name: residentialOwnership
        value: miliksendiri
        description: kepemilikan_tempat_tinggal (miliksendiri | milik_orang_tua | mertua | rumahdinas | sewakontrak) [MANDATORY for performa-pro]
      - name: collateralOwnership
        value: shm_pengikatan
        description: bukti_kepemilikan_agunan (shm_pengikatan | bpkb_pengikatan | shgu_pengikatan | shgb_pengikatan | shm_tidak_pengikatan | bpkb_tidak_pengikatan | shgu_tidak_pengikatan | shgb_tidak_pengikatan | letterc | girik | ajb | lainnya) [MANDATORY for performa-pro]
      - name: debtorStatus
        value: baru
        description: status_debitur (baru | lama) [MANDATORY for bigdata]
      - name: age
        value: "37"
        description: usia [MANDATORY for performa-pro]
      - name: nationalInflation
        value: "10.5"
        description: inflasi_nasional [MANDATORY for performa-pro]
      - name: characterBusinessConditions
        value: memiliki_pelanggan_tetap
        description: karakter_kondisi_usaha (memiliki_pelanggan_tetap | tidak_memiliki_pelanggan_tetap) [MANDATORY for performa-pro]
      - name: characterOutputGoodsServices
        value: umum_sedikit_pesaing
        description: karakter_output_barang_jasa (umum_sedikit_pesaing | umum_banyak_pesaing | tertentu_pangsa_besar | tertentu_pangsa_terbatas)[MANDATORY for performa-pro]
      - name: characterBusinessTransactions
        value: tercermin_sebagian_besar
        description: karakter_transaksi_usaha (tercermin_sebagian_besar | tercermin_sebagian_kecil | tidak_tercermin) [MANDATORY for bigdata]
      - name: businessManagementCharacter
        value: dikelola_individu
        description: karakter_manajemen_usaha (dikelola_individu | memiliki_karyawan) [MANDATORY for performa-pro]
      - name: levelConfidence
        value: sesuai_kondisi_dapat_dibuktikan
        description: tingkat_kepercayaan (sesuai_kondisi_dapat_dibuktikan | sesuai_kondisi_tidak_dibuktikan | kurang_sesuai_kondisi_sebenarnya | tidak_sesuai_kondisi_sebenarnya) [MANDATORY for performa-pro]
      - name: personalBehaviorCharacter
        value: tidak_pernah_tersangkut_perkara_kriminal
        description: karakter_perilaku_pribadi (tidak_pernah_tersangkut_perkara_kriminal | pernah_tersangkut_perkara_kriminal)
      - name: creditorQuality
        value: selalu_lancar
        description: kualitas_kreditur (selalu_lancar | tidak_pernah_punya_pinjaman | pernah_kol_2 | pernah_kol_2_>_1x | pernah_npl) [MANDATORY for performa-pro]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

