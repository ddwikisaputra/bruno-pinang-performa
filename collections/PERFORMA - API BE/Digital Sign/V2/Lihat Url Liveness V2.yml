info:
  name: Lihat Url Liveness V2
  type: http
  seq: 5

http:
  method: POST
  url: "{{base_url_dev}}/v/2/digitalsign/lihat-url-liveness"
  body:
    type: form-urlencoded
    data:
      - name: kodeProses
        value: UmF5YVBpUGVyVG9w/lx5nmBcgN3n/SIGOwbFwMMGVaBq
        description: Prakarsa ID (Encode AES) {MANDATORY}
      - name: typeLiveness
        value: Debitur
        description: Debitur / Pasangan {MANDATORY}
  auth:
    type: bearer
    token: "{{tokenJWT}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unauthorized
    request:
      url: "{{base_url}}/v/2/digitalsign/lihat-url-liveness"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: kodeProses
            value: UmF5YVBpUGVyVG9w/lx+n2wXjR0uqNEIGTXN2gBk4OJN
            description: Prakarsa ID (Encode Base64) {MANDATORY}
          - name: typeLiveness
            value: ""
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Thu, 20 Jul 2023 05:48:32 GMT
        - name: Content-Length
          value: "73"
      body:
        type: json
        data: |-
          {
              "code": 401,
              "message": "Token is expired"
          }
  - name: error database connection
    request:
      url: "{{base_url}}/v/2/digitalsign/lihat-url-liveness"
      method: POST
      body:
        type: form-urlencoded
        data:
