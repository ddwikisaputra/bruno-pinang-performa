info:
  name: List V1
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/v/1/potential-customers/list"
  body:
    type: form-urlencoded
    data:
      - name: textSearch
        value: fa
        description: Text Pencarian Data { OPTIONAL }
        disabled: true
      - name: partnershipId
        value: "2"
        description: ID Partnership { OPTIONAL Default '0' } [ 0 => all, ...]
        disabled: true
      - name: branchCode
        value: "9999"
        description: Branch Code BRI Agro (BranchCode Login)
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "100"
        description: Limit Data {Default 5}
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

