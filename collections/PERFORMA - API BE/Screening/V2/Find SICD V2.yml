info:
  name: Find SICD V2
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/v/2/screening/find-sicd"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: "[Encode]Personal Number BRI Agro (UserID Login) { MANDATORY }"
      - name: prakarsaId
        value: "3609"
        description: Prakarsa ID { MANDATORY }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

