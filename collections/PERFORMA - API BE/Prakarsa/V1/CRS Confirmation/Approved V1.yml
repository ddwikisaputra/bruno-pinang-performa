info:
  name: Approved V1
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/v/1/prakarsa/approved/13"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "999961"
        description: Personal Number BRI Agro (UserID Login)
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

