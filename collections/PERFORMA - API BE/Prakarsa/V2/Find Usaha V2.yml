  type: http
  seq: 14

http:
  method: POST
  url: "{{base_url_local}}/v/2/prakarsa/find-usaha"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: "[Encode]Personal Number BRI Agro (UserID Login) { MANDATORY }"
      - name: prakarsaId
        value: "31480"
        description: Prakarsa ID { MANDATORY }
  auth:
    type: bearer
    token: "{{token}}"

