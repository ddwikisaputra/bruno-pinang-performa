info:
  name: List By User Level V2
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url_prod}}/v/2/prakarsa/list-by-user-level"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: "[Encode]Personal Number BRI Agro (UserID Login)"
      - name: userLevel
        value: "90"
        description: Access Level ID (UserID Login) [ 10 = SF, 20 = Supervisor, 30 = Head, 50 = rbo, 90 = Kantor Pusat ]
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "10"
        description: Limit Data {Default 5}
      - name: textSearch
        value: ahmad tabroni
        description: Text Pencarian Data { OPTIONAL }
        disabled: true
      - name: statusType
        value: "9"
        description: Filter by Status { OPTIONAL } [ 0 => All, 1 => Proses Input Pre-Screening, 2 => Menunggu Hasil Pre-Screening, 3 => Pre-Screening Disetujui, 4 => Proses Input CRS, 5 => Menunggu Putusan, 10 => Menunggu Putusan RBO, 6 => Prakarsa Disetujui, Minta Persetujuan Nasabah, 7 | 11 => Proses Akad Kredit, 8 => Proses Pencairan, 9 => Pencairan Berhasil, -1 => Pre-Screening Error, -2 => Pre-Screening Ditolak, -3 => Prakarsa Ditolak, -4 => Prakarsa Disetujui, Tetapi Ditolak Nasabah, -5 => Prakarsa Dibatalkan Pre-Screening, -6 => Prakarsa Dibatalkan Analisa Pinjaman, -7 => Prakarsa Ditolak RBO ]
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

