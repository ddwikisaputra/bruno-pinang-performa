info:
  name: Disbursement V2
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/v/2/prakarsa/disbursement/700"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: Personal Number BRI Agro (UserID Login)
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

