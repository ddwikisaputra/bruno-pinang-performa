info:
  name: Verify Account BRI V2
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/v/2/prakarsa/verifikasi-bri-account"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: UmF5YVBpUGVyVG9w9FR0lGD7jlq4exOlA48YlZ1g6mPYJg==
        description: Encode Personal Number BRI Agro (UserID Login)
      - name: prakarsaId
        value: "1015"
        description: Prakarsa ID { MANDATORY }
      - name: accountNumberBRI
        value: UmF5YVBpUGVyVG9w/117nWX8lkVsK2mPHOi4Z44jSQHmHJBHHQrVs76S
        description: "Encode Nomor Rekening Nasabah { MANDATORY } "
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
