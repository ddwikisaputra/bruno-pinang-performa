http:
  method: POST
  url: "{{base_url}}/v/1/pipeline/histories"
  body:
    type: form-urlencoded
    data:
      - name: startIndex
        value: "0"
        description: Offset Data {Default 0}
      - name: recordCount
        value: "6"
        description: Limit Data {Default 5}
      - name: userId
        value: "999941"
        description: Personal Number BRI Agro (UserID Login)
  auth:
    type: bearer
    token: "{{token}}"

