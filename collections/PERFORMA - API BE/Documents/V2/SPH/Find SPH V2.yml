info:
  name: Find SPH V2
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url_prod}}/v/2/document/find-sph"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: "[Encode]Personal Number BRI Agro (UserID Login) { MANDATORY }"
      - name: prakarsaId
        value: "5704"
        description: Prakarsa ID { MANDATORY }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unautorized
    request:
      url: "{{base_url}}/v/1/document/find-sph"
      method: POST
      headers:
        - name: Content-Type
          value: application/x-www-form-urlencoded
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: "999961"
            description: Personal Number BRI Agro (UserID Login) { MANDATORY }
          - name: prakarsaId
            value: "30946"
            description: Prakarsa ID { MANDATORY }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Sun, 23 May 2021 18:28:12 GMT
        - name: Content-Length
          value: "409"
      body:
        type: json
        data: |-
          {
              "code": 401,
              "desc": "Tidak Memliki Akses",
              "message": "Invalid Token || Token Is Expired"
          }
  - name: error - access forbidden (403)
