info:
  name: Logout SSO V1
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/v/1/user/logout-sso"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: Personal Number BRI Agro (UserID untuk i-SDM)
      - name: loginTicket
        value: "{{loginTicket}}"
        description: Parameter didapat dari response login-sso
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{base_url}}/v/1/user/logout-sso"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{\r

          \    \"userId\": \"000426\",\r

          \    \"loginTicket\": \"22601\"\r

          }"
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: "{\r

          \    \"status\": 200,\r

          \    \"message\": \"Logout berhasil\",\r

          \    \"desc\": \"Logout berhasil\"\r

          }"
  - name: unautorized
    request:
      url: "{{base_url}}/v/1/user/logout-sso"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{\r

          \    \"userId\": \"000426\",\r

          \    \"loginTicket\": \"22601\"\r

          }"
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "code": 401,
              "desc": "Tidak Memliki Akses",
              "message": "Invalid Token || Token Is Expired"
          }
  - name: general error
    request:
      url: "{{base_url}}/v/1/user/logout-sso"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{\r

          \    \"userId\": \"000426\",\r

          \    \"loginTicket\": \"22601\"\r

          }"
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "status": 500,
              "message": "Server sedang maintenance, silahkan coba beberapa saat lagi",
              "desc": "Could not connect ....."
          }
  - name: gagal
    request:
      url: "{{base_url}}/v/1/user/logout-sso"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{\r

          \    \"userId\": \"000426\",\r

          \    \"loginTicket\": \"22601\"\r

          }"
    response:
      status: 200
