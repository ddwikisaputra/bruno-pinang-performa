info:
  name: Generate Internal Token
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url_staging}}/v/2/user/generate-internal"
  body:
    type: form-urlencoded
    data:
      - name: ipAddress
        value: 127.0.0.1
      - name: from
        value: apps
      - name: appsVersion
        value: v.1.2.1
      - name: webVersion
        value: v.1.3.1
        disabled: true
  auth:
    type: bearer
    token: eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9..Q5M4uqwZXphOKAgz4JWSu3IXSnm0F_Mjg-UPtpezFAktdegqPwEn312Xa_512vcXdLghc7-9TcMk-lfUo0rLzQ

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        bru.setGlobalEnvVar("token", jsonData.data.accessToken)
        bru.setEnvVar("token", jsonData.data.accessToken)
        bru.setGlobalEnvVar("userId", jsonData.data.userId)
        bru.setEnvVar('userId', jsonData.data.userId)
        bru.setGlobalEnvVar("loginTicket", jsonData.data.loginTicket)
        bru.setEnvVar('loginTicket', jsonData.data.loginTicket)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: error - unauthorized
    request:
      url: "{{base_url_local}}/v/2/user/generate-internal"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: ipAddress
            value: 127.0.0.1
          - name: from
            value: apps
          - name: appsVersion
            value: v.1.2.1
          - name: webVersion
            value: v.1.3.1
            disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Tue, 25 Feb 2025 05:51:54 GMT
        - name: Content-Length
          value: "75"
      body:
        type: json
        data: |-
          {
              "code": 401,
              "desc": "Expired",
              "message": "Invalid Token || Token Is Expired"
          }
  - name: error - access forbidden
