info:
  name: Setting Param List V1
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url_local}}/v/1/master/setting-param-list"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: Personal Number BRI Agro (UserID Login)
      - name: textSearch
        value: TEST_SETTING_PARAM_EMPAT
        description: Text Pencarian Data { OPTIONAL }
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unautorized
    request:
      url: "{{base_url_local}}/v/1/master/setting-param-list"
      method: POST
      body:
        type: form-urlencoded
        data:
