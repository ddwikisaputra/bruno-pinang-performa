info:
  name: Update Setting Param
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url_local}}/v/1/master/update-setting-param"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: Personal Number AES Encrypted
      - name: id
        value: "130"
        description: ID Setting Param
      - name: param
        value: TEST_SETTING_PARAM_EMPAT
        description: TEST_LIMA
      - name: value
        value: testing insert empat
        description: free text
      - name: unit
        value: text
        description: text, url, bool, datetime, string, json text, detik, menit, jam, hari, kesempatan, presentasi, int | persediaan atau int | modal kerja
      - name: isFrontEnd
        value: aktif
        description: aktif | tidak_aktif
      - name: alias
        value: testupdatea
        description: camelcase
      - name: convertTo
        value: string
        description: string | int | float
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unautorized
    request:
      url: "{{base_url_local}}/v/1/master/update-setting-param"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: "{{userId}}"
            description: Personal Number BRI Agro (UserID Login)
          - name: id
            value: "126"
            description: Offset Data {Default 0}
          - name: param
            value: TEST_UPDATE_TIGA
            description: Limit Data {Default 5}
          - name: value
            value: testing update 3
            description: Text Pencarian Data { OPTIONAL }
          - name: unit
            value: text
          - name: isFrontEnd
            value: tidak_aktif
          - name: alias
            value: testupdate
          - name: convertTo
            value: ""
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Server
          value: nginx
        - name: Date
