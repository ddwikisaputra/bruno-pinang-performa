info:
  name: Provinces V1
  type: http
  seq: 12

http:
  method: GET
  url: "{{base_url}}/v/1/master/provinces"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
