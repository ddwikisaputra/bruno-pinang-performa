info:
  name: Areas V1
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/v/1/master/areas/10520"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
