info:
  name: Postal Codes V1
  type: http
  seq: 13

http:
  method: GET
  url: "{{base_url}}/v/1/master/postal-codes/1111142001"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{base_url}}/v/1/master/postal-codes/{{villageId}}"
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
              "data": [
                  {
                      "postalCode": "10520",
                      "postalCodeName": "10520"
                  }
              ],
              "desc": "Data Valid",
              "message": "Data ditemukan",
              "status": 200
          }
  - name: unautorized
