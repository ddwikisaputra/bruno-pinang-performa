info:
  name: Find Usaha V1
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/v/1/crs/find-usaha"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "999900"
        description: Personal Number BRI Agro (UserID Login) { MANDATORY }
      - name: prakarsaId
        value: "1634"
        description: Prakarsa ID { MANDATORY }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

