info:
  name: Process V2
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url_local}}/v/2/scoring/process"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "{{userId}}"
        description: "[Encode]Personal Number BRI Agro (UserID Login) { MANDATORY }"
      - name: prakarsaId
        value: "31415"
        description: Prakarsa ID { MANDATORY }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: unautorized
    request:
      url: "{{base_url}}/v/1/scoring/process/2"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: userId
            value: "000230"
            description: Personal Number BRI Agro (UserID Login)
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
