info:
  name: REQUEST TOKEN
  type: http
  seq: 21

http:
  method: POST
  url: "{{base_url_dev}}/request-token"
  body:
    type: form-urlencoded
    data:
      - name: username
        value: YWdyaS1hcGk=
        description: '{"username":"YWdyaS1hcGk=","password":"QUdyMWQxZzF0YWwyMDIx"}'
      - name: password
        value: QUdyMWQxZzF0YWwyMDIx

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        bru.setGlobalEnvVar("tokenJWT", jsonData.token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

