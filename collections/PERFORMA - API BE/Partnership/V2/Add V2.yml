        value: "001"
        description: RT Alamat Partnership | MANDATORY
      - name: rw
        value: "002"
        description: RW Alamat Partnership | MANDATORY
      - name: provinceCode
        value: "12"
        description: Kode Provinsi Alamat Partnership | MANDATORY
      - name: cityCode
        value: "1293"
        description: Kode Kota Alamat Partnership | MANDATORY
      - name: districtCode
        value: "357305"
        description: Kode Kecamatan Alamat Partnership | MANDATORY
      - name: villageCode
        value: "3573051007"
        description: Kode Kelurahan Alamat Partnership | MANDATORY
      - name: postalCode
        value: "65141"
        description: Kode Pos Alamat Partnership | MANDATORY
      - name: licenseNumber
        value: 22t233ttqt3
        description: Nomor Izin Usaha | MANDATORY
      - name: licenseExpired
        value: 2024-12-30
        description: "Exp Izin Usaha | format : YYYY-MM-DD | MANDATORY"
      - name: pksNumber
        value: ""
        description: Nomor PKS Partnership | MANDATORY
      - name: pksType
        value: Tidak Ada
        description: Jenis PKS[MoU, PKS, Tidak Ada] | MANDAOTRY
