        value: Avalis
        description: JENIS PARTNERSHIP[Avalis, Offtaker] [Mandatory]
      - name: id
        value: "159"
        disabled: true
      - name: savingAccountNumber
        value: UmF5YVBpUGVyVG9w/F9+KmVoOXPQ+eAU6S8P/TsV4A==
        description: Nomor Rekening Saving (AES) [OPTIONAL]
      - name: savingAccountName
        value: UmF5YVBpUGVyVG9whQw/3y3tFcfoM3GKkZm/NS5X9cOINw==
        description: Nama Pemilik Rekening Saving (AES) [OPTIONAL]
