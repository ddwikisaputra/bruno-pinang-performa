        value: ""
        description: Tanggal Expired PKS | MANDATORY
      - name: economicSectorId
        value: "1"
        description: Economic Sector Id | MANDATORY
      - name: economicSubsectorId
        value: "564"
        description: Economic Sub Sector Id | MANDATORY
      - name: licenseDocumentBlob
        value: 
        description: "[ENCODE] Blob Surat Izin Usaha (base64)"
