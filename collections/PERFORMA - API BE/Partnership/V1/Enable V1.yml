  type: http
  seq: 10

http:
  method: POST
  url: "{{base_url}}/v/1/partnerships/enable"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "999941"
        description: Personal Number BRI Agro (UserID Login) | MANDATORY
      - name: id
        value: "45"
        description: Id Partnership | MANDATORY
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

