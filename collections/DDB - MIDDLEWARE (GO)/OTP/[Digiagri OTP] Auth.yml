          - name: serverId
            value: RAYA3755687839
          - name: token
            value: "840653"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Date
          value: Thu, 09 Oct 2025 03:19:18 GMT
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Content-Length
          value: "56"
        - name: Connection
          value: keep-alive
        - name: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains
      body:
        type: json
        data: |-
          {
              "statusCode": "3",
              "statusDescription": "Invalid Session"
