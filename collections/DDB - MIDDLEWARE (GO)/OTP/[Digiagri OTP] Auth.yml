info:
  name: "[Digiagri OTP] Auth"
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/digiagri/otp/auth"
  body:
    type: form-urlencoded
    data:
      - name: serverId
        value: RAYA1156721394
      - name: token
        value: "368672"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
