info:
  name: "[Digiagri OTP] Token Request"
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/digiagri/otp/request"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: partnership
      - name: tokenType
        value: PASSWORD
      - name: transactionDetail
        value: FORGET PASSWORD
      - name: emailAddress
        value: ibrahim.senoaji@bankraya.co.id
      - name: phone
        value: "085155017225"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

