info:
  name: Add Colateral
  type: http
  seq: 11

http:
  method: POST
  url: "{{baseUrl}}/api/digiagri/collateral/add"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "999991"
      - name: kodeCabang
        value: "0010"
      - name: namaPemilik
        value: Andi Pratama
      - name: noIdPemilik
        value: "3201123456789012"
      - name: jenisAgunan
        value: Sertifikat Rumah
      - name: kodeLokasi
        value: JK01
      - name: alamatAgunan
        value: Jalan Melati No 25, Jakarta
      - name: tanggalPengikatan
        value: 30/12/2024
      - name: tanggalJatuhTempoPengikatan
        value: 30/12/2025
      - name: nilaiPasar
        value: "500000000"
      - name: nilaiLikuidasi
        value: "400000000"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

