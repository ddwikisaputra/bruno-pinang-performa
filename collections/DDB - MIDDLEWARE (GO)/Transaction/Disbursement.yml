          {
              "userId": "999906",
              "kodeCabang": "0010",
              "nomorFasilitas": "0020/0000120287/PK2/014",
              "rekeningSumber": "001001119193106",
              "rekeningTujuan": "001001019405310",
              "nominal": "10000"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Date
          value: Thu, 09 Oct 2025 04:06:28 GMT
