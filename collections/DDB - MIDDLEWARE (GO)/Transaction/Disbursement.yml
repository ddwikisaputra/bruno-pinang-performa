info:
  name: Disbursement
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/digiagri/transaction/disbursement"
  body:
    type: form-urlencoded
    data:
      - name: kodeCabang
        value: "0010"
      - name: nominal
        value: "10000"
      - name: nomorFasilitas
        value: 0010/0000121436/PK3/001
      - name: rekeningSumber
        value: "001001119131104"
      - name: rekeningTujuan
        value: "001001019405310"
      - name: userId
        value: "999906"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

