info:
  name: Account Inquiry
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/digiagri/v2/saving/account/inquiry"
  body:
    type: form-urlencoded
    data:
      - name: userId
        value: "000426"
      - name: noCIF
        value: "0000121071"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

