info:
  name: Branch Inquiry
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/api/digiagri/branch/inquiry/{{kodeBranch}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success Response - Cabang tidak ditemukan
    request:
      url: "{{baseUrl}}/api/digiagri/branch/inquiry/{{kodeBranch}}"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Date
          value: Thu, 09 Oct 2025 03:01:08 GMT
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Content-Length
          value: "80"
        - name: Connection
          value: keep-alive
        - name: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains
      body:
        type: json
        data: |-
          {
              "statusCode": "0",
              "statusDescription": "Inquiry Success, Cabang tidak ditemukan"
          }
  - name: Success Response - Cabang Found
    request:
      url: "{{baseUrl}}/api/digiagri/branch/inquiry/{{kodeBranch}}"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Date
          value: Thu, 09 Oct 2025 03:01:57 GMT
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Content-Length
          value: "326"
        - name: Connection
          value: keep-alive
        - name: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains
      body:
        type: json
        data: |-
          {
              "statusCode": "1",
              "statusDescription": "Inquiry Success",
              "data": {
                  "branchCode": "0010",
                  "branchName": "KANTOR CABANG UTAMA",
                  "branchLevel": "1",
                  "branchAddress": "Gedung BRI Agro, Jl. Warung Jati Barat No. 139 Kel. Kalibata, Kec. Pancoran Jakarta Selatan",
                  "branchPhone": "021 79199980",
                  "branchHead": "0010",
                  "branchCorrespondCode": "KCU"
              }
          }
